<section id="contact" class="contact-section">
    <div class="container">
        <div class="section-header">
            <h2>Liên Hệ Với Chúng Tôi</h2>
            <p>Hãy để lại thông tin, chúng tôi sẽ liên hệ lại sớm nhất</p>
        </div>
        <div class="contact-content">
            <div class="contact-form-wrapper">
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">Họ và tên *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Số điện thoại *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Nội dung</label>
                        <textarea id="message" name="message" rows="5"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Gửi liên hệ</button>
                </form>
            </div>
            <div class="contact-info">
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Địa chỉ</h4>
                        <p>475 Điện Biên Phủ, P.25<br>Q. Bình Thạnh, TP.HCM</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h4>Điện thoại</h4>
                        <p>+84 912 209 095</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>vctht2026@gmail.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h4>Giờ làm việc</h4>
                        <p>T2-T6: 17:00 - 20:00<br>T7-CN: 08:00 - 11:00</p>
                    </div>
                </div>
            </div>
        </div>
