<header class="main-header">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-image">
                    <img src="assets/images/Logo.jpg" alt="CLB Võ Cổ Truyền HUTECH" class="header-logo-img">
                </div>
                <div class="logo-text">
                    <h1>CLB VÕ CỔ TRUYỀN</h1>
                    <span class="subtitle">HUTECH</span>
                </div>
            </div>
            
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            
            <ul class="nav-menu" id="nav-menu">
                <li class="nav-item">
                    <a href="#home" class="nav-link active">
                        <span>Trang chủ</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#about" class="nav-link">
                        <span>Giới thiệu</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#schedule" class="nav-link">
                        <span>Lịch tập</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#coaches" class="nav-link">
                        <span>Huấn luyện viên</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#gallery" class="nav-link">
                        <span>Thành tích</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#contact" class="nav-link">
                        <span>Liên hệ</span>
                    </a>
                </li>
                <li class="nav-item dropdown auth-item" id="authDropdown">
                    <a href="#" class="nav-link dropdown-toggle" onclick="toggleAuthMenu(event)" onmouseenter="showDropdownOnHover()">
                        <span id="authMenuText">Thành viên <i class="fas fa-chevron-down"></i></span>
                    </a>
                    <ul class="dropdown-menu" id="authDropdownMenu">
                        <li><a href="views/account/dang-nhap.html"><i class="fas fa-sign-in-alt"></i> Đăng nhập</a></li>
                        <li><a href="views/account/dang-ky.html"><i class="fas fa-user-plus"></i> Đăng ký</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>
</header>

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');
    
    if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            navToggle.classList.toggle('active');
        });
        
        // Close menu when clicking on a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                navToggle.classList.remove('active');
            });
        });
    }
    
    // Header scroll effect
    window.addEventListener('scroll', function() {
        const header = document.querySelector('.main-header');
        if (header) {
            if (window.scrollY > 100) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }
    });
    
    // Update auth menu based on login status
    updateAuthMenu();
    
    // Ensure menu functionality
    setTimeout(ensureMenuFunctionality, 1000);
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
        const authDropdown = document.getElementById('authDropdown');
        const authDropdownMenu = document.getElementById('authDropdownMenu');
        
        if (authDropdown && authDropdownMenu && !authDropdown.contains(event.target)) {
            authDropdownMenu.classList.remove('show');
        }
    });
});

function toggleAuthMenu(event) {
    event.preventDefault();
    const authDropdownMenu = document.getElementById('authDropdownMenu');
    if (authDropdownMenu) {
        authDropdownMenu.classList.toggle('show');
        console.log('Auth menu toggled, classes:', authDropdownMenu.className);
        console.log('Menu content:', authDropdownMenu.innerHTML);
    } else {
        console.error('Auth dropdown menu not found');
    }
}

function showDropdownOnHover() {
    // Ensure menu content is available on hover
    const authDropdownMenu = document.getElementById('authDropdownMenu');
    if (authDropdownMenu && authDropdownMenu.children.length === 0) {
        console.log('Menu is empty, restoring default content...');
        showGuestMenu();
    }
}

function updateAuthMenu() {
    const authMenuText = document.getElementById('authMenuText');
    const authDropdownMenu = document.getElementById('authDropdownMenu');
    
    if (!authMenuText || !authDropdownMenu) {
        console.log('Auth menu elements not found, retrying...');
        setTimeout(updateAuthMenu, 500);
        return;
    }
    
    // Check if user is logged in
    const currentUser = localStorage.getItem('currentUser');
    const authToken = localStorage.getItem('authToken');
    
    console.log('Updating auth menu - User logged in:', !!(currentUser && authToken));
    
    if (currentUser && authToken) {
        try {
            const user = JSON.parse(currentUser);
            const firstName = user.first_name || user.name || user.email.split('@')[0];
            
            // Update menu text to show user name
            authMenuText.innerHTML = `${firstName} <i class="fas fa-chevron-down"></i>`;
            
            // Create logged-in menu
            const currentPath = window.location.pathname;
            let dashboardPath = 'views/account/../../../dashboard/dashboard.html';
            let userDashboardPath = 'views/account/../../../dashboard/user-dashboard.html';
            
            if (currentPath.includes('/views/') || currentPath.includes('/components/')) {
                dashboardPath = '../../../dashboard/dashboard.html';
                userDashboardPath = '../../../dashboard/user-dashboard.html';
            }
            
            let menuItems = '';
            if (user.role === 'admin') {
                menuItems += `<li><a href="${dashboardPath}"><i class="fas fa-tachometer-alt"></i> Admin Dashboard</a></li>`;
            } else {
                menuItems += `<li><a href="${userDashboardPath}"><i class="fas fa-user-circle"></i> Thông tin cá nhân</a></li>`;
            }
            
            menuItems += `
                <li class="dropdown-divider"></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            `;
            
            authDropdownMenu.innerHTML = menuItems;
            console.log('Logged-in menu updated for user:', firstName);
            
        } catch (error) {
            console.error('Error parsing user data:', error);
            showGuestMenu();
        }
    } else {
        showGuestMenu();
    }
    
    // Ensure menu is always functional
    ensureMenuFunctionality();
}

function ensureMenuFunctionality() {
    const authDropdownMenu = document.getElementById('authDropdownMenu');
    if (authDropdownMenu) {
        // If menu is empty, restore default content
        if (authDropdownMenu.children.length === 0) {
            console.log('Menu is empty, restoring default content...');
            showGuestMenu();
        }
        
        // Ensure menu has proper event handling
        const authDropdown = document.getElementById('authDropdown');
        if (authDropdown && !authDropdown.hasAttribute('data-initialized')) {
            authDropdown.setAttribute('data-initialized', 'true');
            console.log('Menu functionality ensured');
        }
    }
}

function showGuestMenu() {
    const authMenuText = document.getElementById('authMenuText');
    const authDropdownMenu = document.getElementById('authDropdownMenu');
    
    if (authMenuText) {
        authMenuText.innerHTML = 'Thành viên <i class="fas fa-chevron-down"></i>';
    }
    
    if (authDropdownMenu) {
        const currentPath = window.location.pathname;
        let loginPath = 'views/account/dang-nhap.html';
        let registerPath = 'views/account/dang-ky.html';
        
        if (currentPath.includes('/views/') || currentPath.includes('/components/')) {
            loginPath = 'dang-nhap.html';
            registerPath = 'dang-ky.html';
        }
        
        authDropdownMenu.innerHTML = `
            <li><a href="${loginPath}"><i class="fas fa-sign-in-alt"></i> Đăng nhập</a></li>
            <li><a href="${registerPath}"><i class="fas fa-user-plus"></i> Đăng ký</a></li>
        `;
        
        // Ensure menu is visible and functional
        console.log('Guest menu updated with login/register options');
    }
}

async function logout() {
    try {
        // Clear localStorage
        localStorage.removeItem('currentUser');
        localStorage.removeItem('authToken');
        localStorage.removeItem('refreshToken');
        
        // Update menu
        showGuestMenu();
        
        // Show success message
        alert('Đăng xuất thành công!');
        
        // Reload page to update UI
        window.location.reload();
        
    } catch (error) {
        console.error('Logout error:', error);
        // Force logout even if there's an error
        localStorage.clear();
        window.location.reload();
    }
}

// Listen for storage changes (when user logs in/out in another tab)
window.addEventListener('storage', function(e) {
    if (e.key === 'currentUser' || e.key === 'authToken') {
        updateAuthMenu();
    }
});
</script>
