<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Styles are now in main styles.css file -->
</head>
<body>
    <div class="auth-page">
        <div class="back-home">
            <a href="../../index.html">
                <i class="fas fa-arrow-left"></i>
                Về trang chủ
            </a>
        </div>

        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-header-content">
                    <div class="auth-logo">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h1>Quên mật khẩu</h1>
                    <p>Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu</p>
                </div>
            </div>

            <div class="auth-body">
                <!-- Progress Steps -->
                <div class="progress-steps">
                    <div class="progress-step active" id="step1"></div>
                    <div class="progress-step" id="step2"></div>
                    <div class="progress-step" id="step3"></div>
                </div>

                <!-- Success/Error Messages -->
                <div id="successMessage" class="success-message">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <!-- Step 1: Email Input -->
                <div class="step-content active" id="stepContent1">
                    <form id="emailForm">
                        <div class="form-group">
                            <label for="email">Email đã đăng ký</label>
                            <div class="input-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="sendEmailBtn">
                            <i class="fas fa-paper-plane"></i>
                            Gửi hướng dẫn đặt lại
                        </button>
                    </form>
                </div>

                <!-- Step 2: Verification Code -->
                <div class="step-content" id="stepContent2">
                    <form id="verificationForm">
                        <div class="form-group">
                            <label for="verificationCode">Mã xác thực</label>
                            <div class="input-icon">
                                <i class="fas fa-key"></i>
                            </div>
                            <input type="text" id="verificationCode" name="verificationCode" placeholder="Nhập mã 6 chữ số" maxlength="6" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="verifyCodeBtn">
                            <i class="fas fa-check"></i>
                            Xác thực mã
                        </button>

                        <button type="button" class="btn btn-secondary" id="resendCodeBtn">
                            <i class="fas fa-redo"></i>
                            Gửi lại mã
                        </button>
                    </form>
                </div>

                <!-- Step 3: New Password -->
                <div class="step-content" id="stepContent3">
                    <form id="newPasswordForm">
                        <div class="form-group">
                            <label for="newPassword">Mật khẩu mới</label>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Xác nhận mật khẩu</label>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="resetPasswordBtn">
                            <i class="fas fa-save"></i>
                            Đặt lại mật khẩu
                        </button>
                    </form>
                </div>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <div class="auth-links">
                    <a href="dang-nhap.html">
                        <i class="fas fa-sign-in-alt"></i>
                        Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../script.js"></script>
    <script src="../../config/auth.js"></script>
    <script>
        let currentStep = 1;
        let resetEmail = '';
        let verificationCode = '';

        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            if (AuthManager && AuthManager.isLoggedIn()) {
                window.location.href = '../../../dashboard/dashboard.html';
                return;
            }

            initializeForgotPassword();
        });

        function initializeForgotPassword() {
            // Setup form handlers
            document.getElementById('emailForm').addEventListener('submit', handleEmailSubmit);
            document.getElementById('verificationForm').addEventListener('submit', handleVerificationSubmit);
            document.getElementById('newPasswordForm').addEventListener('submit', handlePasswordReset);
            document.getElementById('resendCodeBtn').addEventListener('click', resendVerificationCode);
        }

        function handleEmailSubmit(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage('error', 'Vui lòng nhập email');
                return;
            }

            // Check if email exists in system
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            
            if (!user) {
                showMessage('error', 'Email này chưa được đăng ký trong hệ thống');
                return;
            }

            resetEmail = email;
            
            // Simulate sending verification code
            verificationCode = generateVerificationCode();
            console.log('Verification code:', verificationCode); // In thực tế sẽ gửi qua email
            
            showMessage('success', `Mã xác thực đã được gửi đến ${email}`);
            
            setTimeout(() => {
                nextStep();
            }, 1500);
        }

        function handleVerificationSubmit(e) {
            e.preventDefault();
            
            const inputCode = document.getElementById('verificationCode').value.trim();
            
            if (!inputCode) {
                showMessage('error', 'Vui lòng nhập mã xác thực');
                return;
            }

            if (inputCode !== verificationCode) {
                showMessage('error', 'Mã xác thực không đúng');
                return;
            }

            showMessage('success', 'Mã xác thực hợp lệ');
            
            setTimeout(() => {
                nextStep();
            }, 1000);
        }

        function handlePasswordReset(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword || !confirmPassword) {
                showMessage('error', 'Vui lòng nhập đầy đủ mật khẩu');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('error', 'Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('error', 'Mật khẩu xác nhận không khớp');
                return;
            }

            // Update password in localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === resetEmail);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));
                
                showMessage('success', 'Mật khẩu đã được đặt lại thành công!');
                
                setTimeout(() => {
                    window.location.href = 'dang-nhap.html';
                }, 2000);
            } else {
                showMessage('error', 'Có lỗi xảy ra. Vui lòng thử lại');
            }
        }

        function resendVerificationCode() {
            verificationCode = generateVerificationCode();
            console.log('New verification code:', verificationCode);
            showMessage('success', 'Mã xác thực mới đã được gửi');
        }

        function generateVerificationCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function nextStep() {
            // Hide current step
            document.getElementById(`stepContent${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep}`).classList.add('completed');
            document.getElementById(`step${currentStep}`).classList.remove('active');
            
            // Show next step
            currentStep++;
            document.getElementById(`stepContent${currentStep}`).classList.add('active');
            document.getElementById(`step${currentStep}`).classList.add('active');
            
            hideMessages();
        }

        function showMessage(type, message) {
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            // Hide all messages first
            hideMessages();
            
            // Show appropriate message
            if (type === 'success') {
                document.getElementById('successText').textContent = message;
                successMsg.style.display = 'block';
            } else {
                document.getElementById('errorText').textContent = message;
                errorMsg.style.display = 'block';
            }
            
            // Auto hide after 5 seconds
            setTimeout(hideMessages, 5000);
        }

        function hideMessages() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Auto-format verification code input
        document.getElementById('verificationCode').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 6) value = value.slice(0, 6);
            e.target.value = value;
        });
    </script>
</body>
</html>
