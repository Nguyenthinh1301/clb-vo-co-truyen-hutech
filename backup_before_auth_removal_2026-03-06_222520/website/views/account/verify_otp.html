<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Auth page specific styles */
        .auth-page {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.05;
            z-index: 1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .auth-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.1;
            z-index: 1;
        }

        .auth-header-content {
            position: relative;
            z-index: 2;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .auth-logo i {
            font-size: 2.5rem;
            color: #3498db;
        }

        .auth-header h1 {
            margin: 0 0 10px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .auth-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
            line-height: 1.5;
        }

        .auth-body {
            padding: 40px 30px;
        }

        .otp-info {
            background: #e8f5e8;
            border: 1px solid #c3e6cb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .otp-info h3 {
            margin: 0 0 15px;
            color: #155724;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .otp-destination {
            color: #155724;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 10px 0;
        }

        .otp-type-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .otp-type-sms {
            background: #bee5eb;
            color: #0c5460;
        }

        .otp-type-email {
            background: #d1ecf1;
            color: #0c5460;
        }

        .otp-type-app {
            background: #d4edda;
            color: #155724;
        }

        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            border: 3px solid #e9ecef;
            border-radius: 12px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(248, 249, 250, 0.8);
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            transform: scale(1.05);
        }

        .otp-input.filled {
            border-color: #27ae60;
            background: #d4edda;
            color: #155724;
        }

        .otp-input.error {
            border-color: #e74c3c;
            background: #f8d7da;
            color: #721c24;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2ecc71);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(149, 165, 166, 0.1);
            color: #2c3e50;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(149, 165, 166, 0.2);
            border-color: #bdc3c7;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover:not(:disabled) {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .countdown-timer {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            color: #856404;
        }

        .countdown-timer.expired {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .timer-display {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .resend-section {
            text-align: center;
            margin: 20px 0;
        }

        .resend-timer {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .auth-links {
            text-align: center;
            margin-top: 30px;
        }

        .auth-links a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .auth-links a:hover {
            color: #2980b9;
            transform: translateY(-1px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9ecef;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .success-message,
        .error-message,
        .warning-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .warning-message {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .verification-attempts {
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 10px;
        }

        .attempts-warning {
            color: #e67e22;
            font-weight: 600;
        }

        .attempts-danger {
            color: #e74c3c;
            font-weight: 600;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back-home a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-home a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .auth-page {
                padding: 10px;
            }

            .auth-container {
                max-width: 100%;
                margin: 0 10px;
            }

            .auth-header {
                padding: 30px 20px 20px;
            }

            .auth-body {
                padding: 30px 20px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .otp-input-container {
                gap: 8px;
            }

            .otp-input {
                width: 45px;
                height: 55px;
                font-size: 1.3rem;
            }

            .back-home {
                position: static;
                text-align: center;
                margin-bottom: 20px;
            }

            .auth-links a {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="back-home">
            <a href="../../index.html">
                <i class="fas fa-arrow-left"></i>
                Về trang chủ
            </a>
        </div>

        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-header-content">
                    <div class="auth-logo">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h1>Xác thực OTP</h1>
                    <p>Nhập mã xác thực để hoàn tất thao tác</p>
                </div>
            </div>

            <div class="auth-body">
                <!-- OTP Information -->
                <div class="otp-info" id="otpInfo">
                    <h3><i class="fas fa-info-circle"></i> Mã xác thực đã được gửi</h3>
                    <div class="otp-destination" id="otpDestination">+84*******123</div>
                    <div class="otp-type-badge" id="otpTypeBadge">SMS</div>
                </div>

                <!-- Success/Error/Warning Messages -->
                <div id="successMessage" class="success-message">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>
                <div id="warningMessage" class="warning-message">
                    <i class="fas fa-exclamation-triangle"></i> <span id="warningText"></span>
                </div>

                <!-- OTP Timer -->
                <div class="countdown-timer" id="otpTimer">
                    <div>Mã OTP có hiệu lực trong:</div>
                    <div class="timer-display" id="timerDisplay">05:00</div>
                </div>

                <!-- OTP Input Form -->
                <form id="otpVerificationForm">
                    <div class="form-group">
                        <div class="otp-input-container">
                            <input type="text" class="otp-input" id="otp1" maxlength="1" data-index="0">
                            <input type="text" class="otp-input" id="otp2" maxlength="1" data-index="1">
                            <input type="text" class="otp-input" id="otp3" maxlength="1" data-index="2">
                            <input type="text" class="otp-input" id="otp4" maxlength="1" data-index="3">
                            <input type="text" class="otp-input" id="otp5" maxlength="1" data-index="4">
                            <input type="text" class="otp-input" id="otp6" maxlength="1" data-index="5">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="verifyBtn" disabled>
                        <i class="fas fa-check"></i>
                        Xác thực OTP
                    </button>
                </form>

                <!-- Resend Section -->
                <div class="resend-section">
                    <div class="resend-timer" id="resendTimer" style="display: none;">
                        Có thể gửi lại sau: <span id="resendCountdown">60</span> giây
                    </div>
                    <button type="button" class="btn btn-warning" id="resendOtpBtn">
                        <i class="fas fa-redo"></i>
                        Gửi lại mã OTP
                    </button>
                </div>

                <!-- Verification Attempts -->
                <div class="verification-attempts" id="verificationAttempts">
                    Số lần thử: <span id="attemptCount">0</span>/5
                </div>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <div class="auth-links">
                    <a href="#" onclick="changeOtpMethod('sms')">
                        <i class="fas fa-sms"></i>
                        Nhận qua SMS
                    </a>
                    <a href="#" onclick="changeOtpMethod('email')">
                        <i class="fas fa-envelope"></i>
                        Nhận qua Email
                    </a>
                    <a href="dang-nhap.html">
                        <i class="fas fa-sign-in-alt"></i>
                        Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../script.js"></script>
    <script src="../../config/auth.js"></script>
    <script>
        let otpCode = '';
        let otpTimer = 300; // 5 minutes
        let resendTimer = 60; // 1 minute
        let attemptCount = 0;
        let maxAttempts = 5;
        let timerInterval = null;
        let resendInterval = null;
        let otpType = 'sms';
        let otpDestination = '';
        let verificationPurpose = '';

        document.addEventListener('DOMContentLoaded', function() {
            // Get parameters from URL
            const urlParams = new URLSearchParams(window.location.search);
            otpType = urlParams.get('type') || 'sms';
            otpDestination = urlParams.get('destination') || '';
            verificationPurpose = urlParams.get('purpose') || 'login';

            if (!otpDestination) {
                showMessage('error', 'Thông tin xác thực không hợp lệ');
                setTimeout(() => {
                    window.location.href = 'dang-nhap.html';
                }, 3000);
                return;
            }

            // Initialize OTP verification
            initializeOtpVerification();
        });

        function initializeOtpVerification() {
            // Display OTP information
            displayOtpInfo();

            // Generate and "send" OTP
            generateAndSendOtp();

            // Setup form handlers
            setupFormHandlers();

            // Setup OTP input handlers
            setupOtpInputs();

            // Start timers
            startOtpTimer();
            startResendTimer();
        }

        function displayOtpInfo() {
            const destinationElement = document.getElementById('otpDestination');
            const badgeElement = document.getElementById('otpTypeBadge');

            // Mask the destination for security
            let maskedDestination = '';
            if (otpType === 'sms') {
                maskedDestination = maskPhoneNumber(otpDestination);
                badgeElement.textContent = 'SMS';
                badgeElement.className = 'otp-type-badge otp-type-sms';
            } else if (otpType === 'email') {
                maskedDestination = maskEmail(otpDestination);
                badgeElement.textContent = 'Email';
                badgeElement.className = 'otp-type-badge otp-type-email';
            } else if (otpType === 'app') {
                maskedDestination = 'Ứng dụng xác thực';
                badgeElement.textContent = 'Authenticator App';
                badgeElement.className = 'otp-type-badge otp-type-app';
            }

            destinationElement.textContent = maskedDestination;
        }

        function maskPhoneNumber(phone) {
            if (phone.length < 4) return phone;
            return phone.substring(0, 3) + '*'.repeat(phone.length - 6) + phone.substring(phone.length - 3);
        }

        function maskEmail(email) {
            const [username, domain] = email.split('@');
            if (username.length <= 2) return email;
            return username.substring(0, 2) + '*'.repeat(username.length - 2) + '@' + domain;
        }

        function generateAndSendOtp() {
            otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('Generated OTP:', otpCode); // In production, this would be sent via SMS/Email
            
            showMessage('success', `Mã OTP đã được gửi đến ${otpType === 'sms' ? 'số điện thoại' : 'email'} của bạn`);
        }

        function setupFormHandlers() {
            const form = document.getElementById('otpVerificationForm');
            form.addEventListener('submit', handleOtpVerification);

            const resendBtn = document.getElementById('resendOtpBtn');
            resendBtn.addEventListener('click', resendOtp);
        }

        function setupOtpInputs() {
            const inputs = document.querySelectorAll('.otp-input');
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => handleOtpInput(e, index));
                input.addEventListener('keydown', (e) => handleOtpKeydown(e, index));
                input.addEventListener('paste', handleOtpPaste);
            });

            // Focus first input
            inputs[0].focus();
        }

        function handleOtpInput(e, index) {
            const inputs = document.querySelectorAll('.otp-input');
            const value = e.target.value.replace(/\D/g, ''); // Only allow digits
            
            e.target.value = value;
            
            if (value) {
                e.target.classList.add('filled');
                // Move to next input
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            } else {
                e.target.classList.remove('filled');
            }

            // Check if all inputs are filled
            checkOtpComplete();
        }

        function handleOtpKeydown(e, index) {
            const inputs = document.querySelectorAll('.otp-input');
            
            // Handle backspace
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
                inputs[index - 1].value = '';
                inputs[index - 1].classList.remove('filled');
            }
            
            // Handle arrow keys
            if (e.key === 'ArrowLeft' && index > 0) {
                inputs[index - 1].focus();
            }
            if (e.key === 'ArrowRight' && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        }

        function handleOtpPaste(e) {
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text').replace(/\D/g, '');
            const inputs = document.querySelectorAll('.otp-input');
            
            for (let i = 0; i < Math.min(pastedData.length, inputs.length); i++) {
                inputs[i].value = pastedData[i];
                inputs[i].classList.add('filled');
            }
            
            checkOtpComplete();
        }

        function checkOtpComplete() {
            const inputs = document.querySelectorAll('.otp-input');
            const verifyBtn = document.getElementById('verifyBtn');
            
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            verifyBtn.disabled = !allFilled;
        }

        function handleOtpVerification(e) {
            e.preventDefault();
            
            const inputs = document.querySelectorAll('.otp-input');
            const enteredOtp = Array.from(inputs).map(input => input.value).join('');
            
            attemptCount++;
            updateAttemptDisplay();
            
            if (enteredOtp === otpCode) {
                // OTP is correct
                showMessage('success', 'Mã OTP xác thực thành công!');
                
                // Clear timers
                clearInterval(timerInterval);
                clearInterval(resendInterval);
                
                // Mark OTP as verified and redirect based on purpose
                handleSuccessfulVerification();
                
            } else {
                // OTP is incorrect
                showMessage('error', `Mã OTP không đúng. Còn lại ${maxAttempts - attemptCount} lần thử.`);
                
                // Add error styling to inputs
                inputs.forEach(input => {
                    input.classList.add('error');
                    setTimeout(() => input.classList.remove('error'), 500);
                });
                
                // Clear inputs
                inputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                inputs[0].focus();
                
                // Check if max attempts reached
                if (attemptCount >= maxAttempts) {
                    showMessage('error', 'Bạn đã nhập sai quá nhiều lần. Vui lòng thử lại sau.');
                    setTimeout(() => {
                        window.location.href = 'dang-nhap.html';
                    }, 3000);
                }
            }
        }

        function handleSuccessfulVerification() {
            // Store verification status
            const verificationData = {
                verified: true,
                timestamp: Date.now(),
                purpose: verificationPurpose,
                destination: otpDestination,
                type: otpType
            };
            
            localStorage.setItem('otpVerification', JSON.stringify(verificationData));
            
            // Redirect based on purpose
            setTimeout(() => {
                switch (verificationPurpose) {
                    case 'login':
                        window.location.href = '../../../dashboard/dashboard.html';
                        break;
                    case 'password_reset':
                        window.location.href = 'reset_password.html';
                        break;
                    case 'email_change':
                        window.location.href = 'verify_email_change.html';
                        break;
                    default:
                        window.location.href = '../../../dashboard/dashboard.html';
                }
            }, 2000);
        }

        function resendOtp() {
            if (resendTimer > 0) {
                showMessage('warning', `Vui lòng đợi ${resendTimer} giây trước khi gửi lại`);
                return;
            }

            // Generate new OTP
            generateAndSendOtp();
            
            // Reset timers
            otpTimer = 300;
            startOtpTimer();
            startResendTimer();
            
            // Clear inputs
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            inputs[0].focus();
        }

        function changeOtpMethod(newType) {
            if (newType === otpType) return;
            
            const currentUrl = new URL(window.location);
            currentUrl.searchParams.set('type', newType);
            
            if (newType === 'email') {
                const currentUser = AuthManager?.getCurrentUser();
                if (currentUser?.email) {
                    currentUrl.searchParams.set('destination', currentUser.email);
                }
            }
            
            window.location.href = currentUrl.toString();
        }

        function startOtpTimer() {
            const timerDisplay = document.getElementById('timerDisplay');
            const timerContainer = document.getElementById('otpTimer');
            
            timerInterval = setInterval(() => {
                otpTimer--;
                
                const minutes = Math.floor(otpTimer / 60);
                const seconds = otpTimer % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (otpTimer <= 0) {
                    clearInterval(timerInterval);
                    timerContainer.classList.add('expired');
                    timerDisplay.textContent = 'Hết hạn';
                    showMessage('warning', 'Mã OTP đã hết hạn. Vui lòng yêu cầu mã mới.');
                }
            }, 1000);
        }

        function startResendTimer() {
            const resendTimerDiv = document.getElementById('resendTimer');
            const resendCountdown = document.getElementById('resendCountdown');
            const resendBtn = document.getElementById('resendOtpBtn');
            
            resendTimer = 60;
            resendTimerDiv.style.display = 'block';
            resendBtn.disabled = true;
            
            resendInterval = setInterval(() => {
                resendTimer--;
                resendCountdown.textContent = resendTimer;
                
                if (resendTimer <= 0) {
                    clearInterval(resendInterval);
                    resendTimerDiv.style.display = 'none';
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        function updateAttemptDisplay() {
            const attemptCountElement = document.getElementById('attemptCount');
            const attemptsElement = document.getElementById('verificationAttempts');
            
            attemptCountElement.textContent = attemptCount;
            
            if (attemptCount >= maxAttempts - 1) {
                attemptsElement.classList.add('attempts-danger');
            } else if (attemptCount >= maxAttempts - 2) {
                attemptsElement.classList.add('attempts-warning');
            }
        }

        function showMessage(type, message) {
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            const warningMsg = document.getElementById('warningMessage');
            
            // Hide all messages first
            hideMessages();
            
            // Show appropriate message
            if (type === 'success') {
                document.getElementById('successText').textContent = message;
                successMsg.style.display = 'block';
            } else if (type === 'error') {
                document.getElementById('errorText').textContent = message;
                errorMsg.style.display = 'block';
            } else if (type === 'warning') {
                document.getElementById('warningText').textContent = message;
                warningMsg.style.display = 'block';
            }
            
            // Auto hide after 5 seconds
            setTimeout(hideMessages, 5000);
        }

        function hideMessages() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('warningMessage').style.display = 'none';
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (timerInterval) clearInterval(timerInterval);
            if (resendInterval) clearInterval(resendInterval);
        });
    </script>
</body>
</html>
