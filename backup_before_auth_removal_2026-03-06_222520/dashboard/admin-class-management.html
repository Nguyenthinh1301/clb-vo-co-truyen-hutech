<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .class-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .class-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .class-header h3 {
            margin: 0;
            color: #2c3e50;
            font-size: 18px;
        }

        .class-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .class-status.active {
            background: #d4edda;
            color: #155724;
        }

        .class-status.inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .class-info {
            margin: 15px 0;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            color: #666;
            font-size: 14px;
        }

        .info-item i {
            width: 20px;
            color: #c41e3a;
        }

        .class-stats {
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a, #e74c3c);
            transition: width 0.3s;
        }

        .class-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .class-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-view {
            background: #3498db;
            color: white;
        }

        .btn-view:hover {
            background: #2980b9;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
        }

        .btn-edit:hover {
            background: #e67e22;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content.large {
            max-width: 900px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            color: #2c3e50;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-primary {
            background: #c41e3a;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary:hover {
            background: #a01729;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .students-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .students-table th,
        .students-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .students-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        .students-table tr:hover {
            background: #f8f9fa;
        }

        .btn-remove {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-remove:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #c41e3a;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-fist-raised"></i>
                    <span>VCT HUTECH Admin</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-tab">
                    <i class="fas fa-home"></i>
                    <span>Tổng quan</span>
                </a>
                <a href="admin-user-management.html" class="nav-tab">
                    <i class="fas fa-users"></i>
                    <span>Quản lý thành viên</span>
                </a>
                <a href="admin-class-management.html" class="nav-tab active">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Quản lý lớp học</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" class="nav-tab" onclick="Auth.logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="dashboard-header">
                <div class="header-left">
                    <h1><i class="fas fa-graduation-cap"></i> Quản Lý Lớp Học</h1>
                </div>
                <div class="header-right">
                    <button class="btn-primary" onclick="showCreateClassModal()">
                        <i class="fas fa-plus"></i> Tạo Lớp Mới
                    </button>
                </div>
            </header>
            
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Tổng Lớp Học</h3>
                    <div class="stat-value" id="totalClasses">0</div>
                </div>
                <div class="stat-card">
                    <h3>Lớp Đang Hoạt Động</h3>
                    <div class="stat-value" id="activeClasses">0</div>
                </div>
                <div class="stat-card">
                    <h3>Tổng Học Viên</h3>
                    <div class="stat-value" id="totalStudents">0</div>
                </div>
                <div class="stat-card">
                    <h3>Tỷ Lệ Lấp Đầy</h3>
                    <div class="stat-value" id="fillRate">0%</div>
                </div>
            </div>
            
            <div id="classList" class="classes-grid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Đang tải danh sách lớp học...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../website/config/config.js"></script>
    <script src="../website/config/api-config.js"></script>
    <script src="../website/config/api-client.js"></script>
    <script src="../website/config/auth.js"></script>
    <script src="js/admin-class-management.js"></script>
</body>
</html>
