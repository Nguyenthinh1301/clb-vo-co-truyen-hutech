<div class="admin-points-management">
    <!-- Header -->
    <div class="section-header">
        <div>
            <h2><i class="fas fa-star"></i> Quản lý Tích điểm</h2>
            <p class="subtitle">Quản lý điểm thưởng cho thành viên</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="AdminPoints.showAddPointsModal()">
                <i class="fas fa-plus"></i> Thêm điểm
            </button>
            <button class="btn btn-success" onclick="AdminPoints.exportPointsReport()">
                <i class="fas fa-file-excel"></i> Xuất báo cáo
            </button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 14px; opacity: 0.9;">Tổng điểm đã phát</div>
                    <div style="font-size: 32px; font-weight: bold; margin-top: 10px;" id="totalPointsIssued">0</div>
                </div>
                <i class="fas fa-coins" style="font-size: 48px; opacity: 0.3;"></i>
            </div>
        </div>

        <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 20px; border-radius: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 14px; opacity: 0.9;">Thành viên có điểm</div>
                    <div style="font-size: 32px; font-weight: bold; margin-top: 10px;" id="membersWithPoints">0</div>
                </div>
                <i class="fas fa-users" style="font-size: 48px; opacity: 0.3;"></i>
            </div>
        </div>

        <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 20px; border-radius: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 14px; opacity: 0.9;">Giao dịch tháng này</div>
                    <div style="font-size: 32px; font-weight: bold; margin-top: 10px;" id="monthlyTransactions">0</div>
                </div>
                <i class="fas fa-exchange-alt" style="font-size: 48px; opacity: 0.3;"></i>
            </div>
        </div>

        <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; padding: 20px; border-radius: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 14px; opacity: 0.9;">Điểm TB/Thành viên</div>
                    <div style="font-size: 32px; font-weight: bold; margin-top: 10px;" id="avgPointsPerMember">0</div>
                </div>
                <i class="fas fa-chart-line" style="font-size: 48px; opacity: 0.3;"></i>
            </div>
        </div>
    </div>

    <!-- Search and Filter -->
    <div class="dashboard-card" style="margin-bottom: 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Tìm kiếm thành viên</label>
                <input type="text" id="searchMember" placeholder="Tên, email, MSSV..." 
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                    onkeyup="AdminPoints.searchMembers()">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Lọc theo hạng</label>
                <select id="filterRank" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                    onchange="AdminPoints.filterByRank()">
                    <option value="">Tất cả hạng</option>
                    <option value="bronze">Đồng</option>
                    <option value="silver">Bạc</option>
                    <option value="gold">Vàng</option>
                    <option value="platinum">Bạch Kim</option>
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Sắp xếp</label>
                <select id="sortBy" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                    onchange="AdminPoints.sortMembers()">
                    <option value="points_desc">Điểm cao → thấp</option>
                    <option value="points_asc">Điểm thấp → cao</option>
                    <option value="name_asc">Tên A → Z</option>
                    <option value="recent">Hoạt động gần đây</option>
                </select>
            </div>
            <button class="btn btn-secondary" onclick="AdminPoints.resetFilters()">
                <i class="fas fa-redo"></i> Reset
            </button>
        </div>
    </div>

    <!-- Members List -->
    <div class="dashboard-card">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-list"></i> Danh sách thành viên</h3>
        <div id="membersListContainer">
            <div style="text-align: center; padding: 40px; color: #999;">
                <i class="fas fa-spinner fa-spin" style="font-size: 32px;"></i>
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>
</div>

<!-- Add Points Modal -->
<div id="addPointsModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> Thêm điểm cho thành viên</h3>
            <button class="close-btn" onclick="AdminPoints.closeAddPointsModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="addPointsForm" onsubmit="AdminPoints.submitAddPoints(event)">
                <div class="form-group">
                    <label>Chọn thành viên <span style="color: red;">*</span></label>
                    <select id="selectMember" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        <option value="">-- Chọn thành viên --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Loại giao dịch <span style="color: red;">*</span></label>
                    <select id="transactionType" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                        onchange="AdminPoints.updatePointsInput()">
                        <option value="">-- Chọn loại --</option>
                        <option value="attendance">Điểm danh (+10 điểm)</option>
                        <option value="event_participation">Tham gia sự kiện (+20 điểm)</option>
                        <option value="competition_win">Thắng giải (+50 điểm)</option>
                        <option value="achievement">Thành tích đặc biệt (+30 điểm)</option>
                        <option value="referral">Giới thiệu thành viên (+15 điểm)</option>
                        <option value="custom">Tùy chỉnh</option>
                        <option value="deduct">Trừ điểm</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Số điểm <span style="color: red;">*</span></label>
                    <input type="number" id="pointsAmount" required 
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                        placeholder="Nhập số điểm">
                </div>

                <div class="form-group">
                    <label>Ghi chú</label>
                    <textarea id="pointsNote" rows="3" 
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                        placeholder="Ghi chú về giao dịch này..."></textarea>
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="AdminPoints.closeAddPointsModal()">
                        Hủy
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i> Xác nhận
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- View Member Details Modal -->
<div id="memberDetailsModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 800px;">
        <div class="modal-header">
            <h3><i class="fas fa-user"></i> Chi tiết thành viên</h3>
            <button class="close-btn" onclick="AdminPoints.closeMemberDetailsModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="memberDetailsContent">
            <!-- Content will be loaded dynamically -->
        </div>
    </div>
</div>
