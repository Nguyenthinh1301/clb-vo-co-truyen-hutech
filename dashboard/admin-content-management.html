<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nội dung - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .content-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .content-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }
        
        .content-tab:hover {
            color: #333;
        }
        
        .content-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        
        .content-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .content-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .content-item:hover {
            background: #f8f9fa;
        }
        
        .content-item:last-child {
            border-bottom: none;
        }
        
        .content-info {
            flex: 1;
        }
        
        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .content-meta {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .content-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .btn-edit {
            background: #3498db;
            color: white;
        }
        
        .btn-edit:hover {
            background: #2980b9;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-active {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-draft {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-urgent {
            background: #f8d7da;
            color: #721c24;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        
        .btn-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="user-info">
                <h2>Quản lý Nội dung</h2>
                <p>Quản lý thông báo và tin tức cho thành viên</p>
            </div>
            <div class="header-actions">
                <a href="dashboard.html" class="btn-secondary" style="text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
                    <i class="fas fa-arrow-left"></i> Quay lại Dashboard
                </a>
            </div>
        </div>

        <!-- Content Tabs -->
        <div class="content-tabs">
            <button class="content-tab active" onclick="switchTab('announcements')">
                <i class="fas fa-bullhorn"></i> Thông báo
            </button>
            <button class="content-tab" onclick="switchTab('news')">
                <i class="fas fa-newspaper"></i> Tin tức
            </button>
        </div>

        <!-- Announcements Section -->
        <div id="announcements-section" class="content-section active">
            <div class="content-header">
                <h3>Danh sách Thông báo</h3>
                <button class="btn-primary" onclick="openAnnouncementModal()">
                    <i class="fas fa-plus"></i> Tạo thông báo mới
                </button>
            </div>
            <div id="announcements-list" class="content-list">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Đang tải...
                </div>
            </div>
        </div>

        <!-- News Section -->
        <div id="news-section" class="content-section">
            <div class="content-header">
                <h3>Danh sách Tin tức</h3>
                <button class="btn-primary" onclick="openNewsModal()">
                    <i class="fas fa-plus"></i> Tạo tin tức mới
                </button>
            </div>
            <div id="news-list" class="content-list">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Đang tải...
                </div>
            </div>
        </div>
    </div>

    <!-- Announcement Modal -->
    <div id="announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="announcement-modal-title">Tạo thông báo mới</h3>
                <button class="btn-close" onclick="closeAnnouncementModal()">&times;</button>
            </div>
            <form id="announcement-form">
                <input type="hidden" id="announcement-id">
                <div class="form-group">
                    <label class="form-label">Tiêu đề *</label>
                    <input type="text" class="form-control" id="announcement-title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nội dung *</label>
                    <textarea class="form-control" id="announcement-content" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Loại</label>
                    <select class="form-control" id="announcement-type">
                        <option value="general">Thông thường</option>
                        <option value="urgent">Khẩn cấp</option>
                        <option value="info">Thông tin</option>
                        <option value="warning">Cảnh báo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Độ ưu tiên</label>
                    <select class="form-control" id="announcement-priority">
                        <option value="low">Thấp</option>
                        <option value="normal" selected>Bình thường</option>
                        <option value="high">Cao</option>
                        <option value="urgent">Khẩn cấp</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Đối tượng</label>
                    <select class="form-control" id="announcement-audience">
                        <option value="all">Tất cả</option>
                        <option value="student">Học viên</option>
                        <option value="instructor">Huấn luyện viên</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Ngày hết hạn (tùy chọn)</label>
                    <input type="datetime-local" class="form-control" id="announcement-expires">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeAnnouncementModal()">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- News Modal -->
    <div id="news-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="news-modal-title">Tạo tin tức mới</h3>
                <button class="btn-close" onclick="closeNewsModal()">&times;</button>
            </div>
            <form id="news-form">
                <input type="hidden" id="news-id">
                <div class="form-group">
                    <label class="form-label">Tiêu đề *</label>
                    <input type="text" class="form-control" id="news-title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Tóm tắt</label>
                    <textarea class="form-control" id="news-excerpt" style="min-height: 80px;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Nội dung *</label>
                    <textarea class="form-control" id="news-content" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Danh mục</label>
                    <select class="form-control" id="news-category">
                        <option value="general">Chung</option>
                        <option value="event">Sự kiện</option>
                        <option value="achievement">Thành tích</option>
                        <option value="training">Đào tạo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Trạng thái</label>
                    <select class="form-control" id="news-status">
                        <option value="draft">Nháp</option>
                        <option value="published">Xuất bản</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeNewsModal()">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../website/config/config.js"></script>
    <script src="../website/config/api-config.js"></script>
    <script src="../website/config/api-client.js"></script>
    <script src="../website/config/backend-checker.js"></script>
    <script src="../website/config/auth.js"></script>
    <script src="js/admin-content-management.js"></script>
</body>
</html>
