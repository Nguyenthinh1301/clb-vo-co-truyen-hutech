<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Users API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #a01729;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .user-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status-pending {
            color: #856404;
            background: #fff3cd;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .status-active {
            color: #155724;
            background: #d4edda;
            padding: 2px 8px;
            border-radius: 4px;
        }
        input {
            padding: 8px;
            width: 300px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Admin Users API</h1>

    <div class="section">
        <h2>1. Login</h2>
        <input type="email" id="loginEmail" value="admin@test.com" placeholder="Email">
        <input type="password" id="loginPassword" value="Admin123456" placeholder="Password">
        <button onclick="testLogin()">Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="section">
        <h2>2. Get Users</h2>
        <button onclick="getUsers()">Load Users</button>
        <button onclick="getUnassignedUsers()">Load Unassigned Users</button>
        <div id="usersResult"></div>
    </div>

    <div class="section">
        <h2>3. Get Classes</h2>
        <button onclick="getClasses()">Load Classes</button>
        <div id="classesResult"></div>
    </div>

    <div class="section">
        <h2>4. Statistics</h2>
        <button onclick="getStats()">Load Statistics</button>
        <div id="statsResult"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3001/api';
        let authToken = null;

        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const resultDiv = document.getElementById('loginResult');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                
                if (result.success) {
                    authToken = result.data.token;
                    localStorage.setItem('token', authToken);
                    resultDiv.innerHTML = `
                        <div style="color: green;">
                            <h3>✅ Login Successful!</h3>
                            <p><strong>User:</strong> ${result.data.user.full_name}</p>
                            <p><strong>Role:</strong> ${result.data.user.role}</p>
                            <p><strong>Token:</strong> ${authToken.substring(0, 50)}...</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div style="color: red;">❌ ${result.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${error.message}</div>`;
            }
        }

        async function getUsers() {
            const resultDiv = document.getElementById('usersResult');
            
            if (!authToken) {
                resultDiv.innerHTML = '<div style="color: red;">Please login first!</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/users?page=1&limit=20`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    let users = result.data.users;
                    
                    // Handle nested array from MSSQL adapter
                    if (Array.isArray(users[0])) {
                        users = users[0];
                    }

                    resultDiv.innerHTML = `
                        <h3>✅ Found ${users.length} users</h3>
                        ${users.map(user => `
                            <div class="user-card">
                                <strong>${user.first_name} ${user.last_name}</strong> (${user.email})
                                <br>
                                <span>Role: ${user.role}</span> | 
                                <span class="status-${user.membership_status}">${user.membership_status}</span>
                                <br>
                                <small>ID: ${user.id} | Phone: ${user.phone_number || 'N/A'}</small>
                            </div>
                        `).join('')}
                    `;
                } else {
                    resultDiv.innerHTML = `<div style="color: red;">❌ ${result.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${error.message}</div>`;
            }
        }

        async function getUnassignedUsers() {
            const resultDiv = document.getElementById('usersResult');
            
            if (!authToken) {
                resultDiv.innerHTML = '<div style="color: red;">Please login first!</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/class-management/unassigned-users`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    const users = result.data;

                    resultDiv.innerHTML = `
                        <h3>✅ Found ${users.length} unassigned users</h3>
                        ${users.map(user => `
                            <div class="user-card">
                                <strong>${user.full_name || user.first_name + ' ' + user.last_name}</strong> (${user.email})
                                <br>
                                <span class="status-${user.membership_status}">${user.membership_status}</span>
                                <br>
                                <small>ID: ${user.id} | Phone: ${user.phone_number || 'N/A'}</small>
                            </div>
                        `).join('')}
                    `;
                } else {
                    resultDiv.innerHTML = `<div style="color: red;">❌ ${result.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${error.message}</div>`;
            }
        }

        async function getClasses() {
            const resultDiv = document.getElementById('classesResult');
            
            if (!authToken) {
                resultDiv.innerHTML = '<div style="color: red;">Please login first!</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/classes`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    const classes = result.data;

                    resultDiv.innerHTML = `
                        <h3>✅ Found ${classes.length} classes</h3>
                        ${classes.map(cls => `
                            <div class="user-card">
                                <strong>${cls.name}</strong> (ID: ${cls.id})
                                <br>
                                Schedule: ${cls.schedule || 'N/A'}
                                <br>
                                Location: ${cls.location || 'N/A'}
                                <br>
                                Capacity: ${cls.current_students}/${cls.max_students || '∞'}
                            </div>
                        `).join('')}
                    `;
                } else {
                    resultDiv.innerHTML = `<div style="color: red;">❌ ${result.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${error.message}</div>`;
            }
        }

        async function getStats() {
            const resultDiv = document.getElementById('statsResult');
            
            if (!authToken) {
                resultDiv.innerHTML = '<div style="color: red;">Please login first!</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/dashboard-stats`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    const stats = result.data.stats;

                    resultDiv.innerHTML = `
                        <h3>✅ Statistics</h3>
                        <pre>${JSON.stringify(stats, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<div style="color: red;">❌ ${result.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">❌ Error: ${error.message}</div>`;
            }
        }

        // Auto-login if token exists
        window.onload = function() {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                authToken = savedToken;
                document.getElementById('loginResult').innerHTML = `
                    <div style="color: green;">
                        <p>✅ Using saved token</p>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
