<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Auth page specific styles */
        .auth-page {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.05;
            z-index: 1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .auth-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.1;
            z-index: 1;
        }

        .auth-header-content {
            position: relative;
            z-index: 2;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .auth-logo i {
            font-size: 2.5rem;
            color: #3498db;
        }

        .auth-header h1 {
            margin: 0 0 10px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .auth-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
            line-height: 1.5;
        }

        .auth-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(248, 249, 250, 0.8);
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-group .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-top: 12px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2ecc71);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(149, 165, 166, 0.1);
            color: #2c3e50;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: rgba(149, 165, 166, 0.2);
            border-color: #bdc3c7;
        }

        .auth-links {
            text-align: center;
            margin-top: 30px;
        }

        .auth-links a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .auth-links a:hover {
            color: #2980b9;
            transform: translateY(-1px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9ecef;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .success-message,
        .error-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .progress-steps {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        .progress-step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e9ecef;
            position: relative;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            background: #3498db;
        }

        .progress-step.completed {
            background: #2ecc71;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back-home a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-home a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .auth-page {
                padding: 10px;
            }

            .auth-container {
                max-width: 100%;
                margin: 0 10px;
            }

            .auth-header {
                padding: 30px 20px 20px;
            }

            .auth-body {
                padding: 30px 20px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .back-home {
                position: static;
                text-align: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="back-home">
            <a href="../../index.html">
                <i class="fas fa-arrow-left"></i>
                Về trang chủ
            </a>
        </div>

        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-header-content">
                    <div class="auth-logo">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h1>Quên mật khẩu</h1>
                    <p>Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu</p>
                </div>
            </div>

            <div class="auth-body">
                <!-- Progress Steps -->
                <div class="progress-steps">
                    <div class="progress-step active" id="step1"></div>
                    <div class="progress-step" id="step2"></div>
                    <div class="progress-step" id="step3"></div>
                </div>

                <!-- Success/Error Messages -->
                <div id="successMessage" class="success-message">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <!-- Step 1: Email Input -->
                <div class="step-content active" id="stepContent1">
                    <form id="emailForm">
                        <div class="form-group">
                            <label for="email">Email đã đăng ký</label>
                            <div class="input-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="sendEmailBtn">
                            <i class="fas fa-paper-plane"></i>
                            Gửi hướng dẫn đặt lại
                        </button>
                    </form>
                </div>

                <!-- Step 2: Verification Code -->
                <div class="step-content" id="stepContent2">
                    <form id="verificationForm">
                        <div class="form-group">
                            <label for="verificationCode">Mã xác thực</label>
                            <div class="input-icon">
                                <i class="fas fa-key"></i>
                            </div>
                            <input type="text" id="verificationCode" name="verificationCode" placeholder="Nhập mã 6 chữ số" maxlength="6" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="verifyCodeBtn">
                            <i class="fas fa-check"></i>
                            Xác thực mã
                        </button>

                        <button type="button" class="btn btn-secondary" id="resendCodeBtn">
                            <i class="fas fa-redo"></i>
                            Gửi lại mã
                        </button>
                    </form>
                </div>

                <!-- Step 3: New Password -->
                <div class="step-content" id="stepContent3">
                    <form id="newPasswordForm">
                        <div class="form-group">
                            <label for="newPassword">Mật khẩu mới</label>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Xác nhận mật khẩu</label>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="resetPasswordBtn">
                            <i class="fas fa-save"></i>
                            Đặt lại mật khẩu
                        </button>
                    </form>
                </div>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <div class="auth-links">
                    <a href="dang-nhap.html">
                        <i class="fas fa-sign-in-alt"></i>
                        Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../script.js"></script>
    <script src="../../config/auth.js"></script>
    <script>
        let currentStep = 1;
        let resetEmail = '';
        let verificationCode = '';

        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            if (AuthManager && AuthManager.isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }

            initializeForgotPassword();
        });

        function initializeForgotPassword() {
            // Setup form handlers
            document.getElementById('emailForm').addEventListener('submit', handleEmailSubmit);
            document.getElementById('verificationForm').addEventListener('submit', handleVerificationSubmit);
            document.getElementById('newPasswordForm').addEventListener('submit', handlePasswordReset);
            document.getElementById('resendCodeBtn').addEventListener('click', resendVerificationCode);
        }

        function handleEmailSubmit(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage('error', 'Vui lòng nhập email');
                return;
            }

            // Check if email exists in system
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            
            if (!user) {
                showMessage('error', 'Email này chưa được đăng ký trong hệ thống');
                return;
            }

            resetEmail = email;
            
            // Simulate sending verification code
            verificationCode = generateVerificationCode();
            console.log('Verification code:', verificationCode); // In thực tế sẽ gửi qua email
            
            showMessage('success', `Mã xác thực đã được gửi đến ${email}`);
            
            setTimeout(() => {
                nextStep();
            }, 1500);
        }

        function handleVerificationSubmit(e) {
            e.preventDefault();
            
            const inputCode = document.getElementById('verificationCode').value.trim();
            
            if (!inputCode) {
                showMessage('error', 'Vui lòng nhập mã xác thực');
                return;
            }

            if (inputCode !== verificationCode) {
                showMessage('error', 'Mã xác thực không đúng');
                return;
            }

            showMessage('success', 'Mã xác thực hợp lệ');
            
            setTimeout(() => {
                nextStep();
            }, 1000);
        }

        function handlePasswordReset(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword || !confirmPassword) {
                showMessage('error', 'Vui lòng nhập đầy đủ mật khẩu');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('error', 'Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('error', 'Mật khẩu xác nhận không khớp');
                return;
            }

            // Update password in localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === resetEmail);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));
                
                showMessage('success', 'Mật khẩu đã được đặt lại thành công!');
                
                setTimeout(() => {
                    window.location.href = 'dang-nhap.html';
                }, 2000);
            } else {
                showMessage('error', 'Có lỗi xảy ra. Vui lòng thử lại');
            }
        }

        function resendVerificationCode() {
            verificationCode = generateVerificationCode();
            console.log('New verification code:', verificationCode);
            showMessage('success', 'Mã xác thực mới đã được gửi');
        }

        function generateVerificationCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function nextStep() {
            // Hide current step
            document.getElementById(`stepContent${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep}`).classList.add('completed');
            document.getElementById(`step${currentStep}`).classList.remove('active');
            
            // Show next step
            currentStep++;
            document.getElementById(`stepContent${currentStep}`).classList.add('active');
            document.getElementById(`step${currentStep}`).classList.add('active');
            
            hideMessages();
        }

        function showMessage(type, message) {
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            // Hide all messages first
            hideMessages();
            
            // Show appropriate message
            if (type === 'success') {
                document.getElementById('successText').textContent = message;
                successMsg.style.display = 'block';
            } else {
                document.getElementById('errorText').textContent = message;
                errorMsg.style.display = 'block';
            }
            
            // Auto hide after 5 seconds
            setTimeout(hideMessages, 5000);
        }

        function hideMessages() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Auto-format verification code input
        document.getElementById('verificationCode').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 6) value = value.slice(0, 6);
            e.target.value = value;
        });
    </script>
</body>
</html>
