<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Auth page specific styles */
        .auth-page {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.05;
            z-index: 1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .auth-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.1;
            z-index: 1;
        }

        .auth-header-content {
            position: relative;
            z-index: 2;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .auth-logo i {
            font-size: 2.5rem;
            color: #e74c3c;
        }

        .auth-header h1 {
            margin: 0 0 10px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .auth-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
            line-height: 1.5;
        }

        .auth-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(248, 249, 250, 0.8);
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-group .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-top: 12px;
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            margin-top: 12px;
            cursor: pointer;
            color: #7f8c8d;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: #3498db;
        }

        .password-strength {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            display: none;
        }

        .password-strength.visible {
            display: block;
        }

        .strength-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        .strength-weak .strength-fill {
            width: 33%;
            background: #e74c3c;
        }

        .strength-medium .strength-fill {
            width: 66%;
            background: #f39c12;
        }

        .strength-strong .strength-fill {
            width: 100%;
            background: #27ae60;
        }

        .strength-text {
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .strength-weak .strength-text {
            color: #e74c3c;
        }

        .strength-medium .strength-text {
            color: #f39c12;
        }

        .strength-strong .strength-text {
            color: #27ae60;
        }

        .password-requirements {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        .requirement.met {
            color: #27ae60;
        }

        .requirement.met i {
            color: #27ae60;
        }

        .requirement i {
            width: 12px;
            color: #e74c3c;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2ecc71);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(149, 165, 166, 0.1);
            color: #2c3e50;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: rgba(149, 165, 166, 0.2);
            border-color: #bdc3c7;
        }

        .auth-links {
            text-align: center;
            margin-top: 30px;
        }

        .auth-links a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .auth-links a:hover {
            color: #2980b9;
            transform: translateY(-1px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9ecef;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .success-message,
        .error-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .token-info {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .token-info i {
            color: #1976d2;
            margin-right: 8px;
        }

        .token-info .token-email {
            font-weight: 600;
            color: #1976d2;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back-home a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-home a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .auth-page {
                padding: 10px;
            }

            .auth-container {
                max-width: 100%;
                margin: 0 10px;
            }

            .auth-header {
                padding: 30px 20px 20px;
            }

            .auth-body {
                padding: 30px 20px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .back-home {
                position: static;
                text-align: center;
                margin-bottom: 20px;
            }

            .auth-links a {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="back-home">
            <a href="../../index.html">
                <i class="fas fa-arrow-left"></i>
                Về trang chủ
            </a>
        </div>

        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-header-content">
                    <div class="auth-logo">
                        <i class="fas fa-key"></i>
                    </div>
                    <h1>Đặt lại mật khẩu</h1>
                    <p>Tạo mật khẩu mới cho tài khoản của bạn</p>
                </div>
            </div>

            <div class="auth-body">
                <!-- Token Info -->
                <div class="token-info" id="tokenInfo">
                    <i class="fas fa-info-circle"></i>
                    Đặt lại mật khẩu cho: <span class="token-email" id="tokenEmail"></span>
                </div>

                <!-- Success/Error Messages -->
                <div id="successMessage" class="success-message">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <!-- Reset Password Form -->
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">Mật khẩu mới</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới" required>
                        <div class="password-toggle" onclick="togglePassword('newPassword')">
                            <i class="fas fa-eye" id="newPasswordToggle"></i>
                        </div>
                        
                        <!-- Password Strength Indicator -->
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar">
                                <div class="strength-fill"></div>
                            </div>
                            <div class="strength-text">Độ mạnh mật khẩu: <span id="strengthLabel">Yếu</span></div>
                        </div>

                        <!-- Password Requirements -->
                        <div class="password-requirements">
                            <div class="requirement" id="lengthReq">
                                <i class="fas fa-times"></i>
                                Ít nhất 8 ký tự
                            </div>
                            <div class="requirement" id="upperReq">
                                <i class="fas fa-times"></i>
                                Ít nhất 1 chữ hoa
                            </div>
                            <div class="requirement" id="lowerReq">
                                <i class="fas fa-times"></i>
                                Ít nhất 1 chữ thường
                            </div>
                            <div class="requirement" id="numberReq">
                                <i class="fas fa-times"></i>
                                Ít nhất 1 số
                            </div>
                            <div class="requirement" id="specialReq">
                                <i class="fas fa-times"></i>
                                Ít nhất 1 ký tự đặc biệt
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                        <div class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye" id="confirmPasswordToggle"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="resetBtn" disabled>
                        <i class="fas fa-save"></i>
                        Đặt lại mật khẩu
                    </button>
                </form>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <div class="auth-links">
                    <a href="dang-nhap.html">
                        <i class="fas fa-sign-in-alt"></i>
                        Quay lại đăng nhập
                    </a>
                    <a href="forgot.html">
                        <i class="fas fa-envelope"></i>
                        Gửi lại email
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../script.js"></script>
    <script src="../../config/auth.js"></script>
    <script>
        let resetToken = '';
        let resetEmail = '';

        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            if (AuthManager && AuthManager.isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            resetToken = urlParams.get('token');
            resetEmail = urlParams.get('email');

            if (!resetToken || !resetEmail) {
                showMessage('error', 'Liên kết đặt lại mật khẩu không hợp lệ hoặc đã hết hạn');
                setTimeout(() => {
                    window.location.href = 'forgot.html';
                }, 3000);
                return;
            }

            // Display email in token info
            document.getElementById('tokenEmail').textContent = resetEmail;

            // Verify token validity
            verifyResetToken();

            // Initialize form
            initializeResetForm();
        });

        function verifyResetToken() {
            // In a real application, this would verify the token with the server
            // For now, we'll simulate token verification
            const tokenData = localStorage.getItem(`resetToken_${resetToken}`);
            
            if (!tokenData) {
                showMessage('error', 'Mã đặt lại mật khẩu không hợp lệ hoặc đã hết hạn');
                setTimeout(() => {
                    window.location.href = 'forgot.html';
                }, 3000);
                return;
            }

            const { email, timestamp } = JSON.parse(tokenData);
            const now = Date.now();
            const tokenAge = now - timestamp;
            const maxAge = 15 * 60 * 1000; // 15 minutes

            if (tokenAge > maxAge) {
                localStorage.removeItem(`resetToken_${resetToken}`);
                showMessage('error', 'Mã đặt lại mật khẩu đã hết hạn. Vui lòng yêu cầu mã mới');
                setTimeout(() => {
                    window.location.href = 'forgot.html';
                }, 3000);
                return;
            }

            if (email !== resetEmail) {
                showMessage('error', 'Thông tin không khớp');
                setTimeout(() => {
                    window.location.href = 'forgot.html';
                }, 3000);
                return;
            }
        }

        function initializeResetForm() {
            const form = document.getElementById('resetPasswordForm');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const resetBtn = document.getElementById('resetBtn');

            // Password strength checking
            newPasswordInput.addEventListener('input', function() {
                checkPasswordStrength(this.value);
                validateForm();
            });

            // Confirm password checking
            confirmPasswordInput.addEventListener('input', validateForm);

            // Form submission
            form.addEventListener('submit', handlePasswordReset);
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const toggle = document.getElementById(fieldId + 'Toggle');
            
            if (field.type === 'password') {
                field.type = 'text';
                toggle.className = 'fas fa-eye-slash';
            } else {
                field.type = 'password';
                toggle.className = 'fas fa-eye';
            }
        }

        function checkPasswordStrength(password) {
            const strengthIndicator = document.getElementById('passwordStrength');
            const strengthLabel = document.getElementById('strengthLabel');
            
            if (password.length === 0) {
                strengthIndicator.classList.remove('visible');
                return;
            }

            strengthIndicator.classList.add('visible');
            
            let score = 0;
            const requirements = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /\d/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };

            // Update requirement indicators
            updateRequirement('lengthReq', requirements.length);
            updateRequirement('upperReq', requirements.upper);
            updateRequirement('lowerReq', requirements.lower);
            updateRequirement('numberReq', requirements.number);
            updateRequirement('specialReq', requirements.special);

            // Calculate score
            Object.values(requirements).forEach(met => {
                if (met) score++;
            });

            // Update strength indicator
            strengthIndicator.className = 'password-strength visible';
            
            if (score < 3) {
                strengthIndicator.classList.add('strength-weak');
                strengthLabel.textContent = 'Yếu';
            } else if (score < 5) {
                strengthIndicator.classList.add('strength-medium');
                strengthLabel.textContent = 'Trung bình';
            } else {
                strengthIndicator.classList.add('strength-strong');
                strengthLabel.textContent = 'Mạnh';
            }

            return score >= 4;
        }

        function updateRequirement(reqId, met) {
            const element = document.getElementById(reqId);
            const icon = element.querySelector('i');
            
            if (met) {
                element.classList.add('met');
                icon.className = 'fas fa-check';
            } else {
                element.classList.remove('met');
                icon.className = 'fas fa-times';
            }
        }

        function validateForm() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            
            const isPasswordStrong = checkPasswordStrength(newPassword);
            const passwordsMatch = newPassword === confirmPassword && newPassword.length > 0;
            
            resetBtn.disabled = !(isPasswordStrong && passwordsMatch);
        }

        function handlePasswordReset(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('error', 'Mật khẩu xác nhận không khớp');
                return;
            }

            if (!checkPasswordStrength(newPassword)) {
                showMessage('error', 'Mật khẩu chưa đủ mạnh');
                return;
            }

            // Update password in localStorage
            try {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.email === resetEmail);
                
                if (userIndex === -1) {
                    showMessage('error', 'Không tìm thấy tài khoản');
                    return;
                }

                // Update password
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));

                // Remove reset token
                localStorage.removeItem(`resetToken_${resetToken}`);

                showMessage('success', 'Mật khẩu đã được đặt lại thành công!');
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'dang-nhap.html?message=password_reset_success';
                }, 2000);

            } catch (error) {
                console.error('Error resetting password:', error);
                showMessage('error', 'Có lỗi xảy ra. Vui lòng thử lại!');
            }
        }

        function showMessage(type, message) {
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            // Hide all messages first
            hideMessages();
            
            // Show appropriate message
            if (type === 'success') {
                document.getElementById('successText').textContent = message;
                successMsg.style.display = 'block';
            } else {
                document.getElementById('errorText').textContent = message;
                errorMsg.style.display = 'block';
            }
            
            // Auto hide after 5 seconds
            setTimeout(hideMessages, 5000);
        }

        function hideMessages() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
