        function openCoachModal(id) {
            const data = coachData[id];
            if (!data) return;
            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalBelt').textContent = data.belt;
            const img = document.getElementById('modalAvatar');
            img.src = data.avatar || '';
            img.alt = data.name;
            img.style.display = data.avatar ? 'block' : 'none';
            document.getElementById('modalTableBody').innerHTML = data.details.map(row => `
                <tr>
                    <td class="detail-label"><i class="fas fa-chevron-right"></i> ${row.label}</td>
                    <td class="detail-value">${row.value}</td>
                </tr>
            `).join('');
            document.getElementById('coachModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCoachModal(event) {
            if (event && event.target !== document.getElementById('coachModal') && !event.target.classList.contains('coach-modal-close')) return;
            document.getElementById('coachModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('coachModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

    <script>
        // Load components
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error(`Error loading component ${componentPath}:`, error);
                // Show error in UI
                document.getElementById(elementId).innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #999;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px;"></i>
                        <p>Không thể tải nội dung. Vui lòng thử lại sau.</p>
                    </div>
                `;
            }
        }

        // Load all components
        document.addEventListener('DOMContentLoaded', async function() {
            await loadComponent('header-placeholder', 'components/header.html');
            await loadComponent('hero-placeholder', 'components/hero-section.html');
            await loadComponent('about-placeholder', 'components/about-section.html');
            await loadComponent('schedule-placeholder', 'components/schedule-section.html');
            await loadComponent('coaches-placeholder', 'components/coaches-section.html');
            await loadComponent('gallery-placeholder', 'components/gallery-section.html');
            await loadComponent('events-placeholder', 'components/events-section.html');
            await loadComponent('services-placeholder', 'components/services-section.html');
            await loadComponent('contact-placeholder', 'components/contact-section.html');
            await loadComponent('footer-placeholder', 'components/footer.html');
            
            // Hide loading overlay
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 1000);
            
            // Initialize components
            setTimeout(initializeComponents, 200);
        });

        function initializeComponents() {
            // Initialize contact form
            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Get form data
                    const formData = {
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        message: document.getElementById('message').value
                    };
                    
                    // Validate
                    if (!formData.name || !formData.email || !formData.phone) {
                        showNotification('Vui lòng điền đầy đủ thông tin bắt buộc!', 'error');
                        return;
                    }
                    
                    // Email validation
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(formData.email)) {
                        showNotification('Email không hợp lệ!', 'error');
                        return;
                    }
                    
                    // Phone validation
                    const phoneRegex = /^[0-9]{10,11}$/;
                    const cleanPhone = formData.phone.replace(/\D/g, '');
                    if (!phoneRegex.test(cleanPhone)) {
                        showNotification('Số điện thoại không hợp lệ!', 'error');
                        return;
                    }
                    
                    showNotification('Đang gửi...', 'info');

                    fetch('http://localhost:3001/api/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            showNotification('Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi trong thời gian sớm nhất.', 'success');
                            contactForm.reset();
                        } else {
                            showNotification(data.message || 'Gửi thất bại, vui lòng thử lại.', 'error');
                        }
                    })
                    .catch(() => {
                        showNotification('⚠️ Server chưa khởi động. Vui lòng chạy lệnh: cd backend && npm start', 'error');
                    });
                });
            }
        }
    </script>
