    <main>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script>
        // ===== BỘ ĐẾM SỰ KIỆN =====
        function initEventCountdowns() {
            const cards = document.querySelectorAll('.event-card[data-start]');
            if (!cards.length) return;

            function renderCountdown(el, diff) {
                el.classList.remove('hidden');
                const days    = Math.floor(diff / 86400000);
                const hours   = Math.floor((diff % 86400000) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `
                    <div class="countdown-unit"><span class="countdown-num">${String(days).padStart(2,'0')}</span><span class="countdown-label">Ngày</span></div>
                    <div class="countdown-unit"><span class="countdown-num">${String(hours).padStart(2,'0')}</span><span class="countdown-label">Giờ</span></div>
                    <div class="countdown-unit"><span class="countdown-num">${String(minutes).padStart(2,'0')}</span><span class="countdown-label">Phút</span></div>
                    <div class="countdown-unit"><span class="countdown-num">${String(seconds).padStart(2,'0')}</span><span class="countdown-label">Giây</span></div>
                `;
            }

            function update() {
                const now = new Date();
                cards.forEach(function(card) {
                    const startDate = new Date(card.dataset.start + 'T00:00:00');
                    const endDate   = new Date(card.dataset.end   + 'T23:59:59');
                    const badge     = card.querySelector('.event-badge-auto');
                    const countdown = card.querySelector('.event-countdown');
                    if (!badge || !countdown) return;

                    // Chỉ cập nhật countdown, không override badge (badge đã set từ API status)
                    if (card.classList.contains('status-upcoming') && now < startDate) {
                        renderCountdown(countdown, startDate - now);
                    } else if (card.classList.contains('status-ongoing') && now <= endDate) {
                        renderCountdown(countdown, endDate - now);
                    } else if (card.classList.contains('status-upcoming') && now >= startDate) {
                        // Sự kiện đã bắt đầu nhưng status vẫn upcoming → hiện countdown từ endDate
                        renderCountdown(countdown, endDate - now);
                    } else {
                        countdown.classList.add('hidden');
                    }
                });
            }

            update();
            setInterval(update, 1000);
        }

        // ===== LOAD COMPONENTS =====
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error('Error loading component ' + componentPath + ':', error);
                document.getElementById(elementId).innerHTML =
                    '<div style="padding:40px;text-align:center;color:#999;"><i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:20px;"></i><p>Không thể tải nội dung. Vui lòng thử lại sau.</p></div>';
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // ── Ưu tiên 1: Load header + hero + announcements song song (visible first) ──
            await Promise.all([
                loadComponent('header-placeholder',        'components/header.html'),
                loadComponent('hero-placeholder',          'components/hero-section.html'),
                loadComponent('announcements-placeholder', 'components/announcements-banner.html')
            ]);
            loadAnnouncementsBanner(); // chạy ngay sau khi HTML đã inject vào DOM

            // ── Ưu tiên 2: Load phần nội dung chính song song ──
            await Promise.all([
                loadComponent('about-placeholder',    'components/about-section.html'),
                loadComponent('schedule-placeholder', 'components/schedule-section.html'),
                loadComponent('coaches-placeholder',  'components/coaches-section.html'),
                loadComponent('gallery-placeholder',  'components/gallery-section.html'),
                loadComponent('events-placeholder',   'components/events-section.html')
            ]);
            loadEventsSection(); // chạy ngay sau khi HTML đã inject vào DOM
            loadGallerySection(); // chạy ngay sau khi gallery-section.html đã inject

            // ── Ưu tiên 3: Load footer + contact (ít quan trọng hơn) song song ──
            Promise.all([
                loadComponent('services-placeholder', 'components/services-section.html'),
                loadComponent('contact-placeholder',  'components/contact-section.html'),
                loadComponent('footer-placeholder',   'components/footer.html')
            ]).then(function() {
                initializeComponents();
            });

            // Ẩn loading overlay sớm hơn — nội dung chính đã sẵn sàng
            document.getElementById('loading-overlay').classList.add('hidden');
            setTimeout(initEventCountdowns, 100);

            // Dropdown Giới thiệu — chạy sau khi header đã load
            document.querySelectorAll('.nav-has-dropdown > .nav-link').forEach(function(toggle) {
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var item = this.closest('.nav-has-dropdown');
                    var isOpen = item.classList.contains('open');
                    document.querySelectorAll('.nav-has-dropdown').forEach(function(d) { d.classList.remove('open'); });
                    if (!isOpen) item.classList.add('open');
                });
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.nav-has-dropdown')) {
                    document.querySelectorAll('.nav-has-dropdown').forEach(function(d) { d.classList.remove('open'); });
                }
            });
        });

        // ===== BANNER THÔNG BÁO (Option 3 — Inline strip) =====
        async function loadAnnouncementsBanner() {
            var container = document.getElementById('ann-banner-list');
            if (!container) return;

            var API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : 'http://localhost:3001/api';
            var TYPE_ICN = { general: 'bullhorn', urgent: 'exclamation-circle', event: 'calendar-alt', training: 'dumbbell' };
            var TYPE_LBL = { general: 'Chung', urgent: 'Khẩn cấp', event: 'Sự kiện', training: 'Tập luyện' };
            var PRI_LBL  = { high: 'Ưu tiên cao', normal: 'Bình thường', low: 'Thấp' };
            var PRI_DOT  = { high: '🔴', normal: '🔵', low: '⚪', urgent: '🟠' };

            function fmtDate(s) {
                if (!s) return '';
                try { return new Date(s).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' }); }
                catch(e) { return ''; }
            }
            function trunc(s, n) {
                if (!s) return '';
                return s.length > n ? s.slice(0, n) + '…' : s;
            }

            function renderCard(a) {
                var priCls  = a.type === 'urgent' ? 'urgent' : (a.priority === 'high' ? 'high' : (a.priority === 'low' ? 'low' : 'normal'));
                var typeCls = a.type === 'urgent' ? ' urgent' : '';

                var expiryHtml = a.expires_at
                    ? '<div class="ann-card-expiry"><i class="fas fa-clock"></i> Hạn đến: ' + fmtDate(a.expires_at) + '</div>'
                    : '';

                return '<a class="ann-strip-card pri-' + priCls + '" href="views/thong-bao.html">' +
                    '<div class="ann-card-meta">' +
                        '<span class="ann-type-chip' + typeCls + '">' +
                            '<i class="fas fa-' + (TYPE_ICN[a.type] || 'bell') + '"></i>' +
                            (TYPE_LBL[a.type] || 'Chung') +
                        '</span>' +
                        '<span class="ann-card-date-lbl">' + fmtDate(a.created_at) + '</span>' +
                    '</div>' +
                    '<span class="ann-pri-pill ' + priCls + '">' +
                        (PRI_DOT[priCls] || '🔵') + ' ' + (a.type === 'urgent' ? 'Khẩn cấp' : (PRI_LBL[a.priority] || 'Bình thường')) +
                    '</span>' +
                    '<h4>' + trunc(a.title, 72) + '</h4>' +
                    '<p>' + trunc(a.content, 110) + '</p>' +
                    expiryHtml +
                    '<span class="ann-card-arrow"><i class="fas fa-arrow-right"></i></span>' +
                '</a>';
            }

            try {
                var res  = await fetch(API_BASE + '/cms/announcements?all=1', { cache: 'no-cache' });
                var data = await res.json();
                if (!data.success) throw new Error(data.message);

                // Lọc: chỉ active, chưa hết hạn
                var all = (data.data || []).filter(function(a) {
                    if (a.status !== 'active') return false;
                    if (a.expires_at && new Date(a.expires_at) < new Date()) return false;
                    return true;
                });

                // Sắp xếp: urgent > high > normal > low, rồi mới nhất trước
                var priOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
                all.sort(function(a, b) {
                    var pa = a.type === 'urgent' ? 0 : (priOrder[a.priority] !== undefined ? priOrder[a.priority] : 2);
                    var pb = b.type === 'urgent' ? 0 : (priOrder[b.priority] !== undefined ? priOrder[b.priority] : 2);
                    if (pa !== pb) return pa - pb;
                    return new Date(b.created_at) - new Date(a.created_at);
                });

                var list = all.slice(0, 3);

                if (!list.length) {
                    container.innerHTML =
                        '<div class="ann-strip-grid">' +
                            '<div class="ann-strip-empty">' +
                                '<i class="fas fa-bell-slash"></i>' +
                                '<p>Hiện chưa có thông báo mới.</p>' +
                            '</div>' +
                        '</div>';
                    return;
                }

                container.innerHTML = '<div class="ann-strip-grid">' + list.map(renderCard).join('') + '</div>';

            } catch(e) {
                // Khi API lỗi: hiện empty state thay vì ẩn section hoàn toàn
                container.innerHTML =
                    '<div class="ann-strip-grid">' +
                        '<div class="ann-strip-empty">' +
                            '<i class="fas fa-bell-slash"></i>' +
                            '<p>Hiện chưa có thông báo mới.</p>' +
                        '</div>' +
                    '</div>';
            }
        }

        // ===== TIN TỨC - SỰ KIỆN (kết nối API) =====
        (function() {
            var API_BASE   = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : 'http://localhost:3001/api';
            var activeTab  = 'events'; // 'events' | 'news'

            var CAT_LBL = { general:'Chung', training:'Tập luyện', competition:'Thi đấu', event:'Sự kiện', achievement:'Thành tích', announcement:'Thông báo' };
            var ST_LBL  = { upcoming:'Sắp diễn ra', ongoing:'Đang diễn ra', completed:'Đã kết thúc', cancelled:'Đã hủy' };
            var ST_CLS  = { upcoming:'status-upcoming', ongoing:'status-ongoing', completed:'status-ended', cancelled:'status-ended' };

            var MONTHS_VI = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

            function fmtDate(s) {
                if (!s) return '';
                try { return new Date(s).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' }); }
                catch(e) { return ''; }
            }
            function trunc(s, n) { return !s ? '' : s.length > n ? s.slice(0, n) + '…' : s; }
            function resolveImg(url) {
                if (!url) return null;
                if (url.startsWith('http')) return url;
                var base = window.APP_CONFIG ? window.APP_CONFIG.API_BASE.replace('/api','') : 'http://localhost:3001';
                return base + (url.startsWith('/') ? url : '/' + url);
            }

            // ── Parse date an toàn — convert UTC về local timezone ──
            function parseDateLocal(s) {
                if (!s) return null;
                // Nếu là ISO datetime có timezone (có Z hoặc +), parse rồi lấy local date
                if (s.indexOf('T') !== -1) {
                    var d = new Date(s);
                    // Trả về ngày theo local timezone (không phải UTC)
                    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
                }
                // Đã là YYYY-MM-DD thuần — parse local trực tiếp
                var parts = s.split('-');
                if (parts.length !== 3) return null;
                return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            }

            // ── Extract HH:MM từ ISO datetime hoặc time string ──
            function extractTime(s) {
                if (!s) return null;
                // ISO datetime: "1970-01-01T00:00:00.000Z" — MSSQL lưu time dạng UTC
                // Cần convert về local timezone
                if (s.indexOf('T') !== -1) {
                    var t = new Date(s);
                    // Dùng toLocaleTimeString để lấy giờ local
                    var h = t.getHours().toString().padStart(2, '0');
                    var m = t.getMinutes().toString().padStart(2, '0');
                    return h + ':' + m;
                }
                // Đã là "HH:MM" hoặc "HH:MM:SS"
                return s.substring(0, 5);
            }

            // ── Render event card (giữ nguyên style cũ) ──
            function renderEventCard(ev) {
                var d     = parseDateLocal(ev.date);
                var day   = d ? d.getDate() : '—';
                var month = d ? MONTHS_VI[d.getMonth()] : '';
                var year  = d ? d.getFullYear() : '';

                // Lấy date string dạng YYYY-MM-DD (local) để dùng cho countdown
                var dateStr = d
                    ? d.getFullYear() + '-' +
                      String(d.getMonth() + 1).padStart(2, '0') + '-' +
                      String(d.getDate()).padStart(2, '0')
                    : '';

                var stCls = ST_CLS[ev.status] || 'status-ended';
                var stLbl = ST_LBL[ev.status] || ev.status || '';

                var startTime = extractTime(ev.start_time);
                var endTime   = extractTime(ev.end_time);
                var timeStr   = startTime
                    ? (startTime + (endTime ? ' – ' + endTime : ''))
                    : 'Đang cập nhật';

                var hideCountdown = (ev.status === 'completed' || ev.status === 'cancelled');

                return '<div class="event-card ' + stCls + '" data-start="' + dateStr + '" data-end="' + dateStr + '">' +
                    '<div class="event-badge-auto">' + stLbl + '</div>' +
                    '<div class="event-date">' +
                        '<span class="event-day">'   + day   + '</span>' +
                        '<span class="event-month">' + month + '</span>' +
                        '<span class="event-year">'  + year  + '</span>' +
                    '</div>' +
                    '<div class="event-info">' +
                        '<h3>' + trunc(ev.name, 70) + '</h3>' +
                        '<p>'  + trunc(ev.description || '', 100) + '</p>' +
                        '<div class="event-meta">' +
                            (ev.location ? '<span><i class="fas fa-map-marker-alt"></i> ' + trunc(ev.location, 35) + '</span>' : '') +
                            '<span><i class="fas fa-clock"></i> ' + timeStr + '</span>' +
                        '</div>' +
                        '<div class="event-countdown' + (hideCountdown ? ' hidden' : '') + '"></div>' +
                    '</div>' +
                '</div>';
            }

            // ── Render news card ──
            function renderNewsCard(n) {
                var imgHtml = n.featured_image
                    ? '<img class="ev-news-img" src="' + resolveImg(n.featured_image) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                      '<div class="ev-news-img-placeholder" style="display:none;"><i class="fas fa-image"></i></div>'
                    : '<div class="ev-news-img-placeholder"><i class="fas fa-image"></i></div>';

                return '<div class="ev-news-card" onclick="window.location.href=\'views/tin-tuc.html\'">' +
                    imgHtml +
                    '<div class="ev-news-body">' +
                        '<span class="ev-news-cat"><i class="fas fa-tag"></i>' + (CAT_LBL[n.category] || n.category || 'Tin tức') + '</span>' +
                        '<h3>' + trunc(n.title, 75) + '</h3>' +
                        '<p>'  + trunc(n.excerpt || n.content || '', 110) + '</p>' +
                        '<div class="ev-news-date"><i class="fas fa-calendar"></i>' + fmtDate(n.published_at || n.created_at) + '</div>' +
                    '</div>' +
                '</div>';
            }

            // ── Skeleton ──
            function showSkeleton() {
                var grid = document.getElementById('ev-grid');
                if (!grid) return;
                grid.innerHTML =
                    '<div class="ev-skeleton"></div>' +
                    '<div class="ev-skeleton"></div>' +
                    '<div class="ev-skeleton"></div>' +
                    '<div class="ev-skeleton"></div>';
            }

            // ── Load events ──
            async function loadEvents() {
                showSkeleton();
                var grid    = document.getElementById('ev-grid');
                var viewAll = document.getElementById('ev-viewall');
                if (!grid) return;

                try {
                    // Lấy tất cả events, sort client-side: ongoing > upcoming > completed > cancelled
                    var res  = await fetch(API_BASE + '/cms/events?limit=20', { cache: 'default' });
                    var data = await res.json();
                    if (!data.success) throw new Error(data.message);

                    var all = (data.data && data.data.events) || [];

                    var order = { ongoing: 0, upcoming: 1, completed: 2, cancelled: 3 };
                    all.sort(function(a, b) {
                        var oa = order[a.status] !== undefined ? order[a.status] : 2;
                        var ob = order[b.status] !== undefined ? order[b.status] : 2;
                        if (oa !== ob) return oa - ob;
                        return new Date(a.date) - new Date(b.date);
                    });

                    var list = all.slice(0, 4);

                    if (!list.length) {
                        grid.innerHTML = '<div class="ev-empty"><i class="fas fa-calendar-alt"></i><p>Chưa có sự kiện nào.</p></div>';
                        return;
                    }

                    grid.innerHTML = list.map(renderEventCard).join('');
                    if (viewAll) { viewAll.href = 'views/su-kien.html'; viewAll.innerHTML = 'Xem tất cả sự kiện <i class="fas fa-arrow-right"></i>'; }

                    // Khởi động lại countdown cho cards mới
                    if (typeof initEventCountdowns === 'function') initEventCountdowns();

                } catch(e) {
                    console.warn('[Events] API lỗi:', e.message);
                    grid.innerHTML = '<div class="ev-empty"><i class="fas fa-calendar-alt"></i><p>Không thể tải sự kiện. Vui lòng thử lại sau.</p></div>';
                }
            }

            // ── Load news ──
            async function loadNews() {
                showSkeleton();
                var grid    = document.getElementById('ev-grid');
                var viewAll = document.getElementById('ev-viewall');
                if (!grid) return;

                try {
                    var res  = await fetch(API_BASE + '/cms/news?limit=4&status=published', { cache: 'default' });
                    var data = await res.json();
                    if (!data.success) throw new Error(data.message);

                    var list = (data.data && data.data.news) || [];

                    if (!list.length) {
                        grid.innerHTML = '<div class="ev-empty"><i class="fas fa-newspaper"></i><p>Chưa có tin tức nào.</p></div>';
                        return;
                    }

                    grid.innerHTML = list.map(renderNewsCard).join('');
                    if (viewAll) { viewAll.href = 'views/tin-tuc.html'; viewAll.innerHTML = 'Xem tất cả tin tức <i class="fas fa-arrow-right"></i>'; }

                } catch(e) {
                    console.warn('[News] API lỗi:', e.message);
                    grid.innerHTML = '<div class="ev-empty"><i class="fas fa-newspaper"></i><p>Không thể tải tin tức. Vui lòng thử lại sau.</p></div>';
                }
            }

            // ── Public: gọi từ index.html sau khi inject component ──
            window.loadEventsSection = function() {
                var tabBar = document.getElementById('ev-tabs');
                if (!tabBar) return;

                // Tab click
                tabBar.addEventListener('click', function(e) {
                    var btn = e.target.closest('.ev-tab');
                    if (!btn) return;
                    document.querySelectorAll('.ev-tab').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    activeTab = btn.dataset.tab;

                    var grid = document.getElementById('ev-grid');
                    if (grid) { grid.style.opacity = '0'; grid.style.transition = 'opacity 0.18s'; }
                    setTimeout(function() {
                        if (activeTab === 'events') loadEvents();
                        else loadNews();
                        if (grid) grid.style.opacity = '1';
                    }, 180);
                });

                // Load mặc định: sự kiện
                loadEvents();
            };
        })();

        // ===== GALLERY SECTION =====
        (function() {
            var GS_API = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : 'http://localhost:3001/api';
            var gsAlbums = [];
            var gsActive = -1;
            var gsLbPhotos = [];
            var gsLbIdx = 0;

            var STATIC_ALBUMS = [
                { name: 'Thi đấu & Giải thưởng', photos: [
                    { src: 'assets/images_Thi_dau_vo/Giai_SV3.jpg',        title: 'Giải III Toàn Đoàn',                     desc: 'Giải Võ Cổ Truyền Sinh Viên VLU TP.HCM 2024.' },
                    { src: 'assets/images_Thi_dau_vo/Thi_Vo_Nhac.jpg',     title: 'Thi đấu võ nhạc Đất phương nam 2025',    desc: 'Cuộc thi Liên hoan Võ Việt đất phương nam 2026.' },
                    { src: 'assets/images_Thi_dau_vo/Hinh_Thi_Dau.jpg',    title: 'Giải Võ cổ truyền Quốc tế TP.HCM 2026', desc: 'Mục tiêu học hỏi và trải nghiệm tại đấu trường lớn.' },
                    { src: 'assets/images_Thi_dau_vo/Hinh_Nhan_thuong.jpg', title: 'Lễ Tổng Kết Giải Liên Hoan Quốc Tế',   desc: 'Ghi nhận sự nỗ lực và tiến bộ của từng cá nhân.' }
                ]},
                { name: 'Diễn show', photos: [
                    { src: 'assets/images_Dien_Show/Show_Quoc_Te.jpg', title: 'Giải nhất biểu diễn Quốc tế HUTECH', desc: 'HUTECH GLOBAL FESTIVAL.' },
                    { src: 'assets/images_Dien_Show/Show.jpg',         title: 'Biểu diễn Nam Kỳ Lục Tỉnh',         desc: 'Tham gia giao lưu chào đón tân sinh viên.' }
                ]},
                { name: 'Hoạt động CLB', photos: [
                    { src: 'assets/images_Team_Building/Hinh_Team_BuilDing_1.jpg', title: 'Team Building 2025',  desc: 'Hoạt động ngoại khóa gắn kết các thành viên CLB.' },
                    { src: 'assets/images_Thien_Nguyen/HD_Thien_Nguyen.jpg',       title: 'Hoạt Động Từ Thiện', desc: 'Chương trình thiện nguyện hỗ trợ cộng đồng.' }
                ]}
            ];

            function gsResolveImg(url) {
                if (!url) return '';
                if (url.startsWith('http')) return url;
                return GS_API.replace('/api','') + (url.startsWith('/') ? url : '/' + url);
            }

            function gsRenderGrid(photos) {
                var grid = document.getElementById('gallery-grid');
                if (!grid) return;
                gsLbPhotos = photos.slice(0, 9);
                if (!gsLbPhotos.length) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;"><i class="fas fa-images" style="font-size:2rem;margin-bottom:12px;display:block;"></i>Chưa có ảnh nào.</div>';
                    return;
                }
                grid.innerHTML = gsLbPhotos.map(function(item, idx) {
                    return '<div class="gallery-item" onclick="gsLbOpen(' + idx + ')" style="min-height:200px;">' +
                        '<img src="' + item.src + '" alt="' + (item.title||'') + '" class="gallery-real-img" loading="lazy" onerror="this.style.display=\'none\'">' +
                        '<div class="gallery-info"><h4>' + (item.title||'') + '</h4><p>' + (item.desc||'') + '</p></div>' +
                        '</div>';
                }).join('');
            }

            function gsRenderTabs() {
                var tabBar = document.getElementById('gallery-album-tabs');
                if (!tabBar || gsAlbums.length <= 1) return;
                var html = '<div class="gallery-tab-bar">';
                html += '<button class="gallery-tab-btn active" onclick="gsSetTab(-1)">Tất cả</button>';
                gsAlbums.forEach(function(album, i) {
                    html += '<button class="gallery-tab-btn" onclick="gsSetTab(' + i + ')">' +
                        '<i class="fas fa-folder" style="margin-right:5px;font-size:11px;"></i>' + album.name + '</button>';
                });
                html += '</div>';
                html += '<div style="text-align:center;margin-bottom:8px;">' +
                    '<a href="views/thu-vien.html" class="gallery-view-all-link">Xem toàn bộ thư viện <i class="fas fa-arrow-right"></i></a></div>';
                tabBar.innerHTML = html;
                tabBar.style.display = 'block';
            }

            function gsGetPhotos(idx) {
                if (idx === -1) {
                    var all = [];
                    gsAlbums.forEach(function(a) { a.photos.forEach(function(p) { all.push(p); }); });
                    return all;
                }
                return gsAlbums[idx] ? gsAlbums[idx].photos : [];
            }

            window.gsSetTab = function(idx) {
                gsActive = idx;
                document.querySelectorAll('.gallery-tab-btn').forEach(function(btn, i) {
                    btn.classList.toggle('active', (i === 0 && idx === -1) || (i - 1 === idx));
                });
                gsRenderGrid(gsGetPhotos(idx));
            };

            function gsFallback() {
                gsAlbums = STATIC_ALBUMS;
                gsActive = -1;
                gsRenderTabs();
                gsRenderGrid(gsGetPhotos(-1));
            }

            window.loadGallerySection = async function() {
                try {
                    var res  = await fetch(GS_API + '/gallery/albums', { cache: 'default' });
                    var data = await res.json();
                    if (!data.success || !data.data || !data.data.length) { gsFallback(); return; }

                    var albums = data.data.slice(0, 5);
                    var results = await Promise.all(albums.map(function(album) {
                        return fetch(GS_API + '/gallery/albums/' + album.id, { cache: 'default' })
                            .then(function(r) { return r.json(); })
                            .then(function(ad) {
                                var photos = (ad.data && ad.data.photos) || [];
                                return {
                                    id: album.id, name: album.name,
                                    photos: photos.map(function(p) {
                                        return { src: gsResolveImg(p.image_url), title: p.caption || album.name, desc: album.description || album.name };
                                    })
                                };
                            })
                            .catch(function() { return { id: album.id, name: album.name, photos: [] }; });
                    }));

                    gsAlbums = results.filter(function(a) { return a.photos.length > 0; });
                    if (!gsAlbums.length) { gsFallback(); return; }

                    gsActive = -1;
                    gsRenderTabs();
                    gsRenderGrid(gsGetPhotos(-1));
                } catch(e) {
                    gsFallback();
                }
            };

            // Lightbox
            window.gsLbOpen = function(idx) {
                gsLbIdx = idx;
                gsLbShow();
                document.getElementById('gs-lightbox').classList.add('open');
                document.body.style.overflow = 'hidden';
            };
            function gsLbShow() {
                var p = gsLbPhotos[gsLbIdx];
                if (!p) return;
                document.getElementById('gs-lb-img').src = p.src;
                document.getElementById('gs-lb-caption').textContent = p.title || '';
                document.getElementById('gs-lb-counter').textContent = (gsLbIdx + 1) + ' / ' + gsLbPhotos.length;
                document.getElementById('gs-lb-prev').style.display = gsLbIdx > 0 ? '' : 'none';
                document.getElementById('gs-lb-next').style.display = gsLbIdx < gsLbPhotos.length - 1 ? '' : 'none';
            }
            window.gsLbNav = function(dir) {
                gsLbIdx = Math.max(0, Math.min(gsLbPhotos.length - 1, gsLbIdx + dir));
                gsLbShow();
            };
            window.gsLbClose = function(e) {
                if (!e || e.target === document.getElementById('gs-lightbox') || e.target.id === 'gs-lb-close') {
                    document.getElementById('gs-lightbox').classList.remove('open');
                    document.body.style.overflow = '';
                }
            };
            document.addEventListener('keydown', function(e) {
                var lb = document.getElementById('gs-lightbox');
                if (!lb || !lb.classList.contains('open')) return;
                if (e.key === 'Escape')     gsLbClose({ target: lb });
                if (e.key === 'ArrowLeft')  gsLbNav(-1);
                if (e.key === 'ArrowRight') gsLbNav(1);
            });
        })();

        function initializeComponents() {
            const contactForm = document.getElementById('contactForm');
            if (!contactForm) return;
            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = {
                    name:    document.getElementById('name').value,
                    email:   document.getElementById('email').value,
                    phone:   document.getElementById('phone').value,
                    message: document.getElementById('message').value
                };
                if (!formData.name || !formData.email || !formData.phone) {
                    showNotification('Vui lòng điền đầy đủ thông tin bắt buộc!', 'error'); return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
                    showNotification('Email không hợp lệ!', 'error'); return;
                }
                if (!/^[0-9]{10,11}$/.test(formData.phone.replace(/\D/g, ''))) {
                    showNotification('Số điện thoại không hợp lệ!', 'error'); return;
                }
                showNotification('Đang gửi...', 'info');
                var contactApi = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : 'http://localhost:3001/api';
                fetch(contactApi + '/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        showNotification('Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi trong thời gian sớm nhất.', 'success');
                        contactForm.reset();
                    } else {
                        showNotification(data.message || 'Gửi thất bại, vui lòng thử lại.', 'error');
                    }
                })
                .catch(function() {
                    showNotification('⚠️ Server chưa khởi động. Vui lòng chạy lệnh: cd backend && npm start', 'error');
                });
            });
        }
    </script>
</body>
</html>
