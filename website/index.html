        function openCoachModal(id) {
            const data = coachData[id];
            if (!data) return;
            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalBelt').textContent = data.belt;
            const img = document.getElementById('modalAvatar');
            img.src = data.avatar || '';
            img.alt = data.name;
            img.style.display = data.avatar ? 'block' : 'none';
            document.getElementById('modalTableBody').innerHTML = data.details.map(row =>
                `<tr><td class="detail-label"><i class="fas fa-chevron-right"></i> ${row.label}</td><td class="detail-value">${row.value}</td></tr>`
            ).join('');
            document.getElementById('coachModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCoachModal(event) {
            if (event && event.target !== document.getElementById('coachModal') && !event.target.classList.contains('coach-modal-close')) return;
            document.getElementById('coachModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('coachModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // ===== BỘ ĐẾM SỰ KIỆN =====
        function initEventCountdowns() {
            const cards = document.querySelectorAll('.event-card[data-start]');
            if (!cards.length) return;

            function renderCountdown(el, diff) {
                el.classList.remove('hidden');
                const days    = Math.floor(diff / 86400000);
                const hours   = Math.floor((diff % 86400000) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `
                    <div class="countdown-unit"><span class="countdown-num">${String(days).padStart(2,'0')}</span><span class="countdown-label">Ngày</span></div>
                    <div class="countdown-unit"><span class="countdown-num">${String(hours).padStart(2,'0')}</span><span class="countdown-label">Giờ</span></div>
                    <div class="countdown-unit"><span class="countdown-num">${String(minutes).padStart(2,'0')}</span><span class="countdown-label">Phút</span></div>
                    <div class="countdown-unit"><span class="countdown-num">${String(seconds).padStart(2,'0')}</span><span class="countdown-label">Giây</span></div>
                `;
            }

            function update() {
                const now = new Date();
                cards.forEach(function(card) {
                    const startDate = new Date(card.dataset.start + 'T00:00:00');
                    const endDate   = new Date(card.dataset.end   + 'T23:59:59');
                    const badge     = card.querySelector('.event-badge-auto');
                    const countdown = card.querySelector('.event-countdown');
                    if (!badge || !countdown) return;

                    card.classList.remove('status-upcoming', 'status-ongoing', 'status-ended');

                    if (now < startDate) {
                        card.classList.add('status-upcoming');
                        badge.textContent = 'Sắp diễn ra';
                        renderCountdown(countdown, startDate - now);
                    } else if (now <= endDate) {
                        card.classList.add('status-ongoing');
                        badge.textContent = '🟢 Đang diễn ra';
                        renderCountdown(countdown, endDate - now);
                    } else {
                        card.classList.add('status-ended');
                        badge.textContent = 'Đã kết thúc';
                        countdown.classList.add('hidden');
                    }
                });
            }

            update();
            setInterval(update, 1000);
        }

        // ===== LOAD COMPONENTS =====
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error('Error loading component ' + componentPath + ':', error);
                document.getElementById(elementId).innerHTML =
                    '<div style="padding:40px;text-align:center;color:#999;"><i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:20px;"></i><p>Không thể tải nội dung. Vui lòng thử lại sau.</p></div>';
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await loadComponent('header-placeholder',   'components/header.html');
            await loadComponent('hero-placeholder',     'components/hero-section.html');
            await loadComponent('about-placeholder',    'components/about-section.html');
            await loadComponent('schedule-placeholder', 'components/schedule-section.html');
            await loadComponent('coaches-placeholder',  'components/coaches-section.html');
            await loadComponent('gallery-placeholder',  'components/gallery-section.html');
            await loadComponent('events-placeholder',   'components/events-section.html');
            await loadComponent('services-placeholder', 'components/services-section.html');
            await loadComponent('contact-placeholder',  'components/contact-section.html');
            await loadComponent('footer-placeholder',   'components/footer.html');

            setTimeout(function() {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 1000);

            setTimeout(initializeComponents, 200);
            setTimeout(initEventCountdowns, 300);
        });

        function initializeComponents() {
            const contactForm = document.getElementById('contactForm');
            if (!contactForm) return;
            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = {
                    name:    document.getElementById('name').value,
                    email:   document.getElementById('email').value,
                    phone:   document.getElementById('phone').value,
                    message: document.getElementById('message').value
                };
                if (!formData.name || !formData.email || !formData.phone) {
                    showNotification('Vui lòng điền đầy đủ thông tin bắt buộc!', 'error'); return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
                    showNotification('Email không hợp lệ!', 'error'); return;
                }
                if (!/^[0-9]{10,11}$/.test(formData.phone.replace(/\D/g, ''))) {
                    showNotification('Số điện thoại không hợp lệ!', 'error'); return;
                }
                showNotification('Đang gửi...', 'info');
                fetch('http://localhost:3001/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        showNotification('Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi trong thời gian sớm nhất.', 'success');
                        contactForm.reset();
                    } else {
                        showNotification(data.message || 'Gửi thất bại, vui lòng thử lại.', 'error');
                    }
                })
                .catch(function() {
                    showNotification('⚠️ Server chưa khởi động. Vui lòng chạy lệnh: cd backend && npm start', 'error');
                });
            });
        }
    </script>
