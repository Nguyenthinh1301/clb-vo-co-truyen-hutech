<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .status-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .status-header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .status-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .service-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .service-status:last-child {
            border-bottom: none;
        }
        .service-name {
            font-weight: bold;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-online {
            background: #d4edda;
            color: #155724;
        }
        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }
        .status-warning {
            background: #fff3cd;
            color: #856404;
        }
        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .metric-value {
            font-weight: bold;
            color: #333;
        }
        .refresh-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .refresh-btn:hover {
            background: #0056b3;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            background: #545b62;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body class="status-page">
    <div class="status-container">
        <!-- Header -->
        <div class="status-header">
            <h1><i class="fas fa-server"></i> System Status Monitor</h1>
            <p>Theo dõi trạng thái hệ thống CLB Võ Cổ Truyền HUTECH</p>
            <div>
                <button class="refresh-btn" onclick="refreshAll()">
                    <i class="fas fa-sync-alt"></i> Làm mới tất cả
                </button>
                <a href="../../../dashboard/dashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Quay lại Dashboard
                </a>
            </div>
        </div>

        <div class="status-grid">
            <!-- Backend Services -->
            <div class="status-card">
                <h3><i class="fas fa-server"></i> Backend Services</h3>
                <div id="backendStatus" class="loading">Đang kiểm tra...</div>
            </div>

            <!-- Database Status -->
            <div class="status-card">
                <h3><i class="fas fa-database"></i> Database</h3>
                <div id="databaseStatus" class="loading">Đang kiểm tra...</div>
            </div>

            <!-- System Metrics -->
            <div class="status-card">
                <h3><i class="fas fa-chart-line"></i> System Metrics</h3>
                <div id="systemMetrics" class="loading">Đang tải...</div>
            </div>

            <!-- API Endpoints -->
            <div class="status-card">
                <h3><i class="fas fa-plug"></i> API Endpoints</h3>
                <div id="apiStatus" class="loading">Đang kiểm tra...</div>
            </div>

            <!-- Cache & Performance -->
            <div class="status-card">
                <h3><i class="fas fa-tachometer-alt"></i> Performance</h3>
                <div id="performanceStatus" class="loading">Đang tải...</div>
            </div>

            <!-- Recent Activity -->
            <div class="status-card">
                <h3><i class="fas fa-history"></i> Recent Activity</h3>
                <div id="recentActivity" class="loading">Đang tải...</div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../config/config.js"></script>
    <script src="../../config/api-config.js"></script>
    <script src="../../config/api-client.js"></script>
    <script src="../../config/auth.js"></script>

    <script>
        // Check authentication on load
        document.addEventListener('DOMContentLoaded', function() {
            if (!Auth.isAuthenticated()) {
                window.location.href = 'dang-nhap.html';
                return;
            }
            
            loadAllStatus();
        });

        async function loadAllStatus() {
            await Promise.all([
                loadBackendStatus(),
                loadDatabaseStatus(),
                loadSystemMetrics(),
                loadApiStatus(),
                loadPerformanceStatus(),
                loadRecentActivity()
            ]);
        }

        async function loadBackendStatus() {
            const statusDiv = document.getElementById('backendStatus');
            
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/health`);
                const data = await response.json();
                
                let html = '';
                
                // Overall status
                const overallStatus = data.success ? 'online' : 'offline';
                html += `
                    <div class="service-status">
                        <span class="service-name">API Server</span>
                        <span class="status-badge status-${overallStatus}">
                            ${data.success ? 'Online' : 'Offline'}
                        </span>
                    </div>
                `;
                
                // Environment
                html += `
                    <div class="service-status">
                        <span class="service-name">Environment</span>
                        <span class="metric-value">${data.environment || 'Unknown'}</span>
                    </div>
                `;
                
                // Uptime
                if (data.uptime) {
                    const uptimeMinutes = (data.uptime / 60).toFixed(1);
                    html += `
                        <div class="service-status">
                            <span class="service-name">Uptime</span>
                            <span class="metric-value">${uptimeMinutes} phút</span>
                        </div>
                    `;
                }
                
                statusDiv.innerHTML = html;
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">
                        <strong>Không thể kết nối backend</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        async function loadDatabaseStatus() {
            const statusDiv = document.getElementById('databaseStatus');
            
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/health/detailed`);
                const data = await response.json();
                
                let html = '';
                
                if (data.services && data.services.database) {
                    const db = data.services.database;
                    const dbStatus = db.status === 'healthy' ? 'online' : 'offline';
                    
                    html += `
                        <div class="service-status">
                            <span class="service-name">Database (${db.type})</span>
                            <span class="status-badge status-${dbStatus}">
                                ${db.status}
                            </span>
                        </div>
                    `;
                    
                    html += `
                        <div class="service-status">
                            <span class="service-name">Message</span>
                            <span class="metric-value">${db.message}</span>
                        </div>
                    `;
                }
                
                // Connection stats
                if (data.connections) {
                    const conn = data.connections;
                    html += `
                        <div class="service-status">
                            <span class="service-name">Connections</span>
                            <span class="metric-value">${conn.size || 0} active</span>
                        </div>
                    `;
                    
                    if (conn.available !== undefined) {
                        html += `
                            <div class="service-status">
                                <span class="service-name">Available</span>
                                <span class="metric-value">${conn.available}</span>
                            </div>
                        `;
                    }
                }
                
                statusDiv.innerHTML = html;
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">
                        Không thể tải thông tin database: ${error.message}
                    </div>
                `;
            }
        }

        async function loadSystemMetrics() {
            const statusDiv = document.getElementById('systemMetrics');
            
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/health/detailed`);
                const data = await response.json();
                
                let html = '';
                
                if (data.system) {
                    const sys = data.system;
                    
                    html += `
                        <div class="metric-item">
                            <span>Platform</span>
                            <span class="metric-value">${sys.platform} ${sys.arch}</span>
                        </div>
                    `;
                    
                    html += `
                        <div class="metric-item">
                            <span>Node.js</span>
                            <span class="metric-value">${sys.nodeVersion}</span>
                        </div>
                    `;
                    
                    if (sys.memory) {
                        html += `
                            <div class="metric-item">
                                <span>Memory Total</span>
                                <span class="metric-value">${sys.memory.total}</span>
                            </div>
                        `;
                        
                        html += `
                            <div class="metric-item">
                                <span>Memory Used</span>
                                <span class="metric-value">${sys.memory.used} (${sys.memory.usagePercent})</span>
                            </div>
                        `;
                    }
                    
                    if (sys.cpu) {
                        html += `
                            <div class="metric-item">
                                <span>CPU Cores</span>
                                <span class="metric-value">${sys.cpu.cores}</span>
                            </div>
                        `;
                    }
                }
                
                statusDiv.innerHTML = html;
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">
                        Không thể tải system metrics: ${error.message}
                    </div>
                `;
            }
        }

        async function loadApiStatus() {
            const statusDiv = document.getElementById('apiStatus');
            
            const endpoints = [
                { name: 'Health Check', url: '/health', method: 'GET' },
                { name: 'Auth Login', url: '/api/auth/login', method: 'POST' },
                { name: 'Users API', url: '/api/users', method: 'GET' },
                { name: 'Classes API', url: '/api/classes', method: 'GET' },
                { name: 'Events API', url: '/api/events', method: 'GET' }
            ];
            
            let html = '';
            
            for (const endpoint of endpoints) {
                try {
                    const startTime = Date.now();
                    let response;
                    
                    if (endpoint.method === 'GET') {
                        if (endpoint.url.includes('/api/') && endpoint.url !== '/health') {
                            // Protected endpoint
                            response = await fetch(`${API_CONFIG.BASE_URL}${endpoint.url}`, {
                                headers: {
                                    'Authorization': `Bearer ${Auth.getToken()}`
                                }
                            });
                        } else {
                            // Public endpoint
                            response = await fetch(`${API_CONFIG.BASE_URL}${endpoint.url}`);
                        }
                    } else {
                        // For POST endpoints, just check if they exist (don't actually call them)
                        response = await fetch(`${API_CONFIG.BASE_URL}${endpoint.url}`, {
                            method: 'OPTIONS'
                        });
                    }
                    
                    const responseTime = Date.now() - startTime;
                    const status = response.ok ? 'online' : 'warning';
                    
                    html += `
                        <div class="service-status">
                            <span class="service-name">${endpoint.name}</span>
                            <span class="status-badge status-${status}">
                                ${response.status} (${responseTime}ms)
                            </span>
                        </div>
                    `;
                    
                } catch (error) {
                    html += `
                        <div class="service-status">
                            <span class="service-name">${endpoint.name}</span>
                            <span class="status-badge status-offline">Error</span>
                        </div>
                    `;
                }
            }
            
            statusDiv.innerHTML = html;
        }

        async function loadPerformanceStatus() {
            const statusDiv = document.getElementById('performanceStatus');
            
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/health/detailed`);
                const data = await response.json();
                
                let html = '';
                
                // Cache stats
                if (data.cache) {
                    const cache = data.cache;
                    html += `
                        <div class="metric-item">
                            <span>Cache Size</span>
                            <span class="metric-value">${cache.size || 0} items</span>
                        </div>
                    `;
                    
                    html += `
                        <div class="metric-item">
                            <span>Cache Hit Rate</span>
                            <span class="metric-value">${cache.hitRate || '0%'}</span>
                        </div>
                    `;
                }
                
                // Scheduler stats
                if (data.scheduler) {
                    const scheduler = data.scheduler;
                    const schedulerStatus = scheduler.isRunning ? 'online' : 'offline';
                    
                    html += `
                        <div class="service-status">
                            <span class="service-name">Scheduler</span>
                            <span class="status-badge status-${schedulerStatus}">
                                ${scheduler.isRunning ? 'Running' : 'Stopped'}
                            </span>
                        </div>
                    `;
                    
                    html += `
                        <div class="metric-item">
                            <span>Scheduled Jobs</span>
                            <span class="metric-value">${scheduler.totalJobs || 0}</span>
                        </div>
                    `;
                }
                
                // Process memory
                if (data.process && data.process.memory) {
                    const mem = data.process.memory;
                    html += `
                        <div class="metric-item">
                            <span>Process Memory</span>
                            <span class="metric-value">${mem.heapUsed} / ${mem.heapTotal}</span>
                        </div>
                    `;
                }
                
                statusDiv.innerHTML = html;
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">
                        Không thể tải performance data: ${error.message}
                    </div>
                `;
            }
        }

        async function loadRecentActivity() {
            const statusDiv = document.getElementById('recentActivity');
            
            // Mock recent activity data
            const activities = [
                { time: '2 phút trước', action: 'User login', user: 'admin@vocotruyenhutech.edu.vn' },
                { time: '5 phút trước', action: 'System health check', user: 'System' },
                { time: '10 phút trước', action: 'Database connection', user: 'System' },
                { time: '15 phút trước', action: 'Server startup', user: 'System' }
            ];
            
            let html = '';
            activities.forEach(activity => {
                html += `
                    <div class="service-status">
                        <div>
                            <div class="service-name">${activity.action}</div>
                            <small style="color: #666;">${activity.user}</small>
                        </div>
                        <span style="font-size: 12px; color: #666;">${activity.time}</span>
                    </div>
                `;
            });
            
            statusDiv.innerHTML = html;
        }

        function refreshAll() {
            // Show loading state
            document.querySelectorAll('.status-card > div:last-child').forEach(div => {
                div.innerHTML = '<div class="loading">Đang làm mới...</div>';
            });
            
            // Reload all data
            setTimeout(() => {
                loadAllStatus();
            }, 500);
        }
    </script>
</body>
</html>
