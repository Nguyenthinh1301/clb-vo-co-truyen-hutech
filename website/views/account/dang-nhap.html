<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Sign-In API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Styles are now in main styles.css file -->
</head>
<body class="auth-page">
    <a href="../../index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
        Về trang chủ
    </a>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Đăng nhập</h1>
            <p>Chào mừng bạn trở lại!</p>
        </div>
        
        <div class="auth-body">
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email hoặc Tên đăng nhập</label>
                    <input type="text" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-group">
                        <input type="password" id="password" name="password" class="form-control" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="password-icon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
            </form>
            
            <div class="divider">
                <span>hoặc</span>
            </div>
            
            <!-- Social Login Buttons -->
            <div class="social-login">
                <button type="button" class="btn-google" onclick="signInWithGoogle()">
                    <i class="fab fa-google"></i>
                    Đăng nhập bằng Google
                </button>
            </div>
            
            <div class="register-link">
                <p>Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../config/config.js"></script>
    <script src="../../config/api-config.js"></script>
    <script src="../../config/api-client.js"></script>
    <script src="../../config/backend-checker.js"></script>
    <script src="../../config/auth.js"></script>
    <script>
        // Google Client ID - Thay thế bằng Client ID thực tế của bạn
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

        // Demo accounts for testing
        const demoAccounts = [
            {
                email: 'admin@hutech.edu.vn',
                password: 'admin123',
                name: 'Quản trị viên',
                role: 'admin'
            },
            {
                email: 'member@hutech.edu.vn',
                password: 'member123',
                name: 'Thành viên',
                role: 'member'
            },
            {
                email: 'demo@test.com',
                password: '123456',
                name: 'Demo User',
                role: 'member'
            }
        ];

        // Initialize Google Sign-In
        function initializeGoogleSignIn() {
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleSignIn,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
            }
        }

        // Handle Google Sign-In response
        function handleGoogleSignIn(response) {
            try {
                // Decode the JWT token to get user info
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                
                const userData = {
                    email: payload.email,
                    name: payload.name,
                    picture: payload.picture,
                    role: 'member',
                    loginMethod: 'google',
                    loginTime: new Date().toISOString(),
                    googleId: payload.sub
                };

                // Save user data
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Check if user exists in database, if not create account
                saveOrUpdateSocialUser(userData);
                
                showMessage('Đăng nhập Google thành công! Đang chuyển hướng...', 'success');
                
                setTimeout(() => {
                    redirectAfterLogin(userData);
                }, 2000);
                
            } catch (error) {
                console.error('Error handling Google sign-in:', error);
                showMessage('Có lỗi xảy ra khi đăng nhập bằng Google. Vui lòng thử lại.');
            }
        }

        // Google Sign-In button click handler
        function signInWithGoogle() {
            const button = document.querySelector('.btn-google');
            button.classList.add('loading');
            
            try {
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.prompt((notification) => {
                        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                            // Fallback: show one-tap dialog
                            google.accounts.id.renderButton(
                                document.createElement('div'),
                                { theme: 'outline', size: 'large', width: '100%' }
                            );
                        }
                        button.classList.remove('loading');
                    });
                } else {
                    // Fallback for demo purposes
                    setTimeout(() => {
                        const demoGoogleUser = {
                            email: 'demo.google@gmail.com',
                            name: 'Demo Google User',
                            picture: 'https://via.placeholder.com/100',
                            role: 'member',
                            loginMethod: 'google',
                            loginTime: new Date().toISOString(),
                            googleId: 'demo_google_123'
                        };
                        
                        localStorage.setItem('currentUser', JSON.stringify(demoGoogleUser));
                        saveOrUpdateSocialUser(demoGoogleUser);
                        
                        showMessage('Đăng nhập Google thành công (Demo)! Đang chuyển hướng...', 'success');
                        setTimeout(() => {
                            redirectAfterLogin(demoGoogleUser);
                        }, 2000);
                        
                        button.classList.remove('loading');
                    }, 1500);
                }
            } catch (error) {
                console.error('Error with Google sign-in:', error);
                showMessage('Có lỗi xảy ra khi đăng nhập bằng Google. Vui lòng thử lại.');
                button.classList.remove('loading');
            }
        }


        // Save or update social user in localStorage
        function saveOrUpdateSocialUser(userData) {
            let registeredUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            // Check if user already exists
            const existingUserIndex = registeredUsers.findIndex(user => 
                user.email === userData.email || 
                (userData.googleId && user.googleId === userData.googleId)
            );
            
            if (existingUserIndex !== -1) {
                // Update existing user
                registeredUsers[existingUserIndex] = {
                    ...registeredUsers[existingUserIndex],
                    ...userData,
                    lastLogin: new Date().toISOString()
                };
            } else {
                // Add new user
                const newUser = {
                    ...userData,
                    id: Date.now().toString(),
                    registrationDate: new Date().toISOString(),
                    membershipStatus: 'active'
                };
                registeredUsers.push(newUser);
            }
            
            localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('password-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        function showMessage(message, type = 'error') {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            // Hide both messages first
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Remove any existing retry buttons
            const existingRetryBtn = errorDiv.querySelector('.btn-retry');
            if (existingRetryBtn) {
                existingRetryBtn.remove();
            }
            
            if (type === 'error') {
                // Format multi-line messages
                errorDiv.innerHTML = message.split('\n').map(line => {
                    if (line.trim()) {
                        return `<div style="margin: 4px 0;">${line}</div>`;
                    }
                    return '';
                }).join('');
                errorDiv.style.display = 'block';
                errorDiv.style.whiteSpace = 'pre-wrap';
                errorDiv.style.textAlign = 'left';
            } else {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }
        }

        // Regular form login with Auth Manager
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            // Validate input
            if (!email || !password) {
                showMessage('Vui lòng nhập đầy đủ email và mật khẩu', 'error');
                return;
            }
            
            // Check if user is currently rate limited
            const rateLimitKey = `login_attempts_${email}`;
            const lastAttempt = localStorage.getItem(rateLimitKey);
            if (lastAttempt) {
                const lastAttemptTime = new Date(lastAttempt);
                const now = new Date();
                const timeDiff = (now - lastAttemptTime) / 1000; // seconds
                
                if (timeDiff < 900) { // 15 minutes = 900 seconds
                    const remainingTime = Math.ceil(900 - timeDiff);
                    const minutes = Math.floor(remainingTime / 60);
                    const seconds = remainingTime % 60;
                    showMessage(`Vui lòng đợi ${minutes}:${seconds.toString().padStart(2, '0')} trước khi thử lại.`, 'error');
                    return;
                }
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            
            try {
                // Use AuthManager to login
                const result = await Auth.login(email, password, remember);
                
                if (result.success) {
                    // Clear rate limit on successful login
                    localStorage.removeItem(rateLimitKey);
                    showMessage('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    // Redirect based on user role immediately
                    setTimeout(() => {
                        redirectAfterLogin(result.user);
                    }, 800);
                } else {
                    // Handle network errors with retry option
                    if (result.isNetworkError || result.code === 'NETWORK_ERROR' || result.code === 'CONNECTION_FAILED' || result.code === 'TIMEOUT') {
                        const errorMsg = '❌ ' + result.message + '\n\n💡 Hướng dẫn khắc phục:\n' +
                            '1. Kiểm tra kết nối internet\n' +
                            '2. Đảm bảo backend đang chạy: npm start (trong thư mục backend)\n' +
                            '3. Kiểm tra URL backend: http://localhost:3000\n' +
                            '4. Tắt tường lửa/antivirus nếu cần';
                        
                        showMessage(errorMsg, 'error');
                        
                        // Add retry button
                        const errorDiv = document.getElementById('error-message');
                        const retryBtn = document.createElement('button');
                        retryBtn.type = 'button';
                        retryBtn.className = 'btn-retry';
                        retryBtn.innerHTML = '<i class="fas fa-redo"></i> Thử lại';
                        retryBtn.style.cssText = 'margin-top: 10px; padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;';
                        retryBtn.onclick = () => {
                            errorDiv.style.display = 'none';
                            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                        };
                        
                        if (!errorDiv.querySelector('.btn-retry')) {
                            errorDiv.appendChild(retryBtn);
                        }
                    } else {
                        showMessage(result.message || 'Đăng nhập thất bại', 'error');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                
                // Handle rate limiting error
                if (error.status === 429 || error.message?.includes('rate limit') || error.message?.includes('Quá nhiều')) {
                    // Store rate limit timestamp
                    localStorage.setItem(rateLimitKey, new Date().toISOString());
                    
                    // Show countdown timer
                    showRateLimitCountdown(900); // 15 minutes
                    showMessage('Quá nhiều lần đăng nhập thất bại. Vui lòng đợi 15 phút trước khi thử lại.', 'error');
                } else if (error.message && (error.message.includes('fetch') || error.message.includes('network'))) {
                    // Network error
                    showMessage('❌ Lỗi kết nối mạng.\n\nVui lòng kiểm tra:\n- Kết nối internet\n- Backend đang chạy (http://localhost:3000)\n- Tường lửa không chặn kết nối', 'error');
                } else {
                    showMessage('Có lỗi xảy ra khi đăng nhập. Vui lòng thử lại.', 'error');
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Show rate limit countdown
        function showRateLimitCountdown(seconds) {
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            const countdown = setInterval(() => {
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                submitBtn.innerHTML = `Đợi ${minutes}:${secs.toString().padStart(2, '0')}`;
                submitBtn.disabled = true;
                
                seconds--;
                
                if (seconds < 0) {
                    clearInterval(countdown);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 1000);
        }

        // Helper function to redirect to appropriate dashboard
        function redirectAfterLogin(user) {
            if (user && user.role === 'admin') {
                window.location.href = '../../../dashboard/dashboard.html';
            } else {
                window.location.href = '../../../dashboard/user-dashboard.html';
            }
        }

        // Check if user is already logged in and redirect immediately
        async function checkExistingLogin() {
            const currentUser = localStorage.getItem('currentUser');
            const authToken = localStorage.getItem('authToken');
            
            if (currentUser && authToken) {
                try {
                    const userData = JSON.parse(currentUser);
                    
                    // Verify token with backend before redirecting
                    console.log('Found existing session, verifying with backend...');
                    
                    const verifyResult = await Auth.authAPI.verify();
                    
                    if (verifyResult && verifyResult.success) {
                        console.log('Token is valid, redirecting...');
                        redirectAfterLogin(userData);
                        return true;
                    } else {
                        console.log('Token is invalid, clearing auth data...');
                        // Token is invalid, clear it
                        Auth.clearAuth();
                    }
                } catch (error) {
                    console.error('Error verifying token:', error);
                    // Clear invalid data
                    Auth.clearAuth();
                }
            }
            return false;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async function() {
            // Check existing login first - if logged in, redirect immediately
            const isLoggedIn = await checkExistingLogin();
            if (isLoggedIn) {
                return; // Stop further initialization
            }

            // Initialize Google Sign-In
            initializeGoogleSignIn();
            
            // Show demo info
            setTimeout(() => {
                if (!localStorage.getItem('demoInfoShown')) {
                    showMessage('Demo: demo@hutech.edu.vn/demo123 hoặc admin@hutech.edu.vn/admin123', 'success');
                    localStorage.setItem('demoInfoShown', 'true');
                }
            }, 1000);
        });
    </script>
</body>
</html>
