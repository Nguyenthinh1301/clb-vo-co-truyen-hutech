<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <title>Thông báo - CLB Võ Cổ Truyền HUTECH</title>
    <meta name="description" content="Thông báo mới nhất từ CLB Võ Cổ Truyền HUTECH - Lịch tập, thay đổi và thông tin quan trọng.">
    <meta property="og:title" content="Thông báo - CLB Võ Cổ Truyền HUTECH">
    <meta property="og:description" content="Thông báo mới nhất từ CLB Võ Cổ Truyền HUTECH.">
    <meta property="og:image" content="assets/images_Logo/Logo.jpg">
    <link rel="icon" type="image/jpeg" href="assets/images_Logo/Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="assets/js/config.js"></script>
    <link rel="stylesheet" href="assets/css/tin-tuc-base.css">
    <style>
        /* ── Filter bar ── */
        .tn-filter-bar {
            display: flex; gap: 10px; flex-wrap: wrap;
            margin-bottom: 32px; align-items: center;
        }
        .tn-filter-btn {
            padding: 7px 18px; border-radius: 24px;
            border: 1.5px solid #e2e8f0; background: #fff;
            color: #4a5568; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: "Open Sans", sans-serif;
            position: relative; overflow: hidden;
        }
        .tn-filter-btn:hover, .tn-filter-btn.active {
            background: #c41e3a; border-color: #c41e3a; color: #fff;
        }
        .tn-filter-btn .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.45);
            transform: scale(0);
            animation: ripple 0.5s linear;
            pointer-events: none;
        }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        /* ── Skeleton ── */
        .tn-skeleton { background: #f0f2f5; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .tn-skeleton-img { width: 100%; height: 160px; background: linear-gradient(90deg,#e8eaed 25%,#f5f5f5 50%,#e8eaed 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
        .tn-skeleton-body { padding: 18px 20px; }
        .tn-skeleton-line { height: 12px; border-radius: 6px; margin-bottom: 10px; background: linear-gradient(90deg,#e8eaed 25%,#f5f5f5 50%,#e8eaed 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
        .tn-skeleton-line.short { width: 40%; }
        .tn-skeleton-line.medium { width: 70%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── Grid animation ── */
        #ann-grid { transition: opacity 0.2s ease; }
        #ann-grid.fading { opacity: 0; pointer-events: none; }

        /* ── Card ── */
        .tn-card {
            cursor: default;
            opacity: 0;
            transform: translateY(18px);
            animation: cardIn 0.35s ease forwards;
        }
        .tn-card.clickable { cursor: pointer; }
        .tn-card.clickable:hover h4 { color: #c41e3a; }
        @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
        .tn-card:nth-child(1) { animation-delay: 0.04s; }
        .tn-card:nth-child(2) { animation-delay: 0.09s; }
        .tn-card:nth-child(3) { animation-delay: 0.14s; }
        .tn-card:nth-child(4) { animation-delay: 0.19s; }
        .tn-card:nth-child(5) { animation-delay: 0.24s; }
        .tn-card:nth-child(6) { animation-delay: 0.29s; }
        .tn-card:nth-child(7) { animation-delay: 0.34s; }
        .tn-card:nth-child(8) { animation-delay: 0.39s; }
        .tn-card:nth-child(9) { animation-delay: 0.44s; }

        /* ── Priority badge ── */
        .ann-priority {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 700; padding: 3px 10px;
            border-radius: 20px; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        .ann-priority.high     { background: #fdf0f0; color: #c41e3a; }
        .ann-priority.normal   { background: #e8f4fd; color: #2980b9; }
        .ann-priority.low      { background: #f0f0f0; color: #888; }
        .ann-priority.urgent   { background: #fff3cd; color: #856404; }

        /* ── Type icon strip ── */
        .ann-type-row {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #718096; margin-bottom: 6px;
        }
        .ann-type-row i { color: #c41e3a; width: 14px; }

        /* ── Expiry ── */
        .ann-expiry {
            font-size: 11px; margin-top: 10px;
            display: flex; align-items: center; gap: 5px;
        }
        .ann-expiry.expired { color: #c41e3a; }
        .ann-expiry.valid   { color: #888; }

        /* ── Pagination ── */
        .tn-pagination {
            display: flex; justify-content: center;
            gap: 8px; margin-top: 40px; flex-wrap: wrap;
        }
        .tn-page-btn {
            width: 38px; height: 38px; border-radius: 8px;
            border: 1.5px solid #e2e8f0; background: #fff;
            color: #4a5568; font-size: 14px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.18s ease, transform 0.12s ease;
            font-family: "Open Sans", sans-serif;
        }
        .tn-page-btn:hover:not(.active):not(:disabled) { transform: translateY(-2px); background: #f7f7f7; }
        .tn-page-btn.active { background: #c41e3a; border-color: #c41e3a; color: #fff; }
        .tn-page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .tn-page-btn:active { transform: scale(0.92); }

        /* ── Result info ── */
        .tn-result-info { font-size: 13px; color: #999; margin-bottom: 20px; transition: opacity 0.2s ease; }

        /* ── Modal ── */
        .tn-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 9999;
            align-items: center; justify-content: center; padding: 20px;
            opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
        }
        .tn-modal-overlay.open { display: flex; opacity: 1; pointer-events: auto; }
        .tn-modal {
            background: #fff; border-radius: 16px;
            max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            transform: translateY(24px) scale(0.97);
            transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
            opacity: 0;
        }
        .tn-modal-overlay.open .tn-modal { transform: translateY(0) scale(1); opacity: 1; }
        .tn-modal-body { padding: 28px 32px 32px; }
        .tn-modal-body h2 { font-size: 22px; font-weight: 800; color: #1a252f; margin: 14px 0 16px; line-height: 1.4; }
        .tn-modal-content { font-size: 15px; color: #444; line-height: 1.8; white-space: pre-wrap; }
        .tn-modal-close {
            position: sticky; top: 16px; float: right;
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: rgba(0,0,0,0.08); color: #333;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin: 16px 16px 0 0; transition: background 0.2s;
        }
        .tn-modal-close:hover { background: #c41e3a; color: #fff; }
        .ann-modal-meta {
            display: flex; flex-wrap: wrap; gap: 10px;
            padding: 16px 20px; background: #f8fafc;
            border-radius: 10px; margin-top: 16px;
        }
        .ann-modal-meta-item { font-size: 13px; color: #4a5568; display: flex; align-items: center; gap: 6px; }
        .ann-modal-meta-item i { color: #c41e3a; width: 14px; }

        /* ── Icon header trang ── */
        .ann-icon-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
        }
        .ann-icon-header i { color: #c41e3a; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="page-hero">
        <div class="breadcrumb">
            <a href="index.html">Trang chủ</a> &rsaquo; Thông báo
        </div>
        <h1>Thông Báo CLB</h1>
        <p>Cập nhật thông tin và thông báo mới nhất từ CLB Võ Cổ Truyền HUTECH</p>
    </div>

    <div class="page-body">
        <div class="tn-section-title ann-icon-header">
            <i class="fas fa-bell"></i> Danh sách thông báo
        </div>

        <!-- Filter loại -->
        <div class="tn-filter-bar" id="filter-bar">
            <button class="tn-filter-btn active" data-type="">📋 Tất cả</button>
            <button class="tn-filter-btn" data-type="urgent">🚨 Khẩn cấp</button>
            <button class="tn-filter-btn" data-type="general">📢 Chung</button>
            <button class="tn-filter-btn" data-type="event">📅 Sự kiện</button>
            <button class="tn-filter-btn" data-type="training">🥋 Tập luyện</button>
        </div>

        <div class="tn-result-info" id="result-info"></div>

        <!-- Grid thông báo -->
        <div class="tn-grid" id="ann-grid"></div>

        <!-- Pagination -->
        <div class="tn-pagination" id="pagination"></div>
    </div>

    <!-- Modal chi tiết -->
    <div class="tn-modal-overlay" id="ann-modal" onclick="closeModal(event)">
        <div class="tn-modal">
            <button class="tn-modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="assets/js/dropdown.js"></script>
    <script>
    'use strict';

    var API_BASE  = (window.APP_CONFIG && window.APP_CONFIG.API_BASE) || 'http://localhost:3001/api';
    var PAGE_SIZE = 9;
    var currentPage = 1;
    var currentType = '';

    var TYPE_LBL = { general: 'Chung', urgent: 'Khẩn cấp', event: 'Sự kiện', training: 'Tập luyện' };
    var TYPE_ICN = { general: 'bullhorn', urgent: 'exclamation-circle', event: 'calendar-alt', training: 'dumbbell' };
    var PRI_LBL  = { high: 'Ưu tiên cao', normal: 'Bình thường', low: 'Thấp' };
    var AUD_LBL  = { all: 'Tất cả', members: 'Thành viên', coaches: 'Huấn luyện viên' };

    // Fallback khi API không khả dụng
    var FALLBACK = [
        {
            id: null,
            title: 'CLB mở chiêu sinh năm học 2025–2026',
            content: 'CLB Võ Cổ Truyền HUTECH chính thức mở đăng ký thành viên mới cho năm học 2025–2026. Đây là cơ hội tuyệt vời để bạn theo đuổi đam mê võ thuật và rèn luyện sức khỏe.',
            type: 'general', priority: 'high', target_audience: 'all',
            status: 'active', created_at: '2026-01-01', expires_at: null
        },
        {
            id: null,
            title: 'Lịch tập thay đổi tuần 15–21/4/2026',
            content: 'Do sự kiện HUTECH Game, lịch tập tuần này sẽ thay đổi. Thứ 3 và Thứ 5 tập tại sân E4 lúc 17h30. Thứ 7 nghỉ.',
            type: 'training', priority: 'high', target_audience: 'members',
            status: 'active', created_at: '2026-04-10', expires_at: '2026-04-21'
        },
        {
            id: null,
            title: 'Thông báo tham dự Giải Võ cổ truyền TP.HCM 2026',
            content: 'CLB sẽ tham dự Giải Võ cổ truyền TP.HCM 2026. Các thành viên có nguyện vọng thi đấu vui lòng đăng ký với HLV trước ngày 30/4/2026.',
            type: 'event', priority: 'normal', target_audience: 'members',
            status: 'active', created_at: '2026-04-01', expires_at: '2026-04-30'
        }
    ];

    // ── Helpers ──
    function fmtDate(s) {
        if (!s) return '';
        try { return new Date(s).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' }); }
        catch(e) { return ''; }
    }

    function trunc(s, n) {
        if (!s) return '';
        return s.length > n ? s.slice(0, n) + '…' : s;
    }

    // ── Skeleton ──
    function showSkeleton() {
        var grid = document.getElementById('ann-grid');
        var html = '';
        for (var i = 0; i < 6; i++) {
            html += '<div class="tn-skeleton">' +
                '<div class="tn-skeleton-img" style="height:80px;"></div>' +
                '<div class="tn-skeleton-body">' +
                    '<div class="tn-skeleton-line short"></div>' +
                    '<div class="tn-skeleton-line"></div>' +
                    '<div class="tn-skeleton-line medium"></div>' +
                '</div></div>';
        }
        grid.innerHTML = html;
        document.getElementById('result-info').style.opacity = '0';
        document.getElementById('pagination').innerHTML = '';
    }

    // ── Render card ──
    function renderCard(a) {
        var isExpired = a.expires_at && new Date(a.expires_at) < new Date();
        var expiryHtml = '';
        if (a.expires_at) {
            expiryHtml = '<div class="ann-expiry ' + (isExpired ? 'expired' : 'valid') + '">' +
                '<i class="fas fa-clock"></i>' +
                (isExpired ? 'Đã hết hạn: ' : 'Hạn đến: ') + fmtDate(a.expires_at) +
                '</div>';
        }

        var priCls = a.priority === 'high' ? 'high' : (a.priority === 'low' ? 'low' : 'normal');
        if (a.type === 'urgent') priCls = 'urgent';

        var clickable = a.id ? ' clickable' : '';
        var clickAttr = a.id ? 'onclick="openModal(' + a.id + ')"' : '';

        return '<div class="tn-card' + clickable + '" ' + clickAttr + ' role="article">' +
            '<div class="tn-card-body" style="padding-top:18px;">' +
                '<div class="ann-type-row">' +
                    '<i class="fas fa-' + (TYPE_ICN[a.type] || 'bell') + '"></i>' +
                    '<span>' + (TYPE_LBL[a.type] || a.type || 'Chung') + '</span>' +
                    '<span style="margin-left:auto;font-size:11px;color:#aaa;">' + fmtDate(a.created_at) + '</span>' +
                '</div>' +
                '<span class="ann-priority ' + priCls + '">' +
                    (a.priority === 'high' ? '🔴 ' : a.priority === 'low' ? '⚪ ' : '🔵 ') +
                    (PRI_LBL[a.priority] || 'Bình thường') +
                '</span>' +
                '<h4 style="margin-top:6px;">' + trunc(a.title, 80) + '</h4>' +
                '<p>' + trunc(a.content, 120) + '</p>' +
                (a.target_audience && a.target_audience !== 'all'
                    ? '<div style="font-size:11px;color:#aaa;margin-top:6px;"><i class="fas fa-users"></i> ' + (AUD_LBL[a.target_audience] || a.target_audience) + '</div>'
                    : '') +
                expiryHtml +
            '</div>' +
        '</div>';
    }

    // ── Load từ API ──
    var _annCache = null; // cache client-side trong session

    async function loadAnnouncements() {
        showSkeleton();
        try {
            // Dùng cache nếu đã có và không đổi filter
            var url = API_BASE + '/cms/announcements?all=1' +
                (currentType ? '&type=' + currentType : '');

            var data;
            if (_annCache && !currentType) {
                // Dùng lại data đã fetch (chỉ khi không filter)
                data = _annCache;
            } else {
                var res = await fetch(url, { cache: 'no-cache' });
                data = await res.json();
                if (!data.success) throw new Error(data.message);
                if (!currentType) _annCache = data; // lưu cache khi không filter
            }

            var all      = data.data || [];
            var filtered = currentType ? all.filter(function(a) { return a.type === currentType; }) : all;
            var total    = filtered.length;
            var start    = (currentPage - 1) * PAGE_SIZE;
            var list     = filtered.slice(start, start + PAGE_SIZE);

            renderList(list, total, false);
        } catch(e) {
            console.warn('[Thông báo] Không thể tải từ API:', e.message);
            renderFallback();
        }
    }

    function renderFallback() {
        var list = currentType
            ? FALLBACK.filter(function(a) { return a.type === currentType; })
            : FALLBACK;
        renderList(list, list.length, true);
    }

    function renderList(list, total, isFallback) {
        var grid  = document.getElementById('ann-grid');
        var info  = document.getElementById('result-info');
        var pager = document.getElementById('pagination');

        if (!list.length) {
            grid.innerHTML = '<div class="tn-empty" style="grid-column:1/-1;">' +
                '<i class="fas fa-bell-slash"></i>' +
                '<h3>Không có thông báo</h3>' +
                '<p>Hiện chưa có thông báo nào trong mục này.</p>' +
                '</div>';
            info.textContent = ''; pager.innerHTML = ''; return;
        }

        // Render ngay — không delay
        grid.innerHTML = list.map(renderCard).join('');

        if (!isFallback) {
            var from = (currentPage - 1) * PAGE_SIZE + 1;
            var to   = Math.min(currentPage * PAGE_SIZE, total);
            info.textContent = 'Hiển thị ' + from + '–' + to + ' trong tổng số ' + total + ' thông báo';
        } else {
            info.textContent = '';
        }
        info.style.opacity = '1';

        if (!isFallback) {
            renderPagination(Math.ceil(total / PAGE_SIZE));
        } else {
            pager.innerHTML = '';
        }
    }

    function renderPagination(pages) {
        if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
        var html = '';
        if (currentPage > 1)
            html += '<button class="tn-page-btn" onclick="goPage(' + (currentPage-1) + ')"><i class="fas fa-chevron-left"></i></button>';
        for (var i = 1; i <= pages; i++)
            html += '<button class="tn-page-btn' + (i===currentPage?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
        if (currentPage < pages)
            html += '<button class="tn-page-btn" onclick="goPage(' + (currentPage+1) + ')"><i class="fas fa-chevron-right"></i></button>';
        document.getElementById('pagination').innerHTML = html;
    }

    function goPage(p) {
        currentPage = p; loadAnnouncements();
        window.scrollTo({ top: document.querySelector('.page-body').offsetTop - 80, behavior: 'smooth' });
    }

    // ── Filter ──
    document.getElementById('filter-bar').addEventListener('click', function(e) {
        var btn = e.target.closest('.tn-filter-btn');
        if (!btn) return;

        var ripple = document.createElement('span');
        ripple.className = 'ripple';
        var rect = btn.getBoundingClientRect();
        var size = Math.max(rect.width, rect.height);
        ripple.style.cssText = 'width:' + size + 'px;height:' + size + 'px;' +
            'left:' + (e.clientX - rect.left - size/2) + 'px;' +
            'top:'  + (e.clientY - rect.top  - size/2) + 'px;';
        btn.appendChild(ripple);
        setTimeout(function() { ripple.remove(); }, 500);

        document.querySelectorAll('.tn-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentType = btn.dataset.type;
        currentPage = 1;
        // Không xóa _annCache khi filter — data đã có, chỉ filter client-side
        loadAnnouncements();
    });

    // ── Modal chi tiết ──
    async function openModal(id) {
        var overlay = document.getElementById('ann-modal');
        var content = document.getElementById('modal-content');

        overlay.style.display = 'flex';
        requestAnimationFrame(function() {
            requestAnimationFrame(function() { overlay.classList.add('open'); });
        });
        document.body.style.overflow = 'hidden';
        content.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa;"><i class="fas fa-spinner fa-spin" style="font-size:28px;"></i></div>';

        try {
            // Ưu tiên dùng cache đã có, tránh gọi API lại
            var allData = _annCache;
            if (!allData) {
                var res  = await fetch(API_BASE + '/cms/announcements?all=1', { cache: 'no-cache' });
                allData  = await res.json();
                if (!allData.success) throw new Error(allData.message);
                _annCache = allData;
            }

            var a = (allData.data || []).find(function(x) { return x.id == id; });
            if (!a) throw new Error('Không tìm thấy thông báo');

            var isExpired = a.expires_at && new Date(a.expires_at) < new Date();
            var priCls = a.priority === 'high' ? 'high' : (a.priority === 'low' ? 'low' : 'normal');
            if (a.type === 'urgent') priCls = 'urgent';

            content.innerHTML =
                '<div class="tn-modal-body">' +
                    '<div class="ann-type-row">' +
                        '<i class="fas fa-' + (TYPE_ICN[a.type] || 'bell') + '"></i>' +
                        '<span>' + (TYPE_LBL[a.type] || 'Chung') + '</span>' +
                    '</div>' +
                    '<span class="ann-priority ' + priCls + '">' +
                        (a.priority === 'high' ? '🔴 ' : a.priority === 'low' ? '⚪ ' : '🔵 ') +
                        (PRI_LBL[a.priority] || 'Bình thường') +
                    '</span>' +
                    '<h2>' + a.title + '</h2>' +
                    '<div class="tn-modal-content">' + (a.content || '') + '</div>' +
                    '<div class="ann-modal-meta">' +
                        '<div class="ann-modal-meta-item"><i class="fas fa-calendar"></i> Ngày đăng: ' + fmtDate(a.created_at) + '</div>' +
                        '<div class="ann-modal-meta-item"><i class="fas fa-users"></i> Đối tượng: ' + (AUD_LBL[a.target_audience] || 'Tất cả') + '</div>' +
                        (a.expires_at ? '<div class="ann-modal-meta-item ' + (isExpired ? 'ann-expiry expired' : '') + '"><i class="fas fa-clock"></i> ' + (isExpired ? 'Hết hạn: ' : 'Hạn đến: ') + fmtDate(a.expires_at) + '</div>' : '') +
                    '</div>' +
                '</div>';
        } catch(e) {
            content.innerHTML = '<div style="padding:40px;text-align:center;color:#e74c3c;">' +
                '<i class="fas fa-exclamation-circle" style="font-size:28px;margin-bottom:12px;display:block;"></i>' +
                'Không thể tải nội dung thông báo.</div>';
        }
    }

    function closeModal(e) {
        if (e && e.target !== document.getElementById('ann-modal') && !e.target.closest('.tn-modal-close')) return;
        var overlay = document.getElementById('ann-modal');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        setTimeout(function() {
            if (!overlay.classList.contains('open')) overlay.style.display = 'none';
        }, 280);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal({ target: document.getElementById('ann-modal') });
    });

    // ── Init ──
    async function loadComp(id, path) {
        try { document.getElementById(id).innerHTML = await (await fetch(path)).text(); } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', async function() {
        await Promise.all([
            loadComp('header-placeholder', 'components/header.html'),
            loadComp('footer-placeholder', 'components/footer.html')
        ]);
        if (typeof initDropdown === 'function') initDropdown();
        loadAnnouncements();
    });
    </script>
</body>
</html>
