<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <style>
        @keyframes shimmer { 0%{opacity:1} 50%{opacity:0.4} 100%{opacity:1} }

        /* ── Album sidebar / filter bar ── */
        .tv-layout {
            display: flex;
            gap: 28px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            align-items: flex-start;
        }

        /* Sidebar albums */
        .tv-sidebar {
            width: 220px;
            flex-shrink: 0;
            position: sticky;
            top: 80px;
        }
        .tv-sidebar-title {
            font-size: 13px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
            padding: 0 4px;
        }
        .tv-album-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .tv-album-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.18s;
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
            margin-bottom: 2px;
        }
        .tv-album-item:hover {
            background: #fff5f5;
            color: #c41e3a;
        }
        .tv-album-item.active {
            background: #c41e3a;
            color: #fff;
        }
        .tv-album-item .tv-album-count {
            margin-left: auto;
            font-size: 11px;
            background: rgba(0,0,0,0.08);
            padding: 1px 7px;
            border-radius: 10px;
            font-weight: 600;
        }
        .tv-album-item.active .tv-album-count {
            background: rgba(255,255,255,0.25);
        }
        .tv-album-cover {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f0f2f5;
        }
        .tv-album-cover-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e0;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* Main content */
        .tv-main {
            flex: 1;
            min-width: 0;
        }

        /* Stats bar */
        .tv-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #edf0f4;
            font-size: 13px;
            color: #718096;
        }
        .tv-stats strong { color: #1a252f; }
        .tv-stats-sep { color: #e2e8f0; }

        /* Album header trong main */
        .tv-album-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .tv-album-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a252f;
            margin: 0;
        }
        .tv-album-header .tv-album-desc {
            font-size: 13px;
            color: #718096;
            margin: 2px 0 0;
        }

        /* Photo grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .photo-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4/3;
            cursor: pointer;
            background: #f0f2f5;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
            display: block;
        }
        .photo-item:hover img { transform: scale(1.07); }
        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-item:hover .photo-overlay { background: rgba(0,0,0,0.3); }
        .photo-overlay i {
            color: white;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .photo-item:hover .photo-overlay i { opacity: 1; }

        /* Gallery category section */
        .gallery-cat {
            margin-bottom: 44px;
        }
        .gallery-cat-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a252f;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gallery-cat-title i { color: #c41e3a; }
        .gallery-cat-count {
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            background: #f0f2f5;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Empty state */
        .tv-empty {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .tv-empty i {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
            color: #e2e8f0;
        }
        .tv-empty p { font-size: 15px; margin: 0; }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 90vw;
            max-height: 82vh;
            border-radius: 8px;
            object-fit: contain;
        }
        .lb-close {
            position: absolute; top: 20px; right: 24px;
            color: white; font-size: 36px; cursor: pointer;
            background: none; border: none; line-height: 1;
            transition: color 0.2s;
        }
        .lb-close:hover { color: #c41e3a; }
        .lb-prev, .lb-next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            font-size: 2.5rem; padding: 8px 16px; cursor: pointer;
            border-radius: 6px; transition: background 0.2s;
        }
        .lb-prev { left: 16px; }
        .lb-next { right: 16px; }
        .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.3); }
        .lb-caption {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.8); font-size: 14px; text-align: center;
            background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px;
            white-space: nowrap; max-width: 80vw; overflow: hidden; text-overflow: ellipsis;
        }
        .lb-counter {
            position: absolute; top: 20px; left: 24px;
            color: rgba(255,255,255,0.6); font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .tv-layout { flex-direction: column; padding: 24px 16px 60px; }
            .tv-sidebar { width: 100%; position: static; }
            .tv-album-list { display: flex; flex-wrap: wrap; gap: 6px; }
            .tv-album-item { padding: 6px 12px; font-size: 13px; }
            .tv-album-cover, .tv-album-cover-placeholder { display: none; }
            .photo-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="page-hero">
        <div class="breadcrumb">
            <a href="index.html">Trang chủ</a> &rsaquo; Thư viện hình ảnh
        </div>
        <h1>Thư Viện Hình Ảnh</h1>
        <p>Những khoảnh khắc đáng nhớ của CLB Võ Cổ Truyền HUTECH</p>
    </div>

    <div class="tv-layout">
        <!-- Sidebar albums -->
        <aside class="tv-sidebar">
            <div class="tv-sidebar-title"><i class="fas fa-folder" style="margin-right:6px;color:#c41e3a;"></i>Album</div>
            <ul class="tv-album-list" id="tv-album-list">
                <!-- Skeleton -->
                <li style="height:40px;background:#f0f2f5;border-radius:10px;margin-bottom:4px;animation:shimmer 1.4s infinite;"></li>
                <li style="height:40px;background:#f0f2f5;border-radius:10px;margin-bottom:4px;animation:shimmer 1.4s infinite;"></li>
                <li style="height:40px;background:#f0f2f5;border-radius:10px;margin-bottom:4px;animation:shimmer 1.4s infinite;"></li>
            </ul>
        </aside>

        <!-- Main content -->
        <main class="tv-main">
            <!-- Stats bar -->
            <div class="tv-stats" id="tv-stats" style="display:none;">
                <i class="fas fa-images" style="color:#c41e3a;"></i>
                <span>Tổng: <strong id="tv-total-photos">0</strong> ảnh</span>
                <span class="tv-stats-sep">|</span>
                <span><strong id="tv-total-albums">0</strong> album</span>
                <span class="tv-stats-sep">|</span>
                <span id="tv-current-label" style="color:#c41e3a;font-weight:600;">Tất cả</span>
            </div>

            <!-- Gallery content -->
            <div id="gallery-container">
                <!-- Skeleton -->
                <div class="gallery-cat">
                    <div style="background:#f0f2f5;height:22px;width:180px;border-radius:6px;margin-bottom:14px;animation:shimmer 1.4s infinite;"></div>
                    <div class="photo-grid">
                        <div style="background:#f0f2f5;border-radius:10px;aspect-ratio:4/3;animation:shimmer 1.4s infinite;"></div>
                        <div style="background:#f0f2f5;border-radius:10px;aspect-ratio:4/3;animation:shimmer 1.4s infinite;"></div>
                        <div style="background:#f0f2f5;border-radius:10px;aspect-ratio:4/3;animation:shimmer 1.4s infinite;"></div>
                        <div style="background:#f0f2f5;border-radius:10px;aspect-ratio:4/3;animation:shimmer 1.4s infinite;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLb(event)">
        <button class="lb-close" onclick="closeLb()">&times;</button>
        <div class="lb-counter" id="lb-counter"></div>
        <button class="lb-prev" id="lb-prev" onclick="lbNav(-1)">&#8249;</button>
        <img id="lb-img" src="" alt="">
        <button class="lb-next" id="lb-next" onclick="lbNav(1)">&#8250;</button>
        <div class="lb-caption" id="lb-caption"></div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="assets/js/dropdown.js"></script>
    <script>
    'use strict';
    var API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE) || 'http://localhost:3001/api';

    // ── State ──
    var allAlbums    = [];  // [{ id, name, description, cover_image, photo_count, photos: [] }]
    var activeAlbum  = -1; // -1 = tất cả
    var lbPhotos     = [];
    var lbIndex      = 0;

    // ── Helpers ──
    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function resolveImg(url) {
        if (!url) return '';
        if (url.startsWith('http')) return url;
        return API_BASE.replace('/api','') + (url.startsWith('/') ? url : '/' + url);
    }
    function trunc(s, n) { return !s ? '' : s.length > n ? s.slice(0, n) + '…' : s; }

    // ── Render sidebar ──
    function renderSidebar() {
        var list = document.getElementById('tv-album-list');
        if (!list) return;

        var totalPhotos = allAlbums.reduce(function(s, a) { return s + (a.photos ? a.photos.length : 0); }, 0);

        var html = '<li class="tv-album-item' + (activeAlbum === -1 ? ' active' : '') + '" onclick="tvSetAlbum(-1)">' +
            '<div class="tv-album-cover-placeholder"><i class="fas fa-th"></i></div>' +
            '<span>Tất cả</span>' +
            '<span class="tv-album-count">' + totalPhotos + '</span>' +
            '</li>';

        allAlbums.forEach(function(album, i) {
            var coverHtml = album.cover_image
                ? '<img class="tv-album-cover" src="' + resolveImg(album.cover_image) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                  '<div class="tv-album-cover-placeholder" style="display:none;"><i class="fas fa-images"></i></div>'
                : '<div class="tv-album-cover-placeholder"><i class="fas fa-images"></i></div>';

            html += '<li class="tv-album-item' + (activeAlbum === i ? ' active' : '') + '" onclick="tvSetAlbum(' + i + ')">' +
                coverHtml +
                '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(trunc(album.name, 22)) + '</span>' +
                '<span class="tv-album-count">' + (album.photos ? album.photos.length : 0) + '</span>' +
                '</li>';
        });

        list.innerHTML = html;
    }

    // ── Render stats bar ──
    function renderStats() {
        var statsEl = document.getElementById('tv-stats');
        var totalPhotos = allAlbums.reduce(function(s, a) { return s + (a.photos ? a.photos.length : 0); }, 0);
        var currentLabel = activeAlbum === -1 ? 'Tất cả' : (allAlbums[activeAlbum] ? allAlbums[activeAlbum].name : '');

        document.getElementById('tv-total-photos').textContent = totalPhotos;
        document.getElementById('tv-total-albums').textContent = allAlbums.length;
        document.getElementById('tv-current-label').textContent = currentLabel;
        if (statsEl) statsEl.style.display = 'flex';
    }

    // ── Render gallery content ──
    function renderGallery() {
        var container = document.getElementById('gallery-container');
        if (!container) return;

        lbPhotos = [];
        var html = '';

        var albumsToShow = activeAlbum === -1 ? allAlbums : [allAlbums[activeAlbum]];

        albumsToShow.forEach(function(album) {
            if (!album || !album.photos || !album.photos.length) return;

            html += '<div class="gallery-cat">';
            html += '<div class="gallery-cat-title">' +
                '<i class="fas fa-folder-open"></i> ' + escHtml(album.name) +
                '<span class="gallery-cat-count">' + album.photos.length + ' ảnh</span>' +
                '</div>';

            if (album.description) {
                html += '<p style="font-size:13px;color:#718096;margin:-8px 0 12px;">' + escHtml(album.description) + '</p>';
            }

            html += '<div class="photo-grid">';
            album.photos.forEach(function(p) {
                var idx = lbPhotos.length;
                lbPhotos.push({ url: resolveImg(p.image_url), caption: p.caption || album.name });
                html +=
                    '<div class="photo-item" onclick="openLb(' + idx + ')">' +
                    '<img src="' + resolveImg(p.image_url) + '" alt="' + escHtml(p.caption || '') + '" loading="lazy">' +
                    '<div class="photo-overlay"><i class="fas fa-expand"></i></div>' +
                    '</div>';
            });
            html += '</div></div>';
        });

        if (!html) {
            html = '<div class="tv-empty"><i class="fas fa-images"></i><p>Chưa có ảnh nào trong album này.</p></div>';
        }

        container.innerHTML = html;
        renderStats();
    }

    // ── Public: đổi album ──
    window.tvSetAlbum = function(idx) {
        activeAlbum = idx;
        renderSidebar();
        renderGallery();
        // Scroll lên đầu main
        var main = document.querySelector('.tv-main');
        if (main) main.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    // ── Load từ API ──
    async function loadGallery() {
        try {
            var res  = await fetch(API_BASE + '/gallery/albums', { cache: 'no-cache' });
            var data = await res.json();

            if (!data.success || !data.data || !data.data.length) {
                renderFallback();
                return;
            }

            // Lấy ảnh từ tất cả albums song song
            var albums = data.data;
            var results = await Promise.all(albums.map(function(album) {
                return fetch(API_BASE + '/gallery/albums/' + album.id, { cache: 'no-cache' })
                    .then(function(r) { return r.json(); })
                    .then(function(ad) {
                        return Object.assign({}, album, {
                            photos: (ad.data && ad.data.photos) || []
                        });
                    })
                    .catch(function() { return Object.assign({}, album, { photos: [] }); });
            }));

            allAlbums = results;
            activeAlbum = -1;
            renderSidebar();
            renderGallery();

        } catch(e) {
            renderFallback();
        }
    }

    // ── Fallback: ảnh tĩnh ──
    function renderFallback() {
        allAlbums = [
            { id: 0, name: 'Hình ảnh CLB', description: '', cover_image: null, photos: [
                { image_url: 'assets/images_CLB/Hinh_CLB_1.jpg', caption: 'Hình ảnh CLB' },
                { image_url: 'assets/images_CLB/Hinh_CLB_2.jpg', caption: 'Hình ảnh CLB' },
                { image_url: 'assets/images_CLB/Hinh_CLB_3.jpg', caption: 'Hình ảnh CLB' },
                { image_url: 'assets/images_CLB/Hinh_CLB_4.jpg', caption: 'Hình ảnh CLB' }
            ]},
            { id: 1, name: 'Tập luyện', description: '', cover_image: null, photos: [
                { image_url: 'assets/images_Tap_Luyen/Hinh_Tap_Luyen_1.jpg', caption: 'Tập luyện' },
                { image_url: 'assets/images_Tap_Luyen/Hinh_Tap_Luyen_2.jpg', caption: 'Tập luyện' },
                { image_url: 'assets/images_Tap_Luyen/Hinh_Tap_Luyen_3.jpg', caption: 'Tập luyện' },
                { image_url: 'assets/images_Tap_Luyen/Hinh_Tap_Luyen_4.jpg', caption: 'Tập luyện' }
            ]},
            { id: 2, name: 'Thi đấu & Giải thưởng', description: '', cover_image: null, photos: [
                { image_url: 'assets/images_Thi_dau_vo/Hinh_Thi_Dau.jpg',       caption: 'Thi đấu' },
                { image_url: 'assets/images_Thi_dau_vo/Hinh_Thi_Dau_2.jpg',     caption: 'Thi đấu' },
                { image_url: 'assets/images_Thi_dau_vo/Hinh_Nhan_thuong.jpg',   caption: 'Nhận thưởng' },
                { image_url: 'assets/images_Thi_dau_vo/Giai_SV.jpg',            caption: 'Giải sinh viên' },
                { image_url: 'assets/images_Thi_dau_vo/Hinh_Nhan_thuong1.jpg',  caption: 'Nhận thưởng' },
                { image_url: 'assets/images_Thi_dau_vo/Hinh_Nhan_Thuong_2.jpg', caption: 'Nhận thưởng' },
                { image_url: 'assets/images_Thi_dau_vo/Giai_SV2.jpg',           caption: 'Giải sinh viên' },
                { image_url: 'assets/images_Thi_dau_vo/Thi_Vo_Nhac.jpg',        caption: 'Võ nhạc' }
            ]},
            { id: 3, name: 'Diễn show', description: '', cover_image: null, photos: [
                { image_url: 'assets/images_Dien_Show/Show.jpg',           caption: 'Diễn show' },
                { image_url: 'assets/images_Dien_Show/Show_2.jpeg',        caption: 'Diễn show' },
                { image_url: 'assets/images_Dien_Show/Show_3.jpg',         caption: 'Diễn show' },
                { image_url: 'assets/images_Dien_Show/Show_Quoc_Te.jpg',   caption: 'Show Quốc tế' },
                { image_url: 'assets/images_Dien_Show/Show_Quoc_Te_2.jpg', caption: 'Show Quốc tế' },
                { image_url: 'assets/images_Dien_Show/Show_Quoc_Te_3.jpg', caption: 'Show Quốc tế' }
            ]},
            { id: 4, name: 'Team Building & Thiện nguyện', description: '', cover_image: null, photos: [
                { image_url: 'assets/images_Team_Building/Hinh_Team_BuilDing_1.jpg', caption: 'Team Building' },
                { image_url: 'assets/images_Team_Building/Hinh_Team_BuilDing_2.jpg', caption: 'Team Building' },
                { image_url: 'assets/images_Team_Building/Hinh_Team_BuilDing_3.jpg', caption: 'Team Building' },
                { image_url: 'assets/images_Team_Building/Hinh_Team_BuilDing_4.jpg', caption: 'Team Building' },
                { image_url: 'assets/images_Thien_Nguyen/HD_Thien_Nguyen.jpg',       caption: 'Thiện nguyện' },
                { image_url: 'assets/images_Thien_Nguyen/HD_Thien_Nguyen2.jpg',      caption: 'Thiện nguyện' }
            ]}
        ];
        activeAlbum = -1;
        renderSidebar();
        renderGallery();
    }

    // ── Lightbox ──
    function openLb(idx) {
        lbIndex = idx;
        showLbPhoto();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function showLbPhoto() {
        var p = lbPhotos[lbIndex];
        if (!p) return;
        document.getElementById('lb-img').src = p.url;
        document.getElementById('lb-caption').textContent = p.caption || '';
        document.getElementById('lb-counter').textContent = (lbIndex + 1) + ' / ' + lbPhotos.length;
        document.getElementById('lb-prev').style.display = lbIndex > 0 ? '' : 'none';
        document.getElementById('lb-next').style.display = lbIndex < lbPhotos.length - 1 ? '' : 'none';
    }
    function lbNav(dir) {
        lbIndex = Math.max(0, Math.min(lbPhotos.length - 1, lbIndex + dir));
        showLbPhoto();
    }
    function closeLb(e) {
        if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lb-close')) {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
    }
    document.addEventListener('keydown', function(e) {
        var lb = document.getElementById('lightbox');
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape')     closeLb({ target: lb });
        if (e.key === 'ArrowLeft')  lbNav(-1);
        if (e.key === 'ArrowRight') lbNav(1);
    });

    // ── Init ──
    async function loadComp(id, path) {
        try { document.getElementById(id).innerHTML = await (await fetch(path)).text(); } catch(e) {}
    }
    document.addEventListener('DOMContentLoaded', async function() {
        await Promise.all([
            loadComp('header-placeholder', 'components/header.html'),
            loadComp('footer-placeholder', 'components/footer.html')
        ]);
        if (typeof initDropdown === 'function') initDropdown();
        loadGallery();
    });
    </script>
</body>
</html>
