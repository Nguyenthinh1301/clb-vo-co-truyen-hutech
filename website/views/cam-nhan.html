<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <title>Cảm nhận sinh viên - CLB Võ Cổ Truyền HUTECH</title>
    <meta name="description" content="Cảm nhận của sinh viên HUTECH về CLB Võ Cổ Truyền - Những trải nghiệm và chia sẻ thực tế từ các thành viên.">
    <meta property="og:title" content="Cảm nhận sinh viên - CLB Võ Cổ Truyền HUTECH">
    <meta property="og:description" content="Cảm nhận và chia sẻ của sinh viên HUTECH về CLB Võ Cổ Truyền.">
    <meta property="og:image" content="assets/images_Logo/Logo.jpg">
    <link rel="icon" type="image/jpeg" href="assets/images_Logo/Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="assets/js/config.js"></script>
    <link rel="stylesheet" href="assets/css/tin-tuc-base.css">
    <link rel="stylesheet" href="assets/css/cam-nhan.css">
    <style>
        /* ── Skeleton ── */
        .cn-skeleton {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .cn-sk-line {
            height: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f0f2f5 25%, #fafafa 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: cnShimmer 1.4s infinite;
        }
        .cn-sk-line.w30  { width: 30%; }
        .cn-sk-line.w60  { width: 60%; }
        .cn-sk-line.w80  { width: 80%; }
        .cn-sk-line.w100 { width: 100%; }
        .cn-sk-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(90deg, #f0f2f5 25%, #fafafa 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: cnShimmer 1.4s infinite;
            flex-shrink: 0;
        }
        @keyframes cnShimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Filter bar ── */
        .cn-filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            align-items: center;
        }
        .cn-filter-btn {
            padding: 6px 16px;
            border-radius: 24px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #4a5568;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: "Open Sans", sans-serif;
        }
        .cn-filter-btn:hover,
        .cn-filter-btn.active {
            background: #c41e3a;
            border-color: #c41e3a;
            color: #fff;
        }

        /* ── Stats bar ── */
        .cn-stats-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            padding: 14px 20px;
            background: #fafbfc;
            border-radius: 12px;
            border: 1px solid #edf0f4;
            flex-wrap: wrap;
        }
        .cn-stat-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            color: #4a5568;
        }
        .cn-stat-item i { color: #c41e3a; }
        .cn-stat-item b { color: #1a252f; }

        /* ── Avatar ảnh thật ── */
        .cn-avatar img {
            width: 44px; height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ── Empty state ── */
        .cn-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #b0b8c4;
        }
        .cn-empty i { font-size: 2.5rem; margin-bottom: 14px; display: block; }
        .cn-empty p { font-size: 15px; }

        /* ── Card fade-in ── */
        .cn-card {
            opacity: 0;
            transform: translateY(16px);
            animation: cnCardIn 0.35s ease forwards;
        }
        @keyframes cnCardIn { to { opacity: 1; transform: translateY(0); } }
        .cn-card:nth-child(1) { animation-delay: 0.04s; }
        .cn-card:nth-child(2) { animation-delay: 0.09s; }
        .cn-card:nth-child(3) { animation-delay: 0.14s; }
        .cn-card:nth-child(4) { animation-delay: 0.19s; }
        .cn-card:nth-child(5) { animation-delay: 0.24s; }
        .cn-card:nth-child(6) { animation-delay: 0.29s; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="page-hero">
        <div class="breadcrumb">
            <a href="index.html">Trang chủ</a> &rsaquo; Tin tức &rsaquo; Cảm nhận sinh viên
        </div>
        <h1>Cảm Nhận Sinh Viên</h1>
        <p>Chia sẻ từ các thành viên đã và đang tham gia CLB</p>
    </div>

    <div class="page-body">
        <div class="tn-section-title"><i class="fas fa-heart"></i> Chia sẻ từ thành viên</div>

        <!-- Filter theo số sao -->
        <div class="cn-filter-bar" id="cn-filter-bar">
            <button class="cn-filter-btn active" data-rating="">⭐ Tất cả</button>
            <button class="cn-filter-btn" data-rating="5">★★★★★ 5 sao</button>
            <button class="cn-filter-btn" data-rating="4">★★★★ 4 sao</button>
            <button class="cn-filter-btn" data-rating="3">★★★ 3 sao</button>
        </div>

        <!-- Stats bar -->
        <div class="cn-stats-bar" id="cn-stats-bar" style="display:none;">
            <div class="cn-stat-item">
                <i class="fas fa-users"></i>
                <span><b id="cn-total">0</b> cảm nhận</span>
            </div>
            <div class="cn-stat-item">
                <i class="fas fa-star"></i>
                <span>Điểm trung bình: <b id="cn-avg">—</b> / 5</span>
            </div>
        </div>

        <!-- Grid cảm nhận -->
        <div class="cn-grid" id="cn-grid">
            <!-- Skeleton loading -->
            <div class="cn-skeleton">
                <div class="cn-sk-line w30"></div>
                <div class="cn-sk-line w100"></div>
                <div class="cn-sk-line w80"></div>
                <div class="cn-sk-line w60"></div>
                <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
                    <div class="cn-sk-avatar"></div>
                    <div style="flex:1;"><div class="cn-sk-line w60"></div><div class="cn-sk-line w40"></div></div>
                </div>
            </div>
            <div class="cn-skeleton">
                <div class="cn-sk-line w30"></div>
                <div class="cn-sk-line w100"></div>
                <div class="cn-sk-line w80"></div>
                <div class="cn-sk-line w60"></div>
                <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
                    <div class="cn-sk-avatar"></div>
                    <div style="flex:1;"><div class="cn-sk-line w60"></div><div class="cn-sk-line w40"></div></div>
                </div>
            </div>
            <div class="cn-skeleton">
                <div class="cn-sk-line w30"></div>
                <div class="cn-sk-line w100"></div>
                <div class="cn-sk-line w80"></div>
                <div class="cn-sk-line w60"></div>
                <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
                    <div class="cn-sk-avatar"></div>
                    <div style="flex:1;"><div class="cn-sk-line w60"></div><div class="cn-sk-line w40"></div></div>
                </div>
            </div>
            <div class="cn-skeleton">
                <div class="cn-sk-line w30"></div>
                <div class="cn-sk-line w100"></div>
                <div class="cn-sk-line w80"></div>
                <div class="cn-sk-line w60"></div>
                <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
                    <div class="cn-sk-avatar"></div>
                    <div style="flex:1;"><div class="cn-sk-line w60"></div><div class="cn-sk-line w40"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="assets/js/dropdown.js"></script>
    <script>
    'use strict';

    var API_BASE     = (window.APP_CONFIG && window.APP_CONFIG.API_BASE) || 'http://localhost:3001/api';
    var currentRating = '';

    // ── Helpers ──
    function resolveImg(url) {
        if (!url) return null;
        if (url.startsWith('http://') || url.startsWith('https://')) return url;
        return API_BASE.replace('/api', '') + (url.startsWith('/') ? url : '/' + url);
    }

    function renderStars(rating) {
        var r = parseInt(rating) || 5;
        var html = '';
        for (var i = 1; i <= 5; i++) {
            html += i <= r ? '★' : '☆';
        }
        return html;
    }

    // ── Render một card ──
    function renderCard(rv) {
        var initial = rv.author_name ? rv.author_name.charAt(0).toUpperCase() : '?';
        var avatarHtml = rv.avatar_url
            ? '<div class="cn-avatar"><img src="' + resolveImg(rv.avatar_url) + '" alt="' + rv.author_name + '" onerror="this.parentElement.innerHTML=\'' + initial + '\'"></div>'
            : '<div class="cn-avatar">' + initial + '</div>';

        var meta = [];
        if (rv.year)    meta.push('Thành viên từ ' + rv.year);
        if (rv.faculty) meta.push(rv.faculty);

        return '<div class="cn-card">' +
            '<div class="cn-stars">' + renderStars(rv.rating) + '</div>' +
            '<p class="cn-quote">' + (rv.content || '') + '</p>' +
            '<div class="cn-author">' +
                avatarHtml +
                '<div class="cn-author-info">' +
                    '<h5>' + (rv.author_name || 'Ẩn danh') + '</h5>' +
                    '<span>' + (meta.join(' · ') || 'Thành viên CLB') + '</span>' +
                '</div>' +
            '</div>' +
        '</div>';
    }

    // ── Fallback data khi API offline ──
    var FALLBACK = [
        { author_name: 'Nguyễn Văn A', faculty: 'Khoa CNTT',     year: 2022, rating: 5, content: 'Tham gia CLB Võ Cổ Truyền HUTECH là một trong những quyết định đúng đắn nhất của mình. Không chỉ học được kỹ thuật võ thuật, mình còn rèn luyện được tính kỷ luật và tinh thần kiên trì trong cuộc sống.' },
        { author_name: 'Trần Thị B',   faculty: 'Khoa Kinh tế',  year: 2023, rating: 5, content: 'Mình vốn không biết gì về võ thuật, nhưng các anh chị HLV rất tận tâm và kiên nhẫn. Sau 6 tháng, mình đã có thể thi đấu và đạt huy chương tại giải sinh viên. Cảm ơn CLB rất nhiều!' },
        { author_name: 'Lê Minh C',    faculty: 'Khoa Cơ khí',   year: 2021, rating: 5, content: 'CLB không chỉ là nơi tập võ mà còn là gia đình thứ hai của mình ở trường. Các buổi team building, thiện nguyện cùng nhau tạo nên những kỷ niệm không thể quên.' },
        { author_name: 'Phạm Thị D',   faculty: 'Khoa Thiết kế', year: 2020, rating: 5, content: 'Được biểu diễn tại HUTECH Global Festival và nhận giải nhất là kỷ niệm đáng nhớ nhất trong 4 năm đại học. Tự hào khi là thành viên của CLB Võ Cổ Truyền HUTECH!' },
        { author_name: 'Hoàng Văn E',  faculty: 'Khoa Luật',     year: 2024, rating: 4, content: 'Lịch tập linh hoạt ở cả hai cơ sở giúp mình dễ dàng sắp xếp thời gian. Chương trình học từ cơ bản đến nâng cao rất bài bản, phù hợp cho người mới bắt đầu như mình.' },
        { author_name: 'Mai Thị F',    faculty: 'Khoa Dược',     year: 2022, rating: 5, content: 'Võ cổ truyền không chỉ rèn thể lực mà còn dạy mình cách đứng vững trước khó khăn. Triết lý "thất bại lớn nhất là chưa bao giờ cố gắng" luôn là động lực của mình.' }
    ];

    // ── Load từ API ──
    async function loadReviews() {
        var grid = document.getElementById('cn-grid');

        try {
            var url = API_BASE + '/cms/reviews' +
                (currentRating ? '?rating=' + currentRating : '');

            var res  = await fetch(url);
            var data = await res.json();
            if (!data.success) throw new Error(data.message);

            var list = (data.data || []).filter(function(rv) {
                return rv.status === 'active';
            });

            renderList(list, false);

        } catch(e) {
            console.warn('[Cảm nhận] Không thể tải từ API:', e.message);
            var fallback = currentRating
                ? FALLBACK.filter(function(rv) { return rv.rating == currentRating; })
                : FALLBACK;
            renderList(fallback, true);
        }
    }

    function renderList(list, isFallback) {
        var grid    = document.getElementById('cn-grid');
        var statsEl = document.getElementById('cn-stats-bar');

        if (!list.length) {
            grid.innerHTML = '<div class="cn-empty">' +
                '<i class="fas fa-heart-broken"></i>' +
                '<p>Không có cảm nhận nào trong mục này.</p>' +
                '</div>';
            statsEl.style.display = 'none';
            return;
        }

        // Render cards
        grid.innerHTML = list.map(renderCard).join('');

        // Stats bar
        if (!isFallback) {
            var avg = (list.reduce(function(s, rv) {
                return s + (parseInt(rv.rating) || 5);
            }, 0) / list.length).toFixed(1);

            document.getElementById('cn-total').textContent = list.length;
            document.getElementById('cn-avg').textContent   = avg;
            statsEl.style.display = 'flex';
        } else {
            statsEl.style.display = 'none';
        }
    }

    // ── Filter ──
    document.getElementById('cn-filter-bar').addEventListener('click', function(e) {
        var btn = e.target.closest('.cn-filter-btn');
        if (!btn) return;

        document.querySelectorAll('.cn-filter-btn').forEach(function(b) {
            b.classList.remove('active');
        });
        btn.classList.add('active');
        currentRating = btn.dataset.rating;

        // Fade out → load → fade in
        var grid = document.getElementById('cn-grid');
        grid.style.opacity = '0';
        grid.style.transition = 'opacity 0.18s';
        setTimeout(function() {
            loadReviews();
            grid.style.opacity = '1';
        }, 180);
    });

    // ── Init ──
    async function loadComp(id, path) {
        try { document.getElementById(id).innerHTML = await (await fetch(path)).text(); } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', async function() {
        await Promise.all([
            loadComp('header-placeholder', 'components/header.html'),
            loadComp('footer-placeholder', 'components/footer.html')
        ]);
        if (typeof initDropdown === 'function') initDropdown();
        loadReviews();
    });
    </script>
</body>
</html>
