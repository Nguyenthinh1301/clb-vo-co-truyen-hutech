<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <title>Hoạt Động - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="assets/css/thanh-tich.css">
    <style>
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .tt-skeleton {
            background: linear-gradient(90deg,#f0f2f5 25%,#fafafa 50%,#f0f2f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 14px;
            height: 280px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="page-hero">
        <div class="breadcrumb">
            <a href="index.html">Trang chủ</a> &rsaquo; Hoạt động
        </div>
        <h1>Hoạt Động CLB</h1>
        <p>Hành trình chinh phục các giải đấu và hoạt động nổi bật</p>
    </div>

    <div class="page-body">

        <!-- Thống kê nhanh -->
        <div class="tt-stats">
            <div class="tt-stat-card">
                <div class="tt-stat-num">8+</div>
                <div class="tt-stat-label">Năm hoạt động</div>
            </div>
            <div class="tt-stat-card">
                <div class="tt-stat-num" id="stat-achievements">—</div>
                <div class="tt-stat-label">Giải thưởng</div>
            </div>
            <div class="tt-stat-card">
                <div class="tt-stat-num">50+</div>
                <div class="tt-stat-label">Học viên đào tạo</div>
            </div>
            <div class="tt-stat-card">
                <div class="tt-stat-num" id="stat-intl">—</div>
                <div class="tt-stat-label">Giải quốc tế</div>
            </div>
        </div>

        <!-- Nội dung từ API — skeleton khi đang tải -->
        <div id="activities-container">
            <div class="tt-section-title"><i class="fas fa-trophy"></i> Đang tải...</div>
            <div class="tt-achieve-grid">
                <div class="tt-skeleton"></div>
                <div class="tt-skeleton"></div>
                <div class="tt-skeleton"></div>
            </div>
        </div>

        <!-- Social CTA -->
        <div class="tt-social">
            <h3>Xem thêm hình ảnh & video</h3>
            <p>Theo dõi CLB trên mạng xã hội để cập nhật những khoảnh khắc mới nhất</p>
            <div class="tt-social-btns">
                <a href="https://www.facebook.com/vocotruyenhutech" target="_blank" class="tt-social-btn fb">
                    <i class="fab fa-facebook"></i> Facebook CLB
                </a>
                <a href="https://www.tiktok.com/@1209vcthutech2018" target="_blank" class="tt-social-btn tt">
                    <i class="fab fa-tiktok"></i> TikTok CLB
                </a>
            </div>
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLb(event)">
        <button class="lb-close" onclick="closeLb()">&times;</button>
        <img id="lb-img" src="" alt="">
    </div>

    <div id="footer-placeholder"></div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/dropdown.js"></script>
    <script>
    'use strict';

    var API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE) || 'http://localhost:3001/api';

    var TYPE_LBL = {
        achievement: 'Thành tích thi đấu',
        performance: 'Biểu diễn',
        event:       'Sự kiện & Hoạt động',
        training:    'Tập luyện',
        other:       'Khác'
    };
    var TYPE_ICN = {
        achievement: 'trophy',
        performance: 'theater-masks',
        event:       'star',
        training:    'dumbbell',
        other:       'tag'
    };
    var MEDAL_MAP = {
        gold:    { cls: 'gold',    icon: 'medal',   label: 'HCV / Giải nhất' },
        silver:  { cls: 'silver',  icon: 'medal',   label: 'HCB / Giải nhì' },
        bronze:  { cls: 'bronze',  icon: 'medal',   label: 'HCĐ / Giải ba' },
        special: { cls: 'special', icon: 'star',    label: 'Tham gia / Đặc biệt' }
    };

    function resolveImg(url) {
        if (!url) return null;
        if (url.startsWith('http')) return url;
        return API_BASE.replace('/api', '') + (url.startsWith('/') ? url : '/' + url);
    }

    function renderCard(a) {
        var medal   = MEDAL_MAP[a.medal] || null;
        var imgSrc  = a.image ? resolveImg(a.image) : null;
        var imgHtml = imgSrc
            ? '<img class="tt-achieve-img" src="' + imgSrc + '" alt="' + (a.title||'') + '" loading="lazy" onerror="this.style.display=\'none\'">'
            : '<div class="tt-achieve-img" style="background:linear-gradient(135deg,#1a252f,#c41e3a);display:flex;align-items:center;justify-content:center;">' +
              '<i class="fas fa-' + (TYPE_ICN[a.type]||'trophy') + '" style="font-size:2.5rem;color:rgba(255,255,255,0.3);"></i></div>';

        return '<div class="tt-achieve-card">' +
            imgHtml +
            '<div class="tt-achieve-body">' +
                '<div class="tt-achieve-year">' + (a.year || '') + '</div>' +
                (medal ? '<div class="tt-medal ' + medal.cls + '"><i class="fas fa-' + medal.icon + '"></i> ' + medal.label + '</div>' : '') +
                '<h4>' + (a.title || '') + '</h4>' +
                (a.description ? '<p>' + a.description + '</p>' : '') +
            '</div>' +
        '</div>';
    }

    async function loadActivities() {
        try {
            var res  = await fetch(API_BASE + '/activities');
            var data = await res.json();
            if (!data.success) throw new Error(data.message);

            var all = data.data || [];

            // Cập nhật stats
            var achievements = all.filter(function(a) { return a.type === 'achievement'; });
            var intl = all.filter(function(a) { return a.medal === 'gold' || a.medal === 'silver'; });
            var elAch  = document.getElementById('stat-achievements');
            var elIntl = document.getElementById('stat-intl');
            if (elAch)  elAch.textContent  = achievements.length + '+';
            if (elIntl) elIntl.textContent = intl.length + '+';

            if (!all.length) {
                document.getElementById('activities-container').innerHTML =
                    '<div style="text-align:center;padding:60px;color:#aaa;">' +
                    '<i class="fas fa-trophy" style="font-size:3rem;margin-bottom:16px;display:block;opacity:0.3;"></i>' +
                    '<p>Chưa có hoạt động nào.</p></div>';
                return;
            }

            // Nhóm theo type
            var groups = {};
            all.forEach(function(a) {
                if (!groups[a.type]) groups[a.type] = [];
                groups[a.type].push(a);
            });

            var html = '';
            var typeOrder = ['achievement', 'performance', 'event', 'training', 'other'];
            typeOrder.forEach(function(type) {
                if (!groups[type] || !groups[type].length) return;
                html += '<div class="tt-section-title">' +
                    '<i class="fas fa-' + (TYPE_ICN[type]||'tag') + '"></i> ' +
                    (TYPE_LBL[type]||type) + '</div>';
                html += '<div class="tt-achieve-grid">';
                groups[type].forEach(function(a) { html += renderCard(a); });
                html += '</div>';
            });

            document.getElementById('activities-container').innerHTML = html;

        } catch(e) {
            console.warn('[Activities] API lỗi:', e.message);
            document.getElementById('activities-container').innerHTML =
                '<div style="text-align:center;padding:40px;color:#aaa;">' +
                '<i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:12px;display:block;"></i>' +
                '<p>Không thể tải dữ liệu. Vui lòng thử lại sau.</p></div>';
        }
    }

    // Lightbox
    function openLb(src) {
        document.getElementById('lb-img').src = src;
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLb(e) {
        if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lb-close')) {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLb({ target: document.getElementById('lightbox') });
    });

    // Init
    async function load(id, path) {
        try { document.getElementById(id).innerHTML = await (await fetch(path)).text(); } catch(e) {}
    }
    document.addEventListener('DOMContentLoaded', async function() {
        await load('header-placeholder', 'components/header.html');
        await load('footer-placeholder', 'components/footer.html');
        initDropdown();
        loadActivities();
    });
    </script>
</body>
</html>
