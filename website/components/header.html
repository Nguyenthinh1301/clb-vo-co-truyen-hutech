<script>
document.addEventListener('DOMContentLoaded', function() {
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');

    // Mobile toggle
    if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            navToggle.classList.toggle('active');
        });
    }

    // Dropdown Giới thiệu — preventDefault để không scroll #about
    document.querySelectorAll('.nav-has-dropdown > .nav-link').forEach(function(toggle) {
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const item = this.closest('.nav-has-dropdown');
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.nav-has-dropdown').forEach(d => d.classList.remove('open'));
            if (!isOpen) item.classList.add('open');
        });
    });

    // Đóng dropdown khi click ra ngoài
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-has-dropdown')) {
            document.querySelectorAll('.nav-has-dropdown').forEach(d => d.classList.remove('open'));
        }
    });

    // Đóng mobile menu khi click link thường
    document.querySelectorAll('.nav-link:not(.nav-has-dropdown .nav-link)').forEach(link => {
        link.addEventListener('click', () => {
            if (navMenu) navMenu.classList.remove('active');
            if (navToggle) navToggle.classList.remove('active');
        });
    });

    // Scroll effect
    window.addEventListener('scroll', function() {
        const header = document.querySelector('.main-header');
        if (header) {
            header.classList.toggle('scrolled', window.scrollY > 100);
        }
    });
});
</script>
