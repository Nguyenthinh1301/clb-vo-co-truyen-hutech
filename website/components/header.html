<script>
(function() {
    function initNav() {
        var navMenu = document.getElementById('nav-menu');
        if (!navMenu) return;

        // Đóng menu khi click ra ngoài
        document.addEventListener('click', function(e) {
            var toggle = document.getElementById('nav-toggle');
            if (!e.target.closest('#nav-menu') && !e.target.closest('#nav-toggle')) {
                navMenu.classList.remove('active');
                if (toggle) toggle.classList.remove('active');
                document.querySelectorAll('.nav-has-dropdown').forEach(function(d) {
                    d.classList.remove('open');
                });
            }
        });

        // Scroll effect
        window.addEventListener('scroll', function() {
            var header = document.querySelector('.main-header');
            if (header) header.classList.toggle('scrolled', window.scrollY > 100);
        }, { passive: true });
    }

    // Chạy ngay (header được inject sau DOMContentLoaded)
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initNav);
    } else {
        initNav();
    }

    // Export để các trang views gọi lại
    window.initDropdown = initNav;
})();
</script>
