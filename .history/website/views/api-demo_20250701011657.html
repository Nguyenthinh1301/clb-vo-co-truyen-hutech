<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Demo - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .demo-container {
            max-width: 1200px;
            margin: 120px auto 40px;
            padding: 20px;
        }
        
        .demo-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .demo-title {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        
        .demo-form {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 200px 1fr 120px;
            gap: 15px;
            align-items: center;
        }
        
        .form-row label {
            font-weight: 600;
            color: #555;
        }
        
        .form-row input, .form-row select {
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-row button {
            padding: 10px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .form-row button:hover {
            background: #2980b9;
        }
        
        .response-area {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
        }
        
        .status-success {
            color: #27ae60;
            font-weight: bold;
        }
        
        .status-error {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .auth-status {
            background: #e8f5e8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #27ae60;
        }
        
        .auth-status.logged-out {
            background: #ffeaa7;
            border-left-color: #fdcb6e;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main class="demo-container">
        <h1>API Demo & Testing</h1>
        
        <!-- Auth Status -->
        <div class="auth-status" id="authStatus">
            <strong>Trạng thái:</strong> <span id="authStatusText">Chưa đăng nhập</span>
            <button onclick="checkAuthStatus()" style="margin-left: 15px; padding: 5px 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">Kiểm tra</button>
        </div>

        <!-- Authentication Demo -->
        <div class="demo-section">
            <h2 class="demo-title">Authentication API</h2>
            
            <div class="demo-form">
                <div class="form-row">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" value="admin@hutech.edu.vn">
                    <button onclick="testLogin()">Login</button>
                </div>
                <div class="form-row">
                    <label>Password:</label>
                    <input type="password" id="loginPassword" value="admin123">
                    <button onclick="testLogout()">Logout</button>
                </div>
                <div class="form-row">
                    <label>Google Auth:</label>
                    <input type="text" placeholder="Google Token" readonly>
                    <button onclick="testGoogleAuth()">Test Google</button>
                </div>
                <div class="form-row">
                    <label>Facebook Auth:</label>
                    <input type="text" placeholder="Facebook Token" readonly>
                    <button onclick="testFacebookAuth()">Test Facebook</button>
                </div>
            </div>
            
            <div class="response-area" id="authResponse">Response sẽ hiển thị ở đây...</div>
        </div>

        <!-- User API Demo -->
        <div class="demo-section">
            <h2 class="demo-title">User API</h2>
            
            <div class="demo-form">
                <div class="form-row">
                    <label>Get Profile:</label>
                    <input type="text" placeholder="Cần đăng nhập" readonly>
                    <button onclick="testGetProfile()">Get Profile</button>
                </div>
                <div class="form-row">
                    <label>Update Name:</label>
                    <input type="text" id="updateName" placeholder="Tên mới">
                    <button onclick="testUpdateProfile()">Update</button>
                </div>
            </div>
            
            <div class="response-area" id="userResponse">Response sẽ hiển thị ở đây...</div>
        </div>

        <!-- Club API Demo -->
        <div class="demo-section">
            <h2 class="demo-title">Club API</h2>
            
            <div class="demo-form">
                <div class="form-row">
                    <label>Training Schedule:</label>
                    <input type="text" placeholder="Lịch tập luyện" readonly>
                    <button onclick="testTrainingSchedule()">Get Schedule</button>
                </div>
                <div class="form-row">
                    <label>Activities:</label>
                    <input type="text" placeholder="Hoạt động CLB" readonly>
                    <button onclick="testActivities()">Get Activities</button>
                </div>
                <div class="form-row">
                    <label>Events:</label>
                    <input type="text" placeholder="Sự kiện" readonly>
                    <button onclick="testEvents()">Get Events</button>
                </div>
            </div>
            
            <div class="response-area" id="clubResponse">Response sẽ hiển thị ở đây...</div>
        </div>

        <!-- Admin API Demo -->
        <div class="demo-section">
            <h2 class="demo-title">Admin API (Cần quyền Admin)</h2>
            
            <div class="demo-form">
                <div class="form-row">
                    <label>Dashboard Stats:</label>
                    <input type="text" placeholder="Thống kê dashboard" readonly>
                    <button onclick="testDashboardStats()">Get Stats</button>
                </div>
                <div class="form-row">
                    <label>All Users:</label>
                    <input type="number" id="usersPage" value="1" min="1">
                    <button onclick="testGetAllUsers()">Get Users</button>
                </div>
            </div>
            
            <div class="response-area" id="adminResponse">Response sẽ hiển thị ở đây...</div>
        </div>

        <!-- Upload Demo -->
        <div class="demo-section">
            <h2 class="demo-title">Upload API</h2>
            
            <div class="demo-form">
                <div class="form-row">
                    <label>Upload Avatar:</label>
                    <input type="file" id="avatarFile" accept="image/*">
                    <button onclick="testUploadAvatar()">Upload</button>
                </div>
            </div>
            
            <div class="response-area" id="uploadResponse">Response sẽ hiển thị ở đây...</div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../config/config.js"></script>
    <script src="../config/api-config.js"></script>
    <script src="../config/mock-api.js"></script>
    <script src="../config/api-client.js"></script>
    <script>
        // Load components
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error(`Error loading component ${componentPath}:`, error);
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            await loadComponent('header-placeholder', '../components/header.html');
            await loadComponent('footer-placeholder', '../components/footer.html');
            checkAuthStatus();
        });

        // Utility functions
        function displayResponse(elementId, response, status = 'success') {
            const element = document.getElementById(elementId);
            const statusClass = status === 'success' ? 'status-success' : 'status-error';
            
            element.innerHTML = `
<span class="${statusClass}">Status: ${status}</span>
Time: ${new Date().toLocaleTimeString()}

${JSON.stringify(response, null, 2)}`;
        }

        // Check auth status
        function checkAuthStatus() {
            const token = localStorage.getItem('authToken');
            const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
            
            const statusDiv = document.getElementById('authStatus');
            const statusText = document.getElementById('authStatusText');
            
            if (token && user) {
                statusText.textContent = `Đã đăng nhập: ${user.name} (${user.role})`;
                statusDiv.className = 'auth-status';
            } else {
                statusText.textContent = 'Chưa đăng nhập';
                statusDiv.className = 'auth-status logged-out';
            }
        }

        // Authentication tests
        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await authAPI.login({ email, password });
                
                if (response.success) {
                    const { user, token } = response.data.data;
                    localStorage.setItem('authToken', token);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    checkAuthStatus();
                }
                
                displayResponse('authResponse', response);
            } catch (error) {
                displayResponse('authResponse', { error: error.message }, 'error');
            }
        }

        async function testLogout() {
            try {
                const response = await authAPI.logout();
                
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
                checkAuthStatus();
                
                displayResponse('authResponse', response);
            } catch (error) {
                displayResponse('authResponse', { error: error.message }, 'error');
            }
        }

        async function testGoogleAuth() {
            try {
                const response = await socialAuthAPI.googleAuth('demo_google_token');
                
                if (response.success) {
                    const { user, token } = response.data.data;
                    localStorage.setItem('authToken', token);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    checkAuthStatus();
                }
                
                displayResponse('authResponse', response);
            } catch (error) {
                displayResponse('authResponse', { error: error.message }, 'error');
            }
        }

        async function testFacebookAuth() {
            try {
                const response = await socialAuthAPI.facebookAuth('demo_facebook_token');
                
                if (response.success) {
                    const { user, token } = response.data.data;
                    localStorage.setItem('authToken', token);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    checkAuthStatus();
                }
                
                displayResponse('authResponse', response);
            } catch (error) {
                displayResponse('authResponse', { error: error.message }, 'error');
            }
        }

        // User API tests
        async function testGetProfile() {
            try {
                const response = await userAPI.getProfile();
                displayResponse('userResponse', response);
            } catch (error) {
                displayResponse('userResponse', { error: error.message }, 'error');
            }
        }

        async function testUpdateProfile() {
            const name = document.getElementById('updateName').value;
            
            if (!name) {
                alert('Vui lòng nhập tên mới');
                return;
            }
            
            try {
                const response = await userAPI.updateProfile({
                    name: name,
                    profile: {
                        firstName: name.split(' ')[0],
                        lastName: name.split(' ').slice(1).join(' ')
                    }
                });
                
                if (response.success) {
                    // Update localStorage
                    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                    currentUser.name = name;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    checkAuthStatus();
                }
                
                displayResponse('userResponse', response);
            } catch (error) {
                displayResponse('userResponse', { error: error.message }, 'error');
            }
        }

        // Club API tests
        async function testTrainingSchedule() {
            try {
                const response = await clubAPI.getTrainingSchedule();
                displayResponse('clubResponse', response);
            } catch (error) {
                displayResponse('clubResponse', { error: error.message }, 'error');
            }
        }

        async function testActivities() {
            try {
                const response = await clubAPI.getActivities();
                displayResponse('clubResponse', response);
            } catch (error) {
                displayResponse('clubResponse', { error: error.message }, 'error');
            }
        }

        async function testEvents() {
            try {
                const response = await clubAPI.getEvents();
                displayResponse('clubResponse', response);
            } catch (error) {
                displayResponse('clubResponse', { error: error.message }, 'error');
            }
        }

        // Admin API tests
        async function testDashboardStats() {
            try {
                const response = await adminAPI.getDashboardStats();
                displayResponse('adminResponse', response);
            } catch (error) {
                displayResponse('adminResponse', { error: error.message }, 'error');
            }
        }

        async function testGetAllUsers() {
            const page = document.getElementById('usersPage').value;
            
            try {
                const response = await userAPI.getAllUsers(page, 10);
                displayResponse('adminResponse', response);
            } catch (error) {
                displayResponse('adminResponse', { error: error.message }, 'error');
            }
        }

        // Upload tests
        async function testUploadAvatar() {
            const fileInput = document.getElementById('avatarFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Vui lòng chọn file để upload');
                return;
            }
            
            try {
                const response = await uploadAPI.uploadAvatar(file);
                displayResponse('uploadResponse', response);
            } catch (error) {
                displayResponse('uploadResponse', { error: error.message }, 'error');
            }
        }
    </script>
</body>
</html>
