<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile cá nhân - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-page {
            margin-top: 100px;
            min-height: calc(100vh - 100px);
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 40px 20px;
        }

        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            margin: 0 auto 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        }

        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #3498db;
            border: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .avatar-upload:hover {
            background: #2980b9;
            transform: scale(1.1);
        }

        .profile-info h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .profile-email {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .profile-badge {
            display: inline-block;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
        }

        .profile-form {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #2c3e50;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2980b9, #1f4e79);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #7f8c8d, #6c7b7d);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #c0392b, #a93226);
            transform: translateY(-2px);
        }

        .password-section {
            border-top: 2px solid #ecf0f1;
            padding-top: 30px;
            margin-top: 30px;
        }

        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(149, 165, 166, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #7f8c8d, #6c7b7d);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(149, 165, 166, 0.4);
        }

        .success-message {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        /* Logo styling for profile header */
        .header-logo-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
        }

        .header-logo-img:hover {
            border-color: #3498db;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            transform: scale(1.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-text h1 {
            color: white;
            font-size: 1.2rem;
            margin: 0;
            font-weight: 700;
        }

        .logo-text .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .profile-page {
                margin-top: 80px;
                padding: 20px 10px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .back-btn {
                bottom: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header sẽ được load từ component -->
    <div id="header-placeholder"></div>

    <div class="profile-page">
        <div class="profile-container">
            <!-- Success/Error Messages -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span>Cập nhật thông tin thành công!</span>
            </div>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Có lỗi xảy ra!</span>
            </div>

            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <i class="fas fa-user"></i>
                    <div class="avatar-upload" title="Thay đổi ảnh đại diện">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <div class="profile-info">
                    <h1 id="profileName">Đang tải...</h1>
                    <p class="profile-email" id="profileEmail">Đang tải...</p>
                    <span class="profile-badge" id="profileRole">Thành viên</span>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="profile-form">
                <form id="profileForm">
                    <!-- Thông tin cá nhân -->
                    <div class="form-section">
                        <h3 class="section-title">
                            <i class="fas fa-user"></i>
                            Thông tin cá nhân
                        </h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="fullName">
                                    <i class="fas fa-user"></i>
                                    Họ và tên *
                                </label>
                                <input type="text" id="fullName" name="fullName" required>
                            </div>
                            <div class="form-group">
                                <label for="email">
                                    <i class="fas fa-envelope"></i>
                                    Email *
                                </label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">
                                    <i class="fas fa-phone"></i>
                                    Số điện thoại
                                </label>
                                <input type="tel" id="phone" name="phone">
                            </div>
                            <div class="form-group">
                                <label for="birthDate">
                                    <i class="fas fa-calendar-alt"></i>
                                    Ngày sinh
                                </label>
                                <input type="date" id="birthDate" name="birthDate">
                            </div>
                            <div class="form-group">
                                <label for="gender">
                                    <i class="fas fa-venus-mars"></i>
                                    Giới tính
                                </label>
                                <select id="gender" name="gender">
                                    <option value="">Chọn giới tính</option>
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="studentId">
                                    <i class="fas fa-id-card"></i>
                                    Mã số sinh viên
                                </label>
                                <input type="text" id="studentId" name="studentId">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">
                                <i class="fas fa-map-marker-alt"></i>
                                Địa chỉ
                            </label>
                            <textarea id="address" name="address" placeholder="Nhập địa chỉ của bạn"></textarea>
                        </div>
                    </div>

                    <!-- Thông tin võ thuật -->
                    <div class="form-section">
                        <h3 class="section-title">
                            <i class="fas fa-fist-raised"></i>
                            Thông tin võ thuật
                        </h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="martialArtsLevel">
                                    <i class="fas fa-trophy"></i>
                                    Cấp độ hiện tại
                                </label>
                                <select id="martialArtsLevel" name="martialArtsLevel">
                                    <option value="">Chọn cấp độ</option>
                                    <option value="beginner">Cơ bản</option>
                                    <option value="intermediate">Trung cấp</option>
                                    <option value="advanced">Nâng cao</option>
                                    <option value="expert">Chuyên gia</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="experience">
                                    <i class="fas fa-clock"></i>
                                    Kinh nghiệm (năm)
                                </label>
                                <input type="number" id="experience" name="experience" min="0" max="50">
                            </div>
                            <div class="form-group">
                                <label for="preferredTime">
                                    <i class="fas fa-calendar-week"></i>
                                    Thời gian tập ưa thích
                                </label>
                                <select id="preferredTime" name="preferredTime">
                                    <option value="">Chọn thời gian</option>
                                    <option value="morning">Buổi sáng (6:00-11:00)</option>
                                    <option value="afternoon">Buổi chiều (13:00-17:00)</option>
                                    <option value="evening">Buổi tối (18:00-21:00)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="goals">
                                    <i class="fas fa-bullseye"></i>
                                    Mục tiêu
                                </label>
                                <select id="goals" name="goals">
                                    <option value="">Chọn mục tiêu</option>
                                    <option value="fitness">Rèn luyện sức khỏe</option>
                                    <option value="competition">Thi đấu</option>
                                    <option value="self-defense">Tự vệ</option>
                                    <option value="culture">Tìm hiểu văn hóa</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="bio">
                                <i class="fas fa-info-circle"></i>
                                Giới thiệu bản thân
                            </label>
                            <textarea id="bio" name="bio" placeholder="Hãy chia sẻ một chút về bản thân và sở thích võ thuật của bạn"></textarea>
                        </div>
                    </div>

                    <!-- Đổi mật khẩu -->
                    <div class="form-section password-section">
                        <h3 class="section-title">
                            <i class="fas fa-lock"></i>
                            Đổi mật khẩu
                        </h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="currentPassword">
                                    <i class="fas fa-key"></i>
                                    Mật khẩu hiện tại
                                </label>
                                <input type="password" id="currentPassword" name="currentPassword">
                            </div>
                            <div class="form-group">
                                <label for="newPassword">
                                    <i class="fas fa-lock"></i>
                                    Mật khẩu mới
                                </label>
                                <input type="password" id="newPassword" name="newPassword">
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">
                                    <i class="fas fa-lock"></i>
                                    Xác nhận mật khẩu mới
                                </label>
                                <input type="password" id="confirmPassword" name="confirmPassword">
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            Lưu thay đổi
                        </button>
                        <button type="button" class="btn btn-secondary" id="resetForm">
                            <i class="fas fa-undo"></i>
                            Khôi phục
                        </button>
                        <button type="button" class="btn btn-danger" id="deleteAccount">
                            <i class="fas fa-trash"></i>
                            Xóa tài khoản
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <a href="dashboard.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        Quay lại Dashboard
    </a>

    <script src="../../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Check if user is logged in
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                alert('Bạn cần đăng nhập để truy cập trang này!');
                window.location.href = 'dang-nhap.html';
                return;
            }

            const userData = JSON.parse(currentUser);
            
            // Load header with custom logo path
            await loadProfileHeader();
            
            // Load user data into form
            loadUserData(userData);
            
            // Initialize form handlers
            initializeFormHandlers(userData);
        });

        // Custom header loader for profile with correct image paths
        async function loadProfileHeader() {
            const headerHTML = `
                <header class="main-header">
                    <nav class="navbar">
                        <div class="nav-container">
                            <div class="logo">
                                <div class="logo-image">
                                    <img src="../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg" alt="CLB Võ Cổ Truyền HUTECH" class="header-logo-img">
                                </div>
                                <div class="logo-text">
                                    <h1>CLB VÕ CỔ TRUYỀN</h1>
                                    <span class="subtitle">HUTECH</span>
                                </div>
                            </div>
                            
                            <div class="nav-toggle" id="nav-toggle">
                                <span class="bar"></span>
                                <span class="bar"></span>
                                <span class="bar"></span>
                            </div>
                            
                            <ul class="nav-menu" id="nav-menu">
                                <li class="nav-item">
                                    <a href="../../index.html#home" class="nav-link">
                                        <span>Trang chủ</span>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="../../index.html#about" class="nav-link">
                                        <span>Giới thiệu</span>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="../../index.html#services" class="nav-link">
                                        <span>Dịch vụ</span>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="../../index.html#contact" class="nav-link">
                                        <span>Liên hệ</span>
                                    </a>
                                </li>
                                <li class="nav-item auth-item">
                                    <a href="dashboard.html" class="nav-link">
                                        <i class="fas fa-tachometer-alt"></i>
                                        <span>Dashboard</span>
                                    </a>
                                </li>
                                <li class="nav-item auth-item">
                                    <a href="#" class="nav-link logout-btn" id="logoutBtn">
                                        <i class="fas fa-sign-out-alt"></i>
                                        <span>Đăng xuất</span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </header>
            `;
            
            document.getElementById('header-placeholder').innerHTML = headerHTML;
            
            // Add logout functionality
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                    localStorage.removeItem('currentUser');
                    window.location.href = '../../index.html';
                }
            });
        }

        function loadUserData(userData) {
            // Basic info
            document.getElementById('profileName').textContent = userData.name || 'Chưa cập nhật';
            document.getElementById('profileEmail').textContent = userData.email || 'Chưa cập nhật';
            document.getElementById('profileRole').textContent = userData.role === 'admin' ? 'Quản trị viên' : 'Thành viên';
            
            // Set avatar
            const profileAvatar = document.getElementById('profileAvatar');
            if (userData.name) {
                profileAvatar.innerHTML = `${userData.name.charAt(0).toUpperCase()}<div class="avatar-upload" title="Thay đổi ảnh đại diện"><i class="fas fa-camera"></i></div>`;
            }
            
            // Load form data
            document.getElementById('fullName').value = userData.name || '';
            document.getElementById('email').value = userData.email || '';
            document.getElementById('phone').value = userData.phone || '';
            document.getElementById('birthDate').value = userData.birthDate || '';
            document.getElementById('gender').value = userData.gender || '';
            document.getElementById('studentId').value = userData.studentId || '';
            document.getElementById('address').value = userData.address || '';
            document.getElementById('martialArtsLevel').value = userData.martialArtsLevel || '';
            document.getElementById('experience').value = userData.experience || '';
            document.getElementById('preferredTime').value = userData.preferredTime || '';
            document.getElementById('goals').value = userData.goals || '';
            document.getElementById('bio').value = userData.bio || '';
        }

        function initializeFormHandlers(userData) {
            // Profile form submission
            document.getElementById('profileForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = new FormData(this);
                const updatedUser = {
                    ...userData,
                    name: formData.get('fullName'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    birthDate: formData.get('birthDate'),
                    gender: formData.get('gender'),
                    studentId: formData.get('studentId'),
                    address: formData.get('address'),
                    martialArtsLevel: formData.get('martialArtsLevel'),
                    experience: formData.get('experience'),
                    preferredTime: formData.get('preferredTime'),
                    goals: formData.get('goals'),
                    bio: formData.get('bio')
                };
                
                // Handle password change
                const currentPassword = formData.get('currentPassword');
                const newPassword = formData.get('newPassword');
                const confirmPassword = formData.get('confirmPassword');
                
                if (currentPassword || newPassword || confirmPassword) {
                    if (!currentPassword) {
                        showError('Vui lòng nhập mật khẩu hiện tại');
                        return;
                    }
                    if (currentPassword !== userData.password) {
                        showError('Mật khẩu hiện tại không đúng');
                        return;
                    }
                    if (!newPassword) {
                        showError('Vui lòng nhập mật khẩu mới');
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        showError('Mật khẩu xác nhận không khớp');
                        return;
                    }
                    if (newPassword.length < 6) {
                        showError('Mật khẩu mới phải có ít nhất 6 ký tự');
                        return;
                    }
                    
                    updatedUser.password = newPassword;
                }
                
                // Validate required fields
                if (!updatedUser.name || !updatedUser.email) {
                    showError('Vui lòng điền đầy đủ thông tin bắt buộc');
                    return;
                }
                
                // Save updated user data
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                
                // Update stored users list if exists
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.email === userData.email);
                if (userIndex !== -1) {
                    users[userIndex] = updatedUser;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                
                showSuccess('Cập nhật thông tin thành công!');
                
                // Reload user data
                loadUserData(updatedUser);
                
                // Clear password fields
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            });
            
            // Reset form
            document.getElementById('resetForm').addEventListener('click', function() {
                if (confirm('Bạn có chắc chắn muốn khôi phục về thông tin ban đầu?')) {
                    loadUserData(userData);
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                }
            });
            
            // Delete account
            document.getElementById('deleteAccount').addEventListener('click', function() {
                if (confirm('CẢNH BÁO: Bạn có chắc chắn muốn xóa tài khoản? Hành động này không thể hoàn tác!')) {
                    if (confirm('Xác nhận lần cuối: Tài khoản sẽ bị xóa vĩnh viễn!')) {
                        // Remove from users list
                        const users = JSON.parse(localStorage.getItem('users') || '[]');
                        const filteredUsers = users.filter(u => u.email !== userData.email);
                        localStorage.setItem('users', JSON.stringify(filteredUsers));
                        
                        // Remove current user
                        localStorage.removeItem('currentUser');
                        
                        alert('Tài khoản đã được xóa thành công!');
                        window.location.href = '../../index.html';
                    }
                }
            });
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.style.display = 'flex';
            document.getElementById('errorMessage').style.display = 'none';
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 3000);
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorEl.style.display = 'flex';
            document.getElementById('successMessage').style.display = 'none';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
