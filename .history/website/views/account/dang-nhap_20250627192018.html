<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .login-btn {
            background: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-btn:hover {
            background: #0056b3;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .signup-link a {
            color: #007bff;
            text-decoration: none;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1><a href="../../index.html">ThôngTin-VCT/HT</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../../index.html#home">Trang chủ</a></li>
                <li><a href="../../index.html#about">Giới thiệu</a></li>
                <li><a href="../../index.html#services">Dịch vụ</a></li>
                <li><a href="../../index.html#contact">Liên hệ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <h2 style="text-align: center; margin-bottom: 30px; color: #333;">Đăng Nhập</h2>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="login-btn">Đăng Nhập</button>
            </form>
            
            <div class="signup-link">
                <p>Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 ThongTin-VCT. Tất cả quyền được bảo lưu.</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Xử lý đăng nhập ở đây
            console.log('Đăng nhập với:', { email, password });
            
            // Thông báo tạm thời
            alert('Tính năng đăng nhập đang được phát triển!');
        });
    </script>
</body>
</html>
