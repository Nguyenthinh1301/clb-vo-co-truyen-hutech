<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-page {
            margin-top: 100px;
            min-height: calc(100vh - 100px);
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 40px 20px;
        }

        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .profile-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            margin: 0 auto 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .profile-header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .profile-header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: #7f8c8d;
        }

        .breadcrumb a {
            color: #3498db;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: #2980b9;
        }

        .personal-info-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .personal-info-card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card-header h2 {
            color: #2c3e50;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .edit-info-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-info-btn:hover {
            background: linear-gradient(135deg, #e67e22, #d35400);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-item label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-item .label-icon {
            color: #3498db;
            font-size: 0.9rem;
        }

        .info-item span {
            color: #7f8c8d;
            padding: 15px 18px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
            font-size: 0.95rem;
            min-height: 20px;
        }

        .info-item input,
        .info-item select {
            padding: 15px 18px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        .info-item input:focus,
        .info-item select:focus {
            outline: none;
            border-color: #3498db;
        }

        .edit-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .save-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .cancel-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cancel-btn:hover {
            background: linear-gradient(135deg, #c0392b, #a93226);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .back-btn {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-right: auto;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #5a6268, #4a5056);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        .stat-card p {
            margin: 0;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .profile-page {
                margin-top: 80px;
                padding: 20px 10px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .edit-actions {
                flex-direction: column;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Logo styling for profile header */
        .header-logo-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
        }

        .header-logo-img:hover {
            border-color: #3498db;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            transform: scale(1.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-text h1 {
            color: white;
            font-size: 1.2rem;
            margin: 0;
            font-weight: 700;
        }

        .logo-text .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Header sẽ được load từ component -->
    <div id="header-placeholder"></div>

    <div class="profile-page">
        <div class="profile-container">
            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <a href="../../index.html">
                    <i class="fas fa-home"></i> Trang chủ
                </a>
                <span><i class="fas fa-chevron-right"></i></span>
                <a href="dashboard.html">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <span><i class="fas fa-chevron-right"></i></span>
                <span>Thông tin cá nhân</span>
            </div>

            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <h1 id="profileName">Đang tải...</h1>
                <p id="profileEmail">Đang tải...</p>
            </div>

            <!-- Personal Info Card -->
            <div class="personal-info-card">
                <div class="card-header">
                    <h2>
                        <div class="card-icon">
                            <i class="fas fa-id-card"></i>
                        </div>
                        Thông tin cá nhân
                    </h2>
                    <button class="edit-info-btn" onclick="toggleEditMode()">
                        <i class="fas fa-edit"></i> Chỉnh sửa thông tin
                    </button>
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <label>
                            <i class="fas fa-user label-icon"></i>
                            Họ và tên:
                        </label>
                        <span id="displayName">Đang tải...</span>
                        <input type="text" id="editName" style="display: none;">
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-envelope label-icon"></i>
                            Email:
                        </label>
                        <span id="displayEmail">Đang tải...</span>
                        <input type="email" id="editEmail" style="display: none;">
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-phone label-icon"></i>
                            Số điện thoại:
                        </label>
                        <span id="displayPhone">Chưa cập nhật</span>
                        <input type="tel" id="editPhone" style="display: none;">
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-calendar-alt label-icon"></i>
                            Ngày sinh:
                        </label>
                        <span id="displayBirthday">Chưa cập nhật</span>
                        <input type="date" id="editBirthday" style="display: none;">
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-venus-mars label-icon"></i>
                            Giới tính:
                        </label>
                        <span id="displayGender">Chưa cập nhật</span>
                        <select id="editGender" style="display: none;">
                            <option value="">Chọn giới tính</option>
                            <option value="male">Nam</option>
                            <option value="female">Nữ</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-map-marker-alt label-icon"></i>
                            Địa chỉ:
                        </label>
                        <span id="displayAddress">Chưa cập nhật</span>
                        <input type="text" id="editAddress" style="display: none;">
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-calendar-plus label-icon"></i>
                            Ngày tham gia:
                        </label>
                        <span id="displayJoinDate">Đang tải...</span>
                    </div>
                    <div class="info-item">
                        <label>
                            <i class="fas fa-sign-in-alt label-icon"></i>
                            Phương thức đăng nhập:
                        </label>
                        <span id="displayLoginMethod">Đang tải...</span>
                    </div>
                </div>
                
                <div class="edit-actions" id="editActions" style="display: none;">
                    <a href="dashboard.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                    <button class="save-btn" onclick="savePersonalInfo()">
                        <i class="fas fa-save"></i> Lưu thay đổi
                    </button>
                    <button class="cancel-btn" onclick="cancelEdit()">
                        <i class="fas fa-times"></i> Hủy
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>24</h3>
                    <p>Buổi tập đã tham gia</p>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">
                    <h3>Trung cấp</h3>
                    <p>Cấp độ hiện tại</p>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f39c12, #e67e22);">
                    <h3>850</h3>
                    <p>Điểm kinh nghiệm</p>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);">
                    <h3>12</h3>
                    <p>Bạn bè trong CLB</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Check if user is logged in
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                alert('Bạn cần đăng nhập để truy cập trang này!');
                window.location.href = 'dang-nhap.html';
                return;
            }

            const userData = JSON.parse(currentUser);
            
            // Load header
            await loadDashboardHeader();
            
            // Update profile info
            updateProfileInfo(userData);
            
            // Initialize auth manager after header is loaded
            setTimeout(() => {
                if (typeof AuthManager !== 'undefined') {
                    AuthManager.updateHeaderForLoggedInUser();
                }
            }, 500);
        });

        // Function to update profile info display
        function updateProfileInfo(userData) {
            // Update profile header
            document.getElementById('profileName').textContent = userData.name || 'Không có tên';
            document.getElementById('profileEmail').textContent = userData.email || 'Không có email';
            
            // Update profile avatar
            const profileAvatar = document.getElementById('profileAvatar');
            if (userData.picture && (userData.loginMethod === 'google' || userData.loginMethod === 'facebook')) {
                profileAvatar.innerHTML = `<img src="${userData.picture}" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
            } else if (userData.name) {
                profileAvatar.textContent = userData.name.charAt(0).toUpperCase();
            }
            
            // Update detailed info
            document.getElementById('displayName').textContent = userData.name || 'Chưa cập nhật';
            document.getElementById('displayEmail').textContent = userData.email || 'Chưa cập nhật';
            document.getElementById('displayPhone').textContent = userData.phone || 'Chưa cập nhật';
            document.getElementById('displayBirthday').textContent = userData.birthday || 'Chưa cập nhật';
            document.getElementById('displayGender').textContent = getGenderText(userData.gender) || 'Chưa cập nhật';
            document.getElementById('displayAddress').textContent = userData.address || 'Chưa cập nhật';
            document.getElementById('displayJoinDate').textContent = userData.joinDate || new Date().toLocaleDateString('vi-VN');
            document.getElementById('displayLoginMethod').textContent = getLoginMethodText(userData.loginMethod);
        }

        // Function to get gender text
        function getGenderText(gender) {
            switch(gender) {
                case 'male': return 'Nam';
                case 'female': return 'Nữ';
                case 'other': return 'Khác';
                default: return 'Chưa cập nhật';
            }
        }

        // Function to get login method text
        function getLoginMethodText(method) {
            switch(method) {
                case 'google': return 'Google';
                case 'facebook': return 'Facebook';
                case 'email': return 'Email';
                default: return 'Email';
            }
        }

        // Function to toggle edit mode
        function toggleEditMode() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            // Show input fields
            document.getElementById('editName').style.display = 'block';
            document.getElementById('editEmail').style.display = 'block';
            document.getElementById('editPhone').style.display = 'block';
            document.getElementById('editBirthday').style.display = 'block';
            document.getElementById('editGender').style.display = 'block';
            document.getElementById('editAddress').style.display = 'block';
            
            // Hide display spans
            document.getElementById('displayName').style.display = 'none';
            document.getElementById('displayEmail').style.display = 'none';
            document.getElementById('displayPhone').style.display = 'none';
            document.getElementById('displayBirthday').style.display = 'none';
            document.getElementById('displayGender').style.display = 'none';
            document.getElementById('displayAddress').style.display = 'none';
            
            // Fill input fields with current values
            document.getElementById('editName').value = currentUser.name || '';
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editPhone').value = currentUser.phone || '';
            document.getElementById('editBirthday').value = currentUser.birthday || '';
            document.getElementById('editGender').value = currentUser.gender || '';
            document.getElementById('editAddress').value = currentUser.address || '';
            
            // Show edit actions
            document.getElementById('editActions').style.display = 'flex';
            
            // Hide edit button
            document.querySelector('.edit-info-btn').style.display = 'none';
        }

        // Function to save personal info
        function savePersonalInfo() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            // Get updated values
            const updatedUser = {
                ...currentUser,
                name: document.getElementById('editName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                birthday: document.getElementById('editBirthday').value,
                gender: document.getElementById('editGender').value,
                address: document.getElementById('editAddress').value
            };
            
            // Save to localStorage
            localStorage.setItem('currentUser', JSON.stringify(updatedUser));
            
            // Update display
            updateProfileInfo(updatedUser);
            
            // Exit edit mode
            cancelEdit();
            
            // Show success message
            showNotification('Thông tin cá nhân đã được cập nhật thành công!', 'success');
        }

        // Function to cancel edit
        function cancelEdit() {
            // Hide input fields
            document.getElementById('editName').style.display = 'none';
            document.getElementById('editEmail').style.display = 'none';
            document.getElementById('editPhone').style.display = 'none';
            document.getElementById('editBirthday').style.display = 'none';
            document.getElementById('editGender').style.display = 'none';
            document.getElementById('editAddress').style.display = 'none';
            
            // Show display spans
            document.getElementById('displayName').style.display = 'block';
            document.getElementById('displayEmail').style.display = 'block';
            document.getElementById('displayPhone').style.display = 'block';
            document.getElementById('displayBirthday').style.display = 'block';
            document.getElementById('displayGender').style.display = 'block';
            document.getElementById('displayAddress').style.display = 'block';
            
            // Hide edit actions
            document.getElementById('editActions').style.display = 'none';
            
            // Show edit button
            document.querySelector('.edit-info-btn').style.display = 'flex';
        }

        // Function to show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 10px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                animation: slideIn 0.3s ease;
            `;
            
            if (type === 'success') {
                notification.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
            } else if (type === 'error') {
                notification.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';
            } else {
                notification.style.background = 'linear-gradient(135deg, #3498db, #2980b9)';
            }
            
            document.body.appendChild(notification);
            
            // Remove notification after 3 seconds
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Custom header loader for profile with correct image paths
        async function loadDashboardHeader() {
            const headerHTML = `
                <header class="main-header">
                    <nav class="navbar">
                        <div class="nav-container">
                            <div class="logo">
                                <div class="logo-image">
                                    <img src="../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg" alt="CLB Võ Cổ Truyền HUTECH" class="header-logo-img">
                                </div>
                                <div class="logo-text">
                                    <h1>CLB VÕ CỔ TRUYỀN</h1>
                                    <span class="subtitle">HUTECH</span>
                                </div>
                            </div>
                            
                            <div class="nav-toggle" id="nav-toggle">
                                <span class="bar"></span>
                                <span class="bar"></span>
                                <span class="bar"></span>
                            </div>
                            
                            <ul class="nav-menu" id="nav-menu">
                                <li class="nav-item">
                                    <a href="../../index.html#home" class="nav-link">
                                        <span>Trang chủ</span>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="../../index.html#about" class="nav-link">
                                        <span>Giới thiệu</span>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="../../index.html#services" class="nav-link">
                                        <span>Dịch vụ</span>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="../../index.html#contact" class="nav-link">
                                        <span>Liên hệ</span>
                                    </a>
                                </li>
                                <li class="nav-item auth-item">
                                    <a href="dashboard.html" class="nav-link user-profile" id="userProfile">
                                        <i class="fas fa-user-circle"></i>
                                        <span id="headerUserName">Tài khoản</span>
                                    </a>
                                </li>
                                <li class="nav-item auth-item">
                                    <a href="#" class="nav-link logout-btn" id="logoutBtn">
                                        <i class="fas fa-sign-out-alt"></i>
                                        <span>Đăng xuất</span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </header>
            `;
            
            document.getElementById('header-placeholder').innerHTML = headerHTML;
            
            // Add logout functionality
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                    localStorage.removeItem('currentUser');
                    window.location.href = '../../index.html';
                }
            });
        }
    </script>
</body>
</html>
