<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Sign-In API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Facebook SDK -->
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/vi_VN/sdk.js"></script>
    <style>
        /* Auth page specific styles */
        .auth-page {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../../assets/images/z6220991542184_5df707998ebb7fe3c2c8b7135d923fd1.jpg') center/cover;
            opacity: 0.05;
            z-index: 1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .auth-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .auth-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 16px;
        }

        .auth-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }

        .password-toggle:hover {
            color: #3498db;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #3498db;
        }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #2980b9, #1f4f7a);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #6c757d;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e8ed;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link p {
            margin: 0;
            color: #6c757d;
            font-size: 14px;
        }

        .register-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Social Login Styles */
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-google,
        .btn-facebook {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            text-decoration: none;
        }

        .btn-google {
            color: #db4437;
            border-color: #db4437;
        }

        .btn-google:hover {
            background: #db4437;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(219, 68, 55, 0.3);
        }

        .btn-facebook {
            color: #4267B2;
            border-color: #4267B2;
        }

        .btn-facebook:hover {
            background: #4267B2;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 103, 178, 0.3);
        }

        .btn-google i,
        .btn-facebook i {
            font-size: 16px;
        }

        /* Loading state for social buttons */
        .btn-google.loading,
        .btn-facebook.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-google.loading::after,
        .btn-facebook.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #2c3e50;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            z-index: 3;
        }

        .back-home:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .error-message {
            background: #fee;
            color: #d63384;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c2c7;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d1e7dd;
            color: #0f5132;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #a3cfbb;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 768px) {
            .auth-container {
                margin: 20px;
                max-width: none;
            }
            
            .auth-header {
                padding: 30px 20px 20px;
            }
            
            .auth-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body class="auth-page">
    <a href="../../index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
        Về trang chủ
    </a>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Đăng nhập</h1>
            <p>Chào mừng bạn trở lại!</p>
        </div>
        
        <div class="auth-body">
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email hoặc Tên đăng nhập</label>
                    <input type="text" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-group">
                        <input type="password" id="password" name="password" class="form-control" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="password-icon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
            </form>
            
            <div class="divider">
                <span>hoặc</span>
            </div>
            
            <!-- Social Login Buttons -->
            <div class="social-login">
                <button type="button" class="btn-google" onclick="signInWithGoogle()">
                    <i class="fab fa-google"></i>
                    Đăng nhập bằng Google
                </button>
                
                <button type="button" class="btn-facebook" onclick="signInWithFacebook()">
                    <i class="fab fa-facebook-f"></i>
                    Đăng nhập bằng Facebook
                </button>
            </div>
            
            <div class="register-link">
                <p>Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../config/config.js"></script>
    <script src="../../config/api-config.js"></script>
    <script src="../../config/mock-api.js"></script>
    <script src="../../config/api-client.js"></script>
    <script src="../../config/auth.js"></script>
    <script src="../../database/database_manager.js"></script>
    <script>
        // Google Client ID - Thay thế bằng Client ID thực tế của bạn
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        
        // Facebook App ID - Thay thế bằng App ID thực tế của bạn
        const FACEBOOK_APP_ID = 'YOUR_FACEBOOK_APP_ID';

        // Initialize Facebook SDK
        window.fbAsyncInit = function() {
            FB.init({
                appId: FACEBOOK_APP_ID,
                cookie: true,
                xfbml: true,
                version: 'v18.0'
            });
        };

        // Demo accounts for testing
        const demoAccounts = [
            {
                email: 'admin@hutech.edu.vn',
                password: 'admin123',
                name: 'Quản trị viên',
                role: 'admin'
            },
            {
                email: 'member@hutech.edu.vn',
                password: 'member123',
                name: 'Thành viên',
                role: 'member'
            },
            {
                email: 'demo@test.com',
                password: '123456',
                name: 'Demo User',
                role: 'member'
            }
        ];

        // Initialize Google Sign-In
        function initializeGoogleSignIn() {
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleSignIn,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
            }
        }

        // Handle Google Sign-In response
        function handleGoogleSignIn(response) {
            try {
                // Decode the JWT token to get user info
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                
                const userData = {
                    email: payload.email,
                    name: payload.name,
                    picture: payload.picture,
                    role: 'member',
                    loginMethod: 'google',
                    loginTime: new Date().toISOString(),
                    googleId: payload.sub
                };

                // Save user data
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Check if user exists in database, if not create account
                saveOrUpdateSocialUser(userData);
                
                showMessage('Đăng nhập Google thành công! Đang chuyển hướng...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error handling Google sign-in:', error);
                showMessage('Có lỗi xảy ra khi đăng nhập bằng Google. Vui lòng thử lại.');
            }
        }

        // Google Sign-In button click handler
        function signInWithGoogle() {
            const button = document.querySelector('.btn-google');
            button.classList.add('loading');
            
            try {
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.prompt((notification) => {
                        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                            // Fallback: show one-tap dialog
                            google.accounts.id.renderButton(
                                document.createElement('div'),
                                { theme: 'outline', size: 'large', width: '100%' }
                            );
                        }
                        button.classList.remove('loading');
                    });
                } else {
                    // Fallback for demo purposes
                    setTimeout(() => {
                        const demoGoogleUser = {
                            email: 'demo.google@gmail.com',
                            name: 'Demo Google User',
                            picture: 'https://via.placeholder.com/100',
                            role: 'member',
                            loginMethod: 'google',
                            loginTime: new Date().toISOString(),
                            googleId: 'demo_google_123'
                        };
                        
                        localStorage.setItem('currentUser', JSON.stringify(demoGoogleUser));
                        saveOrUpdateSocialUser(demoGoogleUser);
                        
                        showMessage('Đăng nhập Google thành công (Demo)! Đang chuyển hướng...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                        
                        button.classList.remove('loading');
                    }, 1500);
                }
            } catch (error) {
                console.error('Error with Google sign-in:', error);
                showMessage('Có lỗi xảy ra khi đăng nhập bằng Google. Vui lòng thử lại.');
                button.classList.remove('loading');
            }
        }

        // Facebook Sign-In button click handler
        function signInWithFacebook() {
            const button = document.querySelector('.btn-facebook');
            button.classList.add('loading');
            
            try {
                if (typeof FB !== 'undefined') {
                    FB.login(function(response) {
                        if (response.authResponse) {
                            // Get user info
                            FB.api('/me', {fields: 'name,email,picture'}, function(userInfo) {
                                const userData = {
                                    email: userInfo.email || `${userInfo.id}@facebook.local`,
                                    name: userInfo.name,
                                    picture: userInfo.picture.data.url,
                                    role: 'member',
                                    loginMethod: 'facebook',
                                    loginTime: new Date().toISOString(),
                                    facebookId: userInfo.id
                                };

                                localStorage.setItem('currentUser', JSON.stringify(userData));
                                saveOrUpdateSocialUser(userData);
                                
                                showMessage('Đăng nhập Facebook thành công! Đang chuyển hướng...', 'success');
                                setTimeout(() => {
                                    window.location.href = 'dashboard.html';
                                }, 2000);
                            });
                        } else {
                            showMessage('Đăng nhập Facebook bị hủy.');
                        }
                        button.classList.remove('loading');
                    }, {scope: 'email'});
                } else {
                    // Fallback for demo purposes
                    setTimeout(() => {
                        const demoFacebookUser = {
                            email: 'demo.facebook@fb.com',
                            name: 'Demo Facebook User',
                            picture: 'https://via.placeholder.com/100',
                            role: 'member',
                            loginMethod: 'facebook',
                            loginTime: new Date().toISOString(),
                            facebookId: 'demo_fb_123'
                        };
                        
                        localStorage.setItem('currentUser', JSON.stringify(demoFacebookUser));
                        saveOrUpdateSocialUser(demoFacebookUser);
                        
                        showMessage('Đăng nhập Facebook thành công (Demo)! Đang chuyển hướng...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                        
                        button.classList.remove('loading');
                    }, 1500);
                }
            } catch (error) {
                console.error('Error with Facebook sign-in:', error);
                showMessage('Có lỗi xảy ra khi đăng nhập bằng Facebook. Vui lòng thử lại.');
                button.classList.remove('loading');
            }
        }

        // Save or update social user in localStorage
        function saveOrUpdateSocialUser(userData) {
            let registeredUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            // Check if user already exists
            const existingUserIndex = registeredUsers.findIndex(user => 
                user.email === userData.email || 
                (userData.googleId && user.googleId === userData.googleId) ||
                (userData.facebookId && user.facebookId === userData.facebookId)
            );
            
            if (existingUserIndex !== -1) {
                // Update existing user
                registeredUsers[existingUserIndex] = {
                    ...registeredUsers[existingUserIndex],
                    ...userData,
                    lastLogin: new Date().toISOString()
                };
            } else {
                // Add new user
                const newUser = {
                    ...userData,
                    id: Date.now().toString(),
                    registrationDate: new Date().toISOString(),
                    membershipStatus: 'active'
                };
                registeredUsers.push(newUser);
            }
            
            localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('password-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        function showMessage(message, type = 'error') {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            // Hide both messages first
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }
        }

        // Regular form login with Auth Manager
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            
            try {
                // Use AuthManager to login
                const result = await Auth.login(email, password, remember);
                
                if (result.success) {
                    showMessage('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    // Redirect based on user role
                    setTimeout(() => {
                        if (result.user.role === 'admin') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = '../../index.html';
                        }
                    }, 1500);
                } else {
                    showMessage(result.message || 'Đăng nhập thất bại');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Có lỗi xảy ra khi đăng nhập. Vui lòng thử lại.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const userData = JSON.parse(currentUser);
                showMessage(`Bạn đã đăng nhập với tài khoản ${userData.name}. Đang chuyển hướng...`, 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                return;
            }

            // Initialize Google Sign-In
            initializeGoogleSignIn();
            
            // Show demo info
            setTimeout(() => {
                if (!localStorage.getItem('demoInfoShown')) {
                    showMessage('Demo: demo@hutech.edu.vn/demo123 hoặc admin@hutech.edu.vn/admin123', 'success');
                    localStorage.setItem('demoInfoShown', 'true');
                }
            }, 1000);
        });
    </script>
</body>
</html>
