<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .signup-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .signup-btn {
            background: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .signup-btn:hover {
            background: #218838;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link a {
            color: #007bff;
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1><a href="../../index.html">ThôngTin-VCT/HT</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../../index.html#home">Trang chủ</a></li>
                <li><a href="../../index.html#about">Giới thiệu</a></li>
                <li><a href="../../index.html#services">Dịch vụ</a></li>
                <li><a href="../../index.html#contact">Liên hệ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="signup-container">
            <h2 style="text-align: center; margin-bottom: 30px; color: #333;">Đăng Ký Thành Viên</h2>
            
            <form class="signup-form" id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Họ:</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Tên:</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Số điện thoại:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="birthDate">Ngày sinh:</label>
                        <input type="date" id="birthDate" name="birthDate" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Giới tính:</label>
                        <select id="gender" name="gender" required>
                            <option value="">Chọn giới tính</option>
                            <option value="male">Nam</option>
                            <option value="female">Nữ</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="experience">Kinh nghiệm võ thuật:</label>
                    <select id="experience" name="experience" required>
                        <option value="">Chọn mức độ</option>
                        <option value="beginner">Mới bắt đầu</option>
                        <option value="intermediate">Trung bình</option>
                        <option value="advanced">Nâng cao</option>
                        <option value="expert">Chuyên gia</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">Tôi đồng ý với <a href="#" style="color: #007bff;">Điều khoản sử dụng</a></label>
                </div>
                
                <button type="submit" class="signup-btn">Đăng Ký</button>
            </form>
            
            <div class="login-link">
                <p>Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 ThongTin-VCT. Tất cả quyền được bảo lưu.</p>
        </div>
    </footer>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (password.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }
            
            // Thu thập dữ liệu form
            const formData = new FormData(this);
            const userData = Object.fromEntries(formData.entries());
            
            console.log('Đăng ký với thông tin:', userData);
            
            // Thông báo tạm thời
            alert('Đăng ký thành công! Tính năng này đang được phát triển.');
        });
    </script>
</body>
</html>
