<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Profile - CLB Võ Cổ Truyền HUTECH</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div style="padding: 20px; text-align: center;">
        <h1>Test Profile Functionality</h1>
        <p>Trang này dùng để test tính năng profile</p>
        
        <div style="margin: 20px 0;">
            <button onclick="loginTestUser()" style="padding: 10px 20px; margin: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                Đăng nhập user test
            </button>
            
            <button onclick="logoutUser()" style="padding: 10px 20px; margin: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">
                Đăng xuất
            </button>
            
            <button onclick="goToProfile()" style="padding: 10px 20px; margin: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
                Đi đến trang Profile
            </button>
        </div>
        
        <div id="status" style="margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 5px;">
            <strong>Trạng thái:</strong> <span id="statusText">Chưa đăng nhập</span>
        </div>
        
        <div>
            <a href="../index.html" style="color: #667eea; text-decoration: none;">← Quay về trang chủ</a>
        </div>
    </div>

    <script>
        function loginTestUser() {
            // Create test user data
            const testUser = {
                id: 'test123',
                fullName: 'Nguyễn Văn Test',
                email: 'test@hutech.edu.vn',
                phone: '0123456789',
                birthDate: '2000-01-01',
                gender: 'male',
                studentId: 'HUTECH123',
                address: '475A Điện Biên Phủ, P.25, Q.Bình Thạnh, TP.HCM',
                bio: 'Tôi là thành viên CLB Võ Cổ Truyền HUTECH, yêu thích võ thuật truyền thống.',
                avatar: null
            };
            
            // Save to localStorage
            localStorage.setItem('currentUser', JSON.stringify(testUser));
            localStorage.setItem('authToken', 'test-token-123');
            
            updateStatus('Đã đăng nhập: ' + testUser.fullName);
        }
        
        function logoutUser() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
            updateStatus('Đã đăng xuất');
        }
        
        function goToProfile() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                window.location.href = 'account/profile.html';
            } else {
                alert('Vui lòng đăng nhập trước!');
            }
        }
        
        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }
        
        function checkLoginStatus() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                updateStatus('Đã đăng nhập: ' + user.fullName);
            } else {
                updateStatus('Chưa đăng nhập');
            }
        }
        
        // Check status when page loads
        document.addEventListener('DOMContentLoaded', checkLoginStatus);
    </script>
</body>
</html>
