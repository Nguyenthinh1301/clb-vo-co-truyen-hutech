<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin: 10px 0; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; }
        .error { color: red; display: none; }
        .success { color: green; display: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Registration Form</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label>Họ:</label>
            <input type="text" id="firstName" required>
        </div>
        
        <div class="form-group">
            <label>Tên:</label>
            <input type="text" id="lastName" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="tel" id="phone" required>
        </div>
        
        <div class="form-group">
            <label>Ngày sinh:</label>
            <input type="date" id="birthDate" required>
        </div>
        
        <div class="form-group">
            <label>Giới tính:</label>
            <select id="gender" required>
                <option value="">Chọn giới tính</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Kinh nghiệm:</label>
            <select id="experience" required>
                <option value="">Chọn mức độ</option>
                <option value="Mới bắt đầu">Mới bắt đầu</option>
                <option value="Có kinh nghiệm">Có kinh nghiệm</option>
                <option value="Chuyên nghiệp">Chuyên nghiệp</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" id="password" required>
        </div>
        
        <button type="submit">Đăng ký</button>
    </form>
    
    <div id="message" class="error"></div>
    <div id="success" class="success"></div>
    
    <script src="../../config/auth.js"></script>
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageEl = document.getElementById('message');
            const successEl = document.getElementById('success');
            
            // Hide previous messages
            messageEl.style.display = 'none';
            successEl.style.display = 'none';
            
            // Get form data
            const formData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                birthDate: document.getElementById('birthDate').value,
                gender: document.getElementById('gender').value,
                experience: document.getElementById('experience').value,
                password: document.getElementById('password').value
            };
            
            console.log('Form data:', formData);
            
            try {
                // Wait a bit for Auth to initialize
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                if (typeof Auth === 'undefined') {
                    throw new Error('Auth manager not loaded');
                }
                
                console.log('Auth available:', !!Auth);
                console.log('Auth initialized:', Auth.isInitialized);
                
                const result = await Auth.register(formData);
                console.log('Registration result:', result);
                
                if (result.success) {
                    successEl.textContent = result.message || 'Đăng ký thành công!';
                    successEl.style.display = 'block';
                    
                    // Try auto login
                    const loginResult = await Auth.login(formData.email, formData.password);
                    console.log('Login result:', loginResult);
                    
                    if (loginResult.success) {
                        successEl.textContent += ' Đã đăng nhập tự động!';
                    }
                } else {
                    messageEl.textContent = result.message || 'Đăng ký thất bại';
                    messageEl.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                messageEl.textContent = 'Lỗi: ' + error.message;
                messageEl.style.display = 'block';
            }
        });
        
        // Auto-fill test data
        setTimeout(() => {
            document.getElementById('firstName').value = 'Test';
            document.getElementById('lastName').value = 'User';
            document.getElementById('email').value = 'test' + Date.now() + '@test.com';
            document.getElementById('phone').value = '0123456789';
            document.getElementById('birthDate').value = '1990-01-01';
            document.getElementById('gender').value = 'Nam';
            document.getElementById('experience').value = 'Mới bắt đầu';
            document.getElementById('password').value = 'test123';
        }, 500);
    </script>
</body>
</html>
