            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            
            <ul class="nav-menu" id="nav-menu">
                <li class="nav-item">
                    <a href="#home" class="nav-link">
                        <span>Trang chủ</span>

                </li>
                <li class="nav-item">
                    <a href="#about" class="nav-link">

                <li class="nav-item">
                    <a href="#services" class="nav-link">

                <li class="nav-item auth-item">
                    <a href="views/account/dang-nhap.html" class="nav-link login-btn">
                        <span>Đăng nhập</span>

                </li>
                <li class="nav-item auth-item">
                    <a href="views/account/dang-ky.html" class="nav-link signup-btn">
                        <span>Đăng ký</span>
                    </a>
                </li>
                <!-- User Profile Dropdown (Hidden by default, shown when logged in) -->
                <li class="nav-item user-dropdown" id="userDropdown" style="display: none;">
                    <div class="user-profile-btn">
                        <img id="headerUserAvatar" src="assets/images/default-avatar.svg" alt="Avatar" class="user-avatar">
                        <span id="headerUserName" class="user-name">Người dùng</span>
                        <i class="fas fa-chevron-down dropdown-icon"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-header">
                            <div class="user-info">
                                <img id="dropdownUserAvatar" src="assets/images/default-avatar.svg" alt="Avatar" class="dropdown-avatar">
                                <div class="user-details">

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');
    
    if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            navToggle.classList.toggle('active');
        });
        
        // Close menu when clicking on a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                navToggle.classList.remove('active');
            });
        });
    }
    
    // Header scroll effect
    window.addEventListener('scroll', function() {
        const header = document.querySelector('.main-header');
        if (header) {
            if (window.scrollY > 100) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }
    });

    // User dropdown functionality
    const userDropdown = document.getElementById('userDropdown');
    if (userDropdown) {
        const userProfileBtn = userDropdown.querySelector('.user-profile-btn');
        const dropdownMenu = userDropdown.querySelector('.dropdown-menu');
        
        userProfileBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!userDropdown.contains(e.target)) {
                dropdownMenu.classList.remove('show');
            }
        });
        
        // Logout functionality
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (typeof AuthManager !== 'undefined') {
                    AuthManager.logout();
                }
            });
        }
    }
});
</script>
