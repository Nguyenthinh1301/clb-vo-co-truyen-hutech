<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');
    
    if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            navToggle.classList.toggle('active');
        });
        
        // Close menu when clicking on a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                navToggle.classList.remove('active');
            });
        });
    }
    
    // Header scroll effect
    window.addEventListener('scroll', function() {
        const header = document.querySelector('.main-header');
        if (header) {
            if (window.scrollY > 100) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }
    });
    
    // User dropdown toggle
    const userDropdown = document.querySelector('.user-dropdown');
    const userMenuToggle = document.querySelector('.user-menu-toggle');
    const userDropdownMenu = document.querySelector('.user-dropdown-menu');
    
    if (userMenuToggle && userDropdownMenu) {
        userMenuToggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            userDropdownMenu.classList.toggle('show');
        });
        
        // Close user dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (userDropdown && !userDropdown.contains(e.target)) {
                userDropdownMenu.classList.remove('show');
            }
        });
    }
    
    // Logout functionality
    const logoutBtn = document.querySelector('.logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                // Simulate logout
                document.querySelectorAll('.guest-only').forEach(el => {
                    el.style.display = 'block';
                });
                document.querySelectorAll('.user-only').forEach(el => {
                    el.style.display = 'none';
                });
                localStorage.setItem('isLoggedIn', 'false');
                window.location.href = 'index.html';
            }
        });
    }
    
    // Check login status and show appropriate menu
    checkLoginStatus();
});

// Function to check login status
function checkLoginStatus() {
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    
    if (isLoggedIn && currentUser.email) {
        // Show user menu, hide guest menu
        document.querySelectorAll('.guest-only').forEach(el => {
            el.style.display = 'none';
        });
        document.querySelectorAll('.user-only').forEach(el => {
            el.style.display = 'block';
        });
        
        // Update user info in dropdown
        const userNameElements = document.querySelectorAll('.user-name');
        const userEmailElement = document.querySelector('.user-email');
        
        userNameElements.forEach(el => {
            el.textContent = currentUser.firstName + ' ' + currentUser.lastName || 'anh voi';
        });
        
        if (userEmailElement) {
            userEmailElement.textContent = currentUser.email || '123@gmail.com';
        }
        
        // Update avatar if available
        const userAvatar = document.querySelector('.user-avatar');
        if (userAvatar && currentUser.avatar) {
            userAvatar.src = currentUser.avatar;
        }
    } else {
        // Show guest menu, hide user menu
        document.querySelectorAll('.guest-only').forEach(el => {
            el.style.display = 'block';
        });
        document.querySelectorAll('.user-only').forEach(el => {
            el.style.display = 'none';
        });
    }
}

// Function to simulate login (for demo)
function simulateLogin() {
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('currentUser', JSON.stringify({
        firstName: 'anh',
        lastName: 'voi',
        email: '123@gmail.com',
        role: 'member'
    }));
    checkLoginStatus();
}

// Function to simulate logout (for demo)  
function simulateLogout() {
    localStorage.setItem('isLoggedIn', 'false');
    localStorage.removeItem('currentUser');
    checkLoginStatus();
}
</script>
