                </div>
                <div class="logo-text">
                    <h1>CLB VÕ CỔ TRUYỀN</h1>
                    <span class="subtitle">HUTECH</span>
                </div>
            </div>
            
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            
            <ul class="nav-menu" id="nav-menu">
                <li class="nav-item">
                    <a href="#home" class="nav-link">
                        <span>Trang chủ</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#about" class="nav-link">
                        <span>Giới thiệu</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#services" class="nav-link">
                        <span>Dịch vụ</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#contact" class="nav-link">
                        <span>Liên hệ</span>
                    </a>
                </li>
                <li class="nav-item auth-item">
                    <a href="views/account/dang-nhap.html" class="nav-link login-btn">
                        <span>Đăng nhập</span>
                    </a>
                </li>
                <li class="nav-item auth-item">
                    <a href="views/account/dang-ky.html" class="nav-link signup-btn">
                        <span>Đăng ký</span>
                    </a>
                </li>
                <!-- Profile dropdown for logged-in users -->
                <li class="nav-item profile-item" style="display: none;">
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profile-btn">
                            <img src="assets/images/default-avatar.svg" alt="Profile" class="profile-avatar">
                            <span class="profile-name">Tên người dùng</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="profile-menu" id="profile-menu">
                            <a href="views/account/profile.html" class="profile-menu-item">
                                <i class="fas fa-user"></i>
                                <span>Thông tin cá nhân</span>
                            </a>
                            <a href="views/account/dashboard.html" class="profile-menu-item">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>Bảng điều khiển</span>
                            </a>
                            <div class="profile-menu-divider"></div>
                            <button class="profile-menu-item logout-btn" onclick="handleLogout()">
                                <i class="fas fa-sign-out-alt"></i>

                            </button>
                        </div>
                    </div>

</header>

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');
    
    if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            navToggle.classList.toggle('active');
        });
        
        // Close menu when clicking on a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                navToggle.classList.remove('active');
            });
        });
    }
    
    // Header scroll effect
    window.addEventListener('scroll', function() {
        const header = document.querySelector('.main-header');
        if (header) {
            if (window.scrollY > 100) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }
    });

    // Profile dropdown functionality
    const profileBtn = document.getElementById('profile-btn');
    const profileMenu = document.getElementById('profile-menu');
    
    if (profileBtn && profileMenu) {
        profileBtn.addEventListener('click', function(e) {
            e.preventDefault();
            profileMenu.classList.toggle('active');
        });

        // Close profile menu when clicking outside
        document.addEventListener('click', function(e) {
            if (!profileBtn.contains(e.target) && !profileMenu.contains(e.target)) {
                profileMenu.classList.remove('active');
            }
        });
    }
});

// Handle logout
function handleLogout() {
    if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('authToken');
        window.location.href = '../../index.html';
    }
}
</script>
