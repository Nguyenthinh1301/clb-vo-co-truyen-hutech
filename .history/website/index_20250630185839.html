<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLB Võ Cổ Truyền HUTECH - Trang chủ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Hero Section -->
        <div id="hero-placeholder"></div>
        
        <!-- About Section -->
        <div id="about-placeholder"></div>
        
        <!-- Services Section -->
        <div id="services-placeholder"></div>
        
        <!-- Contact Section -->
        <div id="contact-placeholder"></div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script>
        // Load components
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error(`Error loading component ${componentPath}:`, error);
            }
        }

        // Load all components
        document.addEventListener('DOMContentLoaded', async function() {
            await loadComponent('header-placeholder', 'components/header.html');
            await loadComponent('hero-placeholder', 'components/hero-section.html');
            await loadComponent('about-placeholder', 'components/about-section.html');
            await loadComponent('services-placeholder', 'components/services-section.html');
            await loadComponent('contact-placeholder', 'components/contact-section.html');
            await loadComponent('footer-placeholder', 'components/footer.html');
            
            // Initialize contact form and other interactions
            setTimeout(initializeComponents, 100);
        });

        function initializeComponents() {
            // Check authentication status and update header
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                setTimeout(() => {
                    if (typeof AuthManager !== 'undefined') {
                        AuthManager.updateHeaderForLoggedInUser();
                    }
                }, 200);
            }
            
            // Initialize contact form
            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    alert('Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi trong thời gian sớm nhất.');
                    this.reset();
                });
            }

            // Initialize CTA button
            const ctaButton = document.querySelector('.cta-button');
            if (ctaButton) {
                ctaButton.addEventListener('click', function() {
                    document.getElementById('about').scrollIntoView({ behavior: 'smooth' });
                });
            }
        }
        
        // Demo function to test profile (remove in production)
        function createDemoUser() {
            const demoUser = {
                id: "demo-user-123",
                username: "anquoc",
                email: "aquin1512301@gmail.com",
                fullName: "An Quốc",
                phoneNumber: "0912345678",
                dateOfBirth: "1995-05-15",
                role: "student",
                membershipStatus: "active",
                joinDate: "2024-01-15",
                lastLoginDate: new Date().toISOString(),
                profileImage: "assets/images/default-avatar.svg"
            };
            localStorage.setItem('currentUser', JSON.stringify(demoUser));
            
            // Update header
            setTimeout(() => {
                if (typeof checkAuthStatus !== 'undefined') {
                    checkAuthStatus();
                }
            }, 100);
            
            alert('Demo user đã được tạo! Bây giờ bạn có thể test profile.');
        }
    </script>
</body>
</html>
