<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLB Võ Cổ Truyền HUTECH - Trang chủ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Hero Section -->
        <div id="hero-placeholder"></div>
        
        <!-- About Section -->
        <div id="about-placeholder"></div>
        
        <!-- Services Section -->
        <div id="services-placeholder"></div>
        
        <!-- Contact Section -->
        <div id="contact-placeholder"></div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script>
        // Load components
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error(`Error loading component ${componentPath}:`, error);
            }
        }

        // Load all components
        document.addEventListener('DOMContentLoaded', async function() {
            await loadComponent('header-placeholder', 'components/header.html');
            await loadComponent('hero-placeholder', 'components/hero-section.html');
            await loadComponent('about-placeholder', 'components/about-section.html');
            await loadComponent('services-placeholder', 'components/services-section.html');
            await loadComponent('contact-placeholder', 'components/contact-section.html');
            await loadComponent('footer-placeholder', 'components/footer.html');
            
            // Initialize contact form and other interactions
            setTimeout(initializeComponents, 100);
        });

        function initializeComponents() {
            // Initialize contact form
            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    alert('Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi trong thời gian sớm nhất.');
                    this.reset();
                });
            }

            // Initialize CTA buttons
            const primaryButton = document.querySelector('.cta-button.primary');
            const secondaryButton = document.querySelector('.cta-button.secondary');
            
            if (primaryButton) {
                primaryButton.addEventListener('click', function() {
                    document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
                });
            }
            
            if (secondaryButton) {
                secondaryButton.addEventListener('click', function() {
                    document.getElementById('about').scrollIntoView({ behavior: 'smooth' });
                });
            }

            // Add scroll animations
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            // Observe elements for scroll animations
            const animateElements = document.querySelectorAll('.martial-art-card, .stat-card, .mission-card, .vision-card, .story-card');
            animateElements.forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                observer.observe(el);
            });
        }
    </script>
</body>
</html>
