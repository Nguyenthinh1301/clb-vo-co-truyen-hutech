events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        least_conn;
        server api:3001 max_fails=3 fail_timeout=30s;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/xml text/javascript
                    application/json application/javascript application/xml+rss;

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name vocotruyenhutech.edu.vn www.vocotruyenhutech.edu.vn;   # HTTP → HTTPS redirect

        # Let's Encrypt ACME challenge (cần cho certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect tất cả HTTP → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — API Backend ──────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.vocotruyenhutech.edu.vn;

        # SSL Certificates (Let's Encrypt / certbot)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Security
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS — bắt buộc HTTPS trong 1 năm
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"              always;
        add_header X-Content-Type-Options    "nosniff"                 always;
        add_header X-XSS-Protection          "1; mode=block"           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # Client body size limit (upload ảnh tối đa 10MB)
        client_max_body_size 10M;

        # ── Health check (không rate limit) ──
        location /health {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # ── Auth endpoints (rate limit chặt) ──
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_limit burst=3 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API endpoints ──
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Static uploads ──
        location /uploads/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;

            expires            7d;
            add_header         Cache-Control "public, immutable";
        }

        # ── Error pages ──
        error_page 502 503 504 @error50x;
        location @error50x {
            default_type application/json;
            return 503 '{"success":false,"error":{"message":"Service temporarily unavailable","code":"SERVICE_UNAVAILABLE"}}';
        }
    }

    # ── HTTPS — Frontend (static files) ─────────────────────
    server {
        listen 443 ssl http2;
        server_name vocotruyenhutech.edu.vn www.vocotruyenhutech.edu.vn;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"  always;
        add_header X-Content-Type-Options    "nosniff"     always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        root  /var/www/clb-vo/website;
        index index.html;

        # Cache static assets 30 ngày
        location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
            expires    30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

